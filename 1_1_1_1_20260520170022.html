<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">     <title>萌宠养成记</title>     <style>         :root {             --primary-color: #FF9A9E;             --bg-color: #FAD0C4;             --card-bg: #ffffff;             --text-color: #555;             --bar-bg: #eee;         }          * {             box-sizing: border-box;             margin: 0;             padding: 0;             user-select: none; /* 防止手机点击选中文本 */         }          body {             font-family: "PingFang SC", "Microsoft YaHei", sans-serif;             background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);             min-height: 100vh;             display: flex;             justify-content: center;             align-items: center;             color: var(--text-color);             overflow: hidden;         }          /* 容器样式 */         .container {             background: var(--card-bg);             padding: 20px;             border-radius: 25px;             box-shadow: 0 10px 30px rgba(0,0,0,0.1);             width: 90%;             max-width: 400px;             text-align: center;             position: relative;             transition: all 0.3s ease;         }          /* 标题 */         h1 {             font-size: 1.5rem;             color: var(--primary-color);             margin-bottom: 15px;         }          /* 选择界面 */         #setup-screen, #game-screen, #gameover-screen {             display: none;             flex-direction: column;             align-items: center;         }          .pet-options {             display: flex;             gap: 15px;             margin: 20px 0;         }          .pet-option {             font-size: 2.5rem;             cursor: pointer;             padding: 10px;             border-radius: 50%;             transition: transform 0.2s, background 0.2s;             border: 3px solid transparent;         }          .pet-option.selected {             background: #fff0f0;             transform: scale(1.2);             border-color: var(--primary-color);         }          input[type="text"] {             padding: 10px;             border-radius: 15px;             border: 2px solid #eee;             width: 80%;             font-size: 1rem;             text-align: center;             outline: none;             margin-bottom: 15px;         }          input[type="text"]:focus {             border-color: var(--primary-color);         }          /* 通用按钮 */         .btn {             background: var(--primary-color);             color: white;             border: none;             padding: 12px 30px;             border-radius: 25px;             font-size: 1rem;             cursor: pointer;             transition: transform 0.1s, box-shadow 0.2s;             box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4);         }          .btn:active {             transform: scale(0.95);         }          .btn:disabled {             background: #ccc;             cursor: not-allowed;             box-shadow: none;         }          /* 游戏界面 - 宠物展示 */         .pet-display {             height: 180px;             display: flex;             justify-content: center;             align-items: center;             position: relative;         }          .pet-emoji {             font-size: 6rem;             transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);             cursor: default;             position: relative;             z-index: 2;         }          /* 状态特效 */         .pet-emoji.low-energy {             filter: grayscale(0.5) brightness(0.8);             transform: translateY(15px) scale(0.9); /* 低头 */         }          .pet-emoji.high-energy {             filter: brightness(1.1) drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));             animation: bounce-high 1s infinite;         }          .pet-emoji.dead {             filter: grayscale(1);             transform: rotate(90deg);         }          .pet-emoji.bounce {             animation: bounce-action 0.5s ease;         }          /* 数值条 */         .stats-container {             width: 100%;             margin: 15px 0;         }          .stat-row {             display: flex;             align-items: center;             margin-bottom: 8px;             font-size: 0.9rem;         }          .stat-label {             width: 50px;             text-align: left;         }          .progress-bar {             flex: 1;             height: 12px;             background: var(--bar-bg);             border-radius: 10px;             overflow: hidden;             position: relative;         }          .progress-fill {             height: 100%;             width: 100%;             border-radius: 10px;             transition: width 0.5s ease, background-color 0.5s ease;         }          /* 按钮区域 */         .actions {             display: flex;             justify-content: space-around;             width: 100%;             margin-top: 10px;         }          .action-btn {             background: white;             border: 2px solid #eee;             padding: 10px 15px;             border-radius: 15px;             cursor: pointer;             display: flex;             flex-direction: column;             align-items: center;             transition: all 0.2s;             min-width: 80px;         }          .action-btn span {             font-size: 1.5rem;             margin-bottom: 5px;         }          .action-btn small {             font-size: 0.7rem;             color: #888;         }          .action-btn:hover {             border-color: var(--primary-color);             background: #fffafa;         }          /* 飘出图标动画 */         .floating-icon {             position: absolute;             font-size: 1.5rem;             pointer-events: none;             animation: floatUp 1s forwards;             z-index: 10;         }          /* 动画关键帧 */         @keyframes bounce-action {             0%, 100% { transform: translateY(0) scale(1); }             50% { transform: translateY(-20px) scale(1.1); }         }          @keyframes bounce-high {             0%, 100% { transform: translateY(0); }             50% { transform: translateY(-10px); }         }          @keyframes floatUp {             0% { transform: translateY(0) scale(1); opacity: 1; }             100% { transform: translateY(-60px) scale(1.5); opacity: 0; }         }          @keyframes shake {             0% { transform: rotate(0deg); }             25% { transform: rotate(-10deg); }             75% { transform: rotate(10deg); }             100% { transform: rotate(0deg); }         }          /* 全屏撒花 */         #confetti-canvas {             position: fixed;             top: 0;             left: 0;             width: 100%;             height: 100%;             pointer-events: none;             z-index: 999;             display: none;         }          /* 重新开始遮罩 */         .overlay {             position: absolute;             top: 0;             left: 0;             width: 100%;             height: 100%;             background: rgba(255,255,255,0.9);             border-radius: 25px;             display: flex;             flex-direction: column;             justify-content: center;             align-items: center;             z-index: 20;         }                  .hidden {             display: none !important;         }      </style> </head> <body>      <!-- 全屏庆祝画布 -->     <canvas id="confetti-canvas"></canvas>      <div class="container">                  <!-- 1. 开始/选择界面 -->         <div id="setup-screen">             <h1>领养宠物</h1>             <p>选择你喜欢的小宠物</p>             <div class="pet-options">                 <div class="pet-option selected" onclick="selectPet(this, '🐶')">🐶</div>                 <div class="pet-option" onclick="selectPet(this, '🐱')">🐱</div>                 <div class="pet-option" onclick="selectPet(this, '🐰')">🐰</div>                 <div class="pet-option" onclick="selectPet(this, '🐼')">🐼</div>             </div>             <p>给它起个名字吧</p>             <input type="text" id="pet-name-input" placeholder="例如：豆豆" maxlength="6">             <button class="btn" onclick="startGame()">开始养成</button>         </div>          <!-- 2. 游戏主界面 -->         <div id="game-screen">             <h1 id="game-title">你好呀！</h1>                          <div class="pet-display">                 <div id="pet-avatar" class="pet-emoji">🐶</div>             </div>              <div class="stats-container">                 <div class="stat-row">                     <span class="stat-label">🍖 饱食</span>                     <div class="progress-bar">                         <div id="bar-hunger" class="progress-fill" style="background: #4CAF50;"></div>                     </div>                 </div>                 <div class="stat-row">                     <span class="stat-label">💖 快乐</span>                     <div class="progress-bar">                         <div id="bar-happiness" class="progress-fill" style="background: #FF9800;"></div>                     </div>                 </div>                 <div class="stat-row">                     <span class="stat-label">✨ 清洁</span>                     <div class="progress-bar">                         <div id="bar-clean" class="progress-fill" style="background: #2196F3;"></div>                     </div>                 </div>             </div>              <div class="actions" id="action-buttons">                 <button class="action-btn" onclick="handleAction('feed')">                     <span>🍖</span>                     <small>喂食</small>                 </button>                 <button class="action-btn" onclick="handleAction('play')">                     <span>🎾</span>                     <small>玩耍</small>                 </button>                 <button class="action-btn" onclick="handleAction('clean')">                     <span>🚿</span>                     <small>清洁</small>                 </button>             </div>              <div id="restart-btn-container" class="hidden" style="margin-top:15px;">                 <button class="btn" style="background:#ff6b6b" onclick="restartGame()">重新开始</button>             </div>         </div>      </div>  <script>     // 游戏状态     let gameState = {         exists: false,         name: '',         type: '🐶',         hunger: 100,    // 饱食度         happiness: 100, // 快乐度         cleanliness: 100, // 清洁度         isDead: false     };      let decayInterval;     let isFullCelebration = false;      // 初始化     window.onload = function() {         loadGame();     };      // --- 核心逻辑 ---      function selectPet(el, type) {         document.querySelectorAll('.pet-option').forEach(d => d.classList.remove('selected'));         el.classList.add('selected');         gameState.type = type;     }      function startGame() {         const nameInput = document.getElementById('pet-name-input');         const name = nameInput.value.trim() || '小可爱';                  gameState.name = name;         gameState.hunger = 100;         gameState.happiness = 100;         gameState.cleanliness = 100;         gameState.isDead = false;         gameState.exists = true;          saveGame();         showGameScreen();     }      function showGameScreen() {         document.getElementById('setup-screen').style.display = 'none';         document.getElementById('game-screen').style.display = 'flex';         document.getElementById('game-title').innerText = `你好，${gameState.name}！`;                  updateUI();         startDecay();     }      function startDecay() {         if (decayInterval) clearInterval(decayInterval);         // 每5秒减少2点         decayInterval = setInterval(() => {             if (gameState.isDead) return;              let changed = false;             if (gameState.hunger > 0) { gameState.hunger = Math.max(0, gameState.hunger - 2); changed = true; }             if (gameState.happiness > 0) { gameState.happiness = Math.max(0, gameState.happiness - 2); changed = true; }             if (gameState.cleanliness > 0) { gameState.cleanliness = Math.max(0, gameState.cleanliness - 2); changed = true; }              if (changed) {                 updateUI();                 checkStatus();                 saveGame();             }         }, 5000);     }      function handleAction(action) {         if (gameState.isDead) return;          const avatar = document.getElementById('pet-emoji');                  // 触发动作         if (action === 'feed') {             gameState.hunger = Math.min(100, gameState.hunger + 20);             spawnFloatingIcon('🍖');         } else if (action === 'play') {             gameState.happiness = Math.min(100, gameState.happiness + 20);             gameState.hunger = Math.max(0, gameState.hunger - 5); // 玩耍消耗饱食度             spawnFloatingIcon('🎾');         } else if (action === 'clean') {             gameState.cleanliness = Math.min(100, gameState.cleanliness + 20);             spawnFloatingIcon('🫧');         }          // 动画效果         avatar.classList.remove('bounce');         void avatar.offsetWidth; // 触发重绘         avatar.classList.add('bounce');          updateUI();         checkStatus();         saveGame();     }      function checkStatus() {         // 检查死亡         if (gameState.hunger === 0 || gameState.happiness === 0 || gameState.cleanliness === 0) {             gameOver();             return;         }          // 检查全满庆祝 (所有值 > 70)         const isAllHigh = gameState.hunger > 70 && gameState.happiness > 70 && gameState.cleanliness > 70;                  if (isAllHigh && !isFullCelebration) {             triggerCelebration();         } else if (!isAllHigh && isFullCelebration) {             stopCelebration();         }     }      function gameOver() {         gameState.isDead = true;         clearInterval(decayInterval);                  const avatar = document.getElementById('pet-emoji');         avatar.innerText = '😵'; // 死亡表情         avatar.className = 'pet-emoji dead';                  // 禁用按钮         document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);                  // 显示重启按钮         document.getElementById('restart-btn-container').classList.remove('hidden');                  saveGame();     }      function restartGame() {         // 清除数据         localStorage.removeItem('petGameData');         // 重置状态对象         gameState = {             exists: false,             name: '',             type: '🐶',             hunger: 100,             happiness: 100,             cleanliness: 100,             isDead: false         };                  // 刷新页面重新开始         location.reload();     }      // --- UI 更新 ---      function updateUI() {         const avatar = document.getElementById('pet-emoji');                  // 更新数值条         updateBar('bar-hunger', gameState.hunger);         updateBar('bar-happiness', gameState.happiness);         updateBar('bar-clean', gameState.cleanliness);          if (gameState.isDead) return;          // 更新宠物表情和状态         // 逻辑：优先判断是否全满(>70)，其次判断是否有任意项低(<20)                  const isAllHigh = gameState.hunger > 70 && gameState.happiness > 70 && gameState.cleanliness > 70;         const isAnyLow = gameState.hunger < 20 || gameState.happiness < 20 || gameState.cleanliness < 20;          // 移除旧状态类         avatar.classList.remove('low-energy', 'high-energy');          if (isAllHigh) {             // 开心模式             if (gameState.type === '🐶') avatar.innerText = '🐶';             else if (gameState.type === '🐱') avatar.innerText = '🐱';             else if (gameState.type === '🐰') avatar.innerText = '🐰';             else avatar.innerText = '🐼';                          avatar.classList.add('high-energy');             spawnFloatingIcon('❤️', true); // 偶尔飘爱心         } else if (isAnyLow) {             // 难过模式             if (gameState.type === '🐶') avatar.innerText = '🥺';             else if (gameState.type === '🐱') avatar.innerText = '😿';             else if (gameState.type === '🐰') avatar.innerText = '😢';             else avatar.innerText = '😟';              avatar.classList.add('low-energy');                          // 低能量时随机滴水滴             if (Math.random() > 0.7) spawnFloatingIcon('💧');         } else {             // 正常模式             avatar.innerText = gameState.type;         }     }      function updateBar(id, value) {         const bar = document.getElementById(id);         bar.style.width = value + '%';                  // 颜色变化         if (value > 70) bar.style.backgroundColor = '#4CAF50'; // 绿         else if (value > 30) bar.style.backgroundColor = '#FF9800'; // 橙         else bar.style.backgroundColor = '#f44336'; // 红     }      // --- 特效与动画 ---      function spawnFloatingIcon(icon, isHeart = false) {         const container = document.querySelector('.pet-display');         const el = document.createElement('div');         el.innerText = icon;         el.className = 'floating-icon';                  // 随机位置         const left = 40 + Math.random() * 20;         el.style.left = left + '%';         el.style.top = '50%';          container.appendChild(el);          // 动画结束后移除         setTimeout(() => {             el.remove();         }, 1000);     }      function triggerCelebration() {         isFullCelebration = true;         const canvas = document.getElementById('confetti-canvas');         canvas.style.display = 'block';         startConfetti();     }      function stopCelebration() {         isFullCelebration = false;         const canvas = document.getElementById('confetti-canvas');         canvas.style.display = 'none';         // 简单清空画布         const ctx = canvas.getContext('2d');         ctx.clearRect(0, 0, canvas.width, canvas.height);     }      // 简单的撒花逻辑     let confettiInterval;     function startConfetti() {         const canvas = document.getElementById('confetti-canvas');         const ctx = canvas.getContext('2d');         canvas.width = window.innerWidth;         canvas.height = window.innerHeight;          const particles = [];         const colors = ['#ff0', '#f00', '#0f0', '#00f', '#f0f', '#0ff'];          function createParticle() {             return {                 x: Math.random() * canvas.width,                 y: -10,                 color: colors[Math.floor(Math.random() * colors.length)],                 size: Math.random() * 10 + 5,                 speedY: Math.random() * 3 + 2,                 speedX: Math.random() * 4 - 2,                 rotation: Math.random() * 360,                 rotationSpeed: Math.random() * 10 - 5             };         }          function draw() {             if (!isFullCelebration) return;             ctx.clearRect(0, 0, canvas.width, canvas.height);              if (particles.length < 100) {                 particles.push(createParticle());             }              particles.forEach((p, index) => {                 p.y += p.speedY;                 p.x += p.speedX;                 p.rotation += p.rotationSpeed;                  ctx.save();                 ctx.translate(p.x, p.y);                 ctx.rotate(p.rotation * Math.PI / 180);                 ctx.fillStyle = p.color;                 ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);                 ctx.restore();                  if (p.y > canvas.height) {                     particles[index] = createParticle();                 }             });              requestAnimationFrame(draw);         }         draw();     }      // --- 数据持久化 ---      function saveGame() {         localStorage.setItem('petGameData', JSON.stringify(gameState));     }      function loadGame() {         const data = localStorage.getItem('petGameData');         if (data) {             gameState = JSON.parse(data);             if (gameState.exists) {                 showGameScreen();                 if (gameState.isDead) {                     // 如果进来时已经死亡，强制UI更新为死亡状态                     updateUI();                      // 手动触发死亡逻辑里的UI部分，因为checkStatus可能不会在加载时运行                     document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);                     document.getElementById('restart-btn-container').classList.remove('hidden');                 }             } else {                 document.getElementById('setup-screen').style.display = 'flex';             }         } else {             document.getElementById('setup-screen').style.display = 'flex';         }     }  </script> </body> </html>
