<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>响应式触屏钢琴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
      rel="stylesheet"
    />

    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              piano: {
                white: "#f8f9fa",
                black: "#212529",
                accent: "#3b82f6",
                high: "#ef4444",
                mid: "#8b5cf6",
                low: "#10b981",
              },
            },
            fontFamily: {
              piano: ["Arial", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer utilities {
        .key-shadow {
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
            0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .key-active {
          transform: scale(0.97);
          box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }
        .piano-container {
          max-width: 900px;
        }
      }
    </style>
  </head>
  <body
    class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-piano"
  >
    <div class="text-center mb-6">
      <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold text-gray-800 mb-2">
        触屏钢琴
      </h1>
      <p class="text-gray-600 text-[clamp(1rem,2vw,1.2rem)]">
        点击或触摸琴键演奏音乐
      </p>
    </div>

    <!-- 钢琴容器 -->
    <div
      class="piano-container w-full mx-auto bg-white rounded-xl shadow-lg p-4 md:p-6"
    >
      <!-- 当前音高显示 -->
      <div class="flex justify-center mb-4">
        <div
          id="pitch-display"
          class="bg-piano-mid text-white px-4 py-2 rounded-full text-lg font-medium"
        >
          当前音高: 中音
        </div>
      </div>

      <!-- 7个音符键 - 哆来咪法索拉西 -->
      <div id="note-keys" class="grid grid-cols-7 gap-2 md:gap-3 mb-6">
        <!-- 哆 (C) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="1"
          data-sound="C"
        >
          <span>1</span>
          <span class="block text-xs mt-1">C</span>
        </div>

        <!-- 来 (D) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="2"
          data-sound="D"
        >
          <span>2</span>
          <span class="block text-xs mt-1">D</span>
        </div>

        <!-- 咪 (E) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="3"
          data-sound="E"
        >
          <span>3</span>
          <span class="block text-xs mt-1">E</span>
        </div>

        <!-- 法 (F) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="4"
          data-sound="F"
        >
          <span>4</span>
          <span class="block text-xs mt-1">F</span>
        </div>

        <!-- 索 (G) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="5"
          data-sound="G"
        >
          <span>5</span>
          <span class="block text-xs mt-1">G</span>
        </div>

        <!-- 拉 (A) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="6"
          data-sound="A"
        >
          <span>6</span>
          <span class="block text-xs mt-1">A</span>
        </div>

        <!-- 西 (B) -->
        <div
          class="note-key bg-piano-white key-shadow rounded-lg aspect-[3/4] flex items-center justify-center text-xl md:text-2xl font-bold text-gray-800 cursor-pointer transition-all duration-150"
          data-note="7"
          data-sound="B"
        >
          <span>7</span>
          <span class="block text-xs mt-1">B</span>
        </div>
      </div>

      <!-- 3个音高切换键 -->
      <div id="pitch-keys" class="grid grid-cols-3 gap-3">
        <!-- 高音 -->
        <div
          class="pitch-key bg-piano-high key-shadow rounded-lg aspect-[5/2] flex items-center justify-center text-xl md:text-2xl font-bold text-white cursor-pointer transition-all duration-150"
          data-pitch="high"
        >
          <i class="fa fa-arrow-up mr-2"></i>
          <span>高音</span>
        </div>

        <!-- 中音 -->
        <div
          class="pitch-key bg-piano-mid key-shadow rounded-lg aspect-[5/2] flex items-center justify-center text-xl md:text-2xl font-bold text-white cursor-pointer transition-all duration-150 active"
          data-pitch="mid"
        >
          <i class="fa fa-minus mr-2"></i>
          <span>中音</span>
        </div>

        <!-- 低音 -->
        <div
          class="pitch-key bg-piano-low key-shadow rounded-lg aspect-[5/2] flex items-center justify-center text-xl md:text-2xl font-bold text-white cursor-pointer transition-all duration-150"
          data-pitch="low"
        >
          <i class="fa fa-arrow-down mr-2"></i>
          <span>低音</span>
        </div>
      </div>
    </div>

    <div class="mt-6 text-center text-gray-500 text-sm">
      <p>提示: 在电脑上可以使用键盘 1-7 键演奏，Q/W/E 键切换音高</p>
    </div>

    <script>
      // 音频上下文用于生成声音
      let audioContext;
      let currentPitch = "mid"; // 默认中音
      const pitchOffsets = {
        high: 12, // 高八度
        mid: 0, // 中音
        low: -12, // 低八度
      };

      // 音符频率映射 (中音)
      const noteFrequencies = {
        C: 261.63, // 哆
        D: 293.66, // 来
        E: 329.63, // 咪
        F: 349.23, // 法
        G: 392.0, // 索
        A: 440.0, // 拉
        B: 493.88, // 西
      };

      // 初始化音频上下文
      function initAudioContext() {
        if (!audioContext) {
          audioContext = new (window.AudioContext ||
            window.webkitAudioContext)();
        }
      }

      // 播放音符
      function playNote(sound) {
        initAudioContext();

        // 根据当前音高计算频率
        const baseFrequency = noteFrequencies[sound];
        const offset = pitchOffsets[currentPitch];
        const frequency = baseFrequency * Math.pow(2, offset / 12);

        // 创建振荡器和增益节点
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(
          frequency,
          audioContext.currentTime
        );

        // 设置音量 envelope
        gainNode.gain.setValueAtTime(0, audioContext.currentTime);
        gainNode.gain.linearRampToValueAtTime(
          0.5,
          audioContext.currentTime + 0.01
        );
        gainNode.gain.linearRampToValueAtTime(
          0,
          audioContext.currentTime + 0.3
        );

        // 连接节点并播放
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.3);
      }

      // 切换音高
      function setPitch(pitch) {
        currentPitch = pitch;

        // 更新UI
        document.querySelectorAll(".pitch-key").forEach((key) => {
          key.classList.remove("active", "scale-95");
        });
        document
          .querySelector(`.pitch-key[data-pitch="${pitch}"]`)
          .classList.add("active", "scale-95");

        // 更新显示
        const pitchNames = { high: "高音", mid: "中音", low: "低音" };
        const pitchColors = {
          high: "bg-piano-high",
          mid: "bg-piano-mid",
          low: "bg-piano-low",
        };

        const display = document.getElementById("pitch-display");
        display.textContent = `当前音高: ${pitchNames[pitch]}`;
        display.className = "";
        display.classList.add(
          pitchColors[pitch],
          "text-white",
          "px-4",
          "py-2",
          "rounded-full",
          "text-lg",
          "font-medium"
        );
      }

      // 为琴键添加事件监听
      document.querySelectorAll(".note-key").forEach((key) => {
        // 鼠标/触摸开始
        key.addEventListener("mousedown", () => {
          key.classList.add("key-active", "bg-gray-200");
          playNote(key.dataset.sound);
        });

        key.addEventListener("touchstart", (e) => {
          e.preventDefault(); // 防止触摸事件的默认行为
          key.classList.add("key-active", "bg-gray-200");
          playNote(key.dataset.sound);
        });

        // 鼠标/触摸结束
        key.addEventListener("mouseup", () => {
          key.classList.remove("key-active", "bg-gray-200");
        });

        key.addEventListener("touchend", () => {
          key.classList.remove("key-active", "bg-gray-200");
        });

        // 鼠标离开
        key.addEventListener("mouseleave", () => {
          key.classList.remove("key-active", "bg-gray-200");
        });
      });

      // 为音高键添加事件监听
      document.querySelectorAll(".pitch-key").forEach((key) => {
        key.addEventListener("click", () => {
          setPitch(key.dataset.pitch);
        });

        key.addEventListener("touchstart", (e) => {
          e.preventDefault();
          setPitch(key.dataset.pitch);
        });
      });

      // 键盘支持
      document.addEventListener("keydown", (e) => {
        // 数字1-7对应音符
        const noteKeys = {
          1: "C",
          2: "D",
          3: "E",
          4: "F",
          5: "G",
          6: "A",
          7: "B",
        };

        // 音高切换键 Q(高音), W(中音), E(低音)
        const pitchKeys = {
          q: "high",
          w: "mid",
          e: "low",
        };

        // 播放音符
        if (noteKeys[e.key]) {
          e.preventDefault();
          playNote(noteKeys[e.key]);

          // 高亮对应的琴键
          const key = document.querySelector(
            `.note-key[data-sound="${noteKeys[e.key]}"]`
          );
          if (key) {
            key.classList.add("key-active", "bg-gray-200");
            setTimeout(() => {
              key.classList.remove("key-active", "bg-gray-200");
            }, 150);
          }
        }

        // 切换音高
        if (pitchKeys[e.key]) {
          e.preventDefault();
          setPitch(pitchKeys[e.key]);
        }
      });
    </script>
  </body>
</html>
