<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萌宠养成日记</title>
    <style>
        :root {
            --primary-color: #ff9a9e;
            --bg-color: #fecfef;
            --card-bg: #ffffff;
            --text-color: #555;
            --bar-bg: #eee;
            --feed-color: #ff6b6b;
            --play-color: #4ecdc4;
            --clean-color: #45b7d1;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Varela Round', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fecfef 0%, #a1c4fd 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 选宠界面 */
        #setup-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .pet-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .pet-option {
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 10px;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .pet-option:hover, .pet-option.selected {
            transform: scale(1.2);
            background: #fff0f5;
            border-color: var(--primary-color);
        }

        input[type="text"] {
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #eee;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 游戏界面 */
        #game-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pet-name {
            font-size: 20px;
            font-weight: bold;
        }

        .restart-btn {
            font-size: 12px;
            background: #eee;
            color: #666;
            padding: 5px 15px;
        }

        /* 宠物展示区 */
        .pet-stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pet-emoji {
            font-size: 100px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 2;
            cursor: pointer;
        }

        /* 状态条 */
        .stats-container {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .stat-label {
            width: 50px;
            font-size: 14px;
        }

        .progress-bar {
            flex: 1;
            height: 12px;
            background: var(--bar-bg);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 10px;
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            transition: width 0.5s, background-color 0.5s;
        }

        .stat-value {
            width: 30px;
            font-size: 12px;
            text-align: right;
        }

        /* 按钮区 */
        .actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            border: none;
            padding: 15px 0;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.3s;
        }

        .action-btn:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-feed { background: var(--feed-color); }
        .btn-play { background: var(--play-color); }
        .btn-clean { background: var(--clean-color); }

        .action-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* 动画与特效 */
        
        /* 通用浮动动画 */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 10;
        }

        /* 宠物动画状态 */
        .pet-bounce {
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* 开心状态 */
        .mood-happy .pet-emoji {
            animation: happyJump 2s infinite;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
        }

        @keyframes happyJump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
        }

        /* 难过/生病状态 */
        .mood-sad .pet-emoji {
            filter: grayscale(0.5) brightness(0.8);
            transform: scale(0.9) translateY(10px);
            animation: sadBreathe 3s infinite ease-in-out;
        }

        @keyframes sadBreathe {
            0%, 100% { transform: scale(0.9) translateY(10px); }
            50% { transform: scale(0.9) translateY(15px); }
        }

        /* 死亡状态 */
        .mood-dead .pet-emoji {
            transform: rotate(90deg) scale(0.8);
            filter: grayscale(1);
        }
        
        .game-over-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            border-radius: 20px;
        }

        /* 庆祝动画 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 20;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* 雨滴 */
        .tear {
            position: absolute;
            top: 60px;
            right: 40%;
            font-size: 20px;
            color: #4ecdc4;
            animation: tearDrop 2s infinite;
        }
        @keyframes tearDrop {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(40px); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 响应式调整 */
        @media (max-height: 600px) {
            .pet-emoji { font-size: 70px; }
            .stats-container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 初始设置界面 -->
    <div id="setup-screen">
        <h2>🎮 萌宠养成</h2>
        <p>请选择你的小伙伴</p>
        <div class="pet-options">
            <div class="pet-option selected" onclick="selectPet(this)">🐶</div>
            <div class="pet-option" onclick="selectPet(this)">🐱</div>
            <div class="pet-option" onclick="selectPet(this)">🐰</div>
            <div class="pet-option" onclick="selectPet(this)">🐼</div>
            <div class="pet-option" onclick="selectPet(this)">🦊</div>
        </div>
        <p>给它起个名字吧</p>
        <input type="text" id="pet-name-input" placeholder="例如：小白" maxlength="6">
        <button class="btn" onclick="startGame()">开始养成</button>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-screen">
        <div class="header">
            <div class="pet-name" id="display-name">宠物名称</div>
            <button class="btn restart-btn" onclick="resetGame()">重新开始</button>
        </div>

        <div class="pet-stage" id="pet-stage">
            <div class="pet-emoji" id="pet-emoji">🐶</div>
            <div class="tear" id="tear" style="display:none;">💧</div>
        </div>

        <div class="stats-container">
            <div class="stat-row">
                <span class="stat-label">🍖 饱食</span>
                <div class="progress-bar"><div class="progress-fill" id="bar-food" style="background: var(--feed-color);"></div></div>
                <span class="stat-value" id="val-food">100</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🎾 快乐</span>
                <div class="progress-bar"><div class="progress-fill" id="bar-happy" style="background: var(--play-color);"></div></div>
                <span class="stat-value" id="val-happy">100</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🧼 清洁</span>
                <div class="progress-bar"><div class="progress-fill" id="bar-clean" style="background: var(--clean-color);"></div></div>
                <span class="stat-value" id="val-clean">100</span>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn btn-feed" onclick="performAction('food')">
                <span>🍖</span> 喂食
            </button>
            <button class="action-btn btn-play" onclick="performAction('happy')">
                <span>🎾</span> 玩耍
            </button>
            <button class="action-btn btn-clean" onclick="performAction('clean')">
                <span>🧼</span> 清洁
            </button>
        </div>

        <div class="game-over-overlay" id="game-over-overlay">
            <h2>宠物生病了😢</h2>
            <p>需要重新开始照顾它吗？</p>
            <button class="btn" onclick="resetGame()">重新开始</button>
        </div>
    </div>
</div>

<script>
    // 游戏状态
    let gameState = {
        isPlaying: false,
        petType: '🐶',
        petName: '',
        stats: {
            food: 100,
            happy: 100,
            clean: 100
        },
        lastLogin: Date.now()
    };

    let gameLoop;
    let selectedPetElement = document.querySelector('.pet-option.selected');

    // 初始化
    window.onload = function() {
        loadGame();
    };

    // 选择宠物
    function selectPet(el) {
        document.querySelectorAll('.pet-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedPetElement = el;
    }

    // 开始游戏
    function startGame() {
        const nameInput = document.getElementById('pet-name-input');
        const name = nameInput.value.trim() || '小可爱';
        
        gameState.petType = selectedPetElement.innerText;
        gameState.petName = name;
        gameState.stats = { food: 100, happy: 100, clean: 100 };
        gameState.isPlaying = true;
        
        saveGame();
        initGameScreen();
    }

    // 初始化游戏界面
    function initGameScreen() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        document.getElementById('pet-emoji').innerText = gameState.petType;
        document.getElementById('display-name').innerText = gameState.petName;
        
        updateUI();
        startGameLoop();
    }

    // 游戏主循环（数值衰减）
    function startGameLoop() {
        if (gameLoop) clearInterval(gameLoop);
        
        // 每5秒衰减一次
        gameLoop = setInterval(() => {
            if (!gameState.isPlaying) return;

            // 模拟离线时间（可选：如果想做得更复杂可以计算离线时间，这里只做在线衰减）
            gameState.stats.food = Math.max(0, gameState.stats.food - 2);
            gameState.stats.happy = Math.max(0, gameState.stats.happy - 2);
            gameState.stats.clean = Math.max(0, gameState.stats.clean - 2);

            checkStatus();
            updateUI();
            saveGame();

        }, 5000);
    }

    // 执行动作
    function performAction(type) {
        if (!gameState.isPlaying) return;

        const petEmoji = document.getElementById('pet-emoji');
        const stage = document.getElementById('pet-stage');
        
        // 数值增加
        let increase = 15;
        if (type === 'food') gameState.stats.food = Math.min(100, gameState.stats.food + increase);
        if (type === 'happy') gameState.stats.happy = Math.min(100, gameState.stats.happy + increase);
        if (type === 'clean') gameState.stats.clean = Math.min(100, gameState.stats.clean + increase);

        // 动画：弹跳
        petEmoji.classList.remove('pet-bounce');
        void petEmoji.offsetWidth; // 触发重绘
        petEmoji.classList.add('pet-bounce');

        // 动画：飘出对应图标
        let icon = '';
        if (type === 'food') icon = '🍖';
        if (type === 'happy') icon = '⭐';
        if (type === 'clean') icon = '🛀';
        
        createParticle(icon, stage);

        checkStatus();
        updateUI();
        saveGame();
    }

    // 创建浮动粒子
    function createParticle(icon, container) {
        const p = document.createElement('div');
        p.innerText = icon;
        p.className = 'particle';
        // 随机位置
        const left = 40 + Math.random() * 20;
        p.style.left = left + '%';
        p.style.top = '40%';
        
        container.appendChild(p);
        
        // 动画结束后移除
        setTimeout(() => {
            p.remove();
        }, 1000);
    }

    // 检查状态（心情与生死）
    function checkStatus() {
        const { food, happy, clean } = gameState.stats;
        const stage = document.getElementById('pet-stage');
        const petEmoji = document.getElementById('pet-emoji');
        const tear = document.getElementById('tear');

        // 移除旧状态
        stage.classList.remove('mood-happy', 'mood-sad', 'mood-dead');

        // 死亡判定
        if (food === 0 || happy === 0 || clean === 0) {
            gameState.isPlaying = false;
            stage.classList.add('mood-dead');
            document.getElementById('game-over-overlay').style.display = 'flex';
            disableButtons(true);
            return;
        }

        disableButtons(false);

        // 开心判定：全部 >= 70
        if (food >= 70 && happy >= 70 && clean >= 70) {
            stage.classList.add('mood-happy');
            tear.style.display = 'none';
            
            // 全满庆祝
            if (food === 100 && happy === 100 && clean === 100) {
                triggerCelebration();
            }
        } 
        // 难过判定：任意 < 20
        else if (food < 20 || happy < 20 || clean < 20) {
            stage.classList.add('mood-sad');
            tear.style.display = 'block';
        } else {
            // 正常
            tear.style.display = 'none';
        }
    }

    // 更新UI
    function updateUI() {
        // 更新数值
        document.getElementById('val-food').innerText = gameState.stats.food;
        document.getElementById('val-happy').innerText = gameState.stats.happy;
        document.getElementById('val-clean').innerText = gameState.stats.clean;

        // 更新进度条
        document.getElementById('bar-food').style.width = gameState.stats.food + '%';
        document.getElementById('bar-happy').style.width = gameState.stats.happy + '%';
        document.getElementById('bar-clean').style.width = gameState.stats.clean + '%';
    }

    // 禁用按钮
    function disableButtons(disabled) {
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.disabled = disabled;
        });
    }

    // 庆祝动画
    let celebrationTimeout;
    function triggerCelebration() {
        // 防止频繁触发
        if (celebrationTimeout) return;
        
        celebrationTimeout = setTimeout(() => { celebrationTimeout = null; }, 5000);

        // 飘爱心
        const stage = document.getElementById('pet-stage');
        const heartInterval = setInterval(() => {
            createParticle('❤️', stage);
        }, 300);

        // 撒花
        const confettiInterval = setInterval(() => {
            createConfetti();
        }, 200);

        setTimeout(() => {
            clearInterval(heartInterval);
            clearInterval(confettiInterval);
        }, 3000);
    }

    function createConfetti() {
        const container = document.getElementById('game-screen');
        const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#ff9a9e'];
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = '-10px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        
        container.appendChild(confetti);
        
        setTimeout(() => confetti.remove(), 4000);
    }

    // 重置游戏
    function resetGame() {
        gameState.isPlaying = false;
        localStorage.removeItem('petGameSave');
        
        // 重新加载页面或者重置UI
        location.reload();
    }

    // 本地存储
    function saveGame() {
        gameState.lastLogin = Date.now();
        localStorage.setItem('petGameSave', JSON.stringify(gameState));
    }

    function loadGame() {
        const saved = localStorage.getItem('petGameSave');
        if (saved) {
            gameState = JSON.parse(saved);
            if (gameState.isPlaying) {
                // 如果之前在游戏中，直接进入
                initGameScreen();
                // 可选：计算离线时间并减少饱食度
                const now = Date.now();
                const diffMinutes = (now - gameState.lastLogin) / 60000;
                if (diffMinutes > 1) {
                    // 离线每分钟减少1点饱食度
                    const offlineDecay = Math.floor(diffMinutes);
                    gameState.stats.food = Math.max(0, gameState.stats.food - offlineDecay);
                    checkStatus();
                    updateUI();
                    saveGame();
                }
            } else {
                // 如果游戏结束或未开始，显示选择界面（这里简单处理为刷新后若结束则显示选择）
                // 为了演示流畅，如果结束了也重置
                localStorage.removeItem('petGameSave');
            }
        }
    }
</script>

</body>
</html>
