<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萌宠养成计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #f0f8ff 50%, #fff0f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.4);
            overflow: hidden;
            position: relative;
        }
        
        .screen {
            display: none;
            padding: 24px;
            min-height: 500px;
        }
        
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            color: #ff6b9d;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 0 #ffe4ec;
        }
        
        h2 {
            color: #9b59b6;
            font-size: 1.3rem;
            margin-bottom: 16px;
        }
        
        .pet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        .pet-option {
            background: #fff;
            border: 3px solid #eee;
            border-radius: 16px;
            padding: 16px 8px;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .pet-option:hover {
            transform: scale(1.08);
            border-color: #ffb6c1;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }
        
        .pet-option.selected {
            border-color: #ff6b9d;
            background: #fff0f5;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
        }
        
        .pet-option span {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }
        
        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #666;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #ff6b9d;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #a8e6cf, #88d8b0);
            color: white;
            box-shadow: 0 4px 15px rgba(136, 216, 176, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff7675, #d63031);
            color: white;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
        }
        
        /* Game Screen Styles */
        .pet-display {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .pet-emoji {
            font-size: 6rem;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }
        
        .pet-emoji.dead {
            animation: none;
            filter: grayscale(1);
            transform: rotate(90deg);
        }
        
        .pet-emoji.sad {
            animation: shake 0.5s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .pet-name-display {
            font-size: 1.5rem;
            color: #333;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .stats-container {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .stat-item {
            margin-bottom: 12px;
        }
        
        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #555;
        }
        
        .stat-bar {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .stat-fill.fullness {
            background: linear-gradient(90deg, #ff9a9e, #fecfef);
        }
        
        .stat-fill.happiness {
            background: linear-gradient(90deg, #a8edea, #fed6e3);
        }
        
        .stat-fill.cleanliness {
            background: linear-gradient(90deg, #d299c2, #fef9d7);
        }
        
        .stat-fill.danger {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a) !important;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-btn {
            flex: 1;
            min-width: 80px;
            max-width: 110px;
            padding: 12px 8px;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .action-btn .icon {
            font-size: 1.5rem;
        }
        
        .action-btn.feed {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #8b4513;
        }
        
        .action-btn.play {
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            color: #1e3a8a;
        }
        
        .action-btn.clean {
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            color: #166534;
        }
        
        .action-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .restart-btn {
            margin-top: 20px;
            display: none;
        }
        
        .restart-btn.show {
            display: block;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            display: none;
        }
        
        .status-message.show {
            display: block;
        }
        
        .status-message.warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-message.happy {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.dead {
            background: #f8d7da;
            color: #721c24;
        }
        
        .timer-info {
            font-size: 0.8rem;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Selection Screen -->
        <div class="screen active" id="selectionScreen">
            <h1>🐾 萌宠养成计划 🐾</h1>
            <h2>选择你的宠物</h2>
            <div class="pet-grid" id="petGrid">
                <div class="pet-option" data-pet="🐱"><span>小猫咪</span></div>
                <div class="pet-option" data-pet="🐶"><span>小狗狗</span></div>
                <div class="pet-option" data-pet="🐰"><span>小兔兔</span></div>
                <div class="pet-option" data-pet="🐼"><span>小熊猫</span></div>
                <div class="pet-option" data-pet="🐸"><span>小青蛙</span></div>
                <div class="pet-option" data-pet="🦊"><span>小狐狸</span></div>
            </div>
            <div class="input-group">
                <label>给宠物起个名字吧：</label>
                <input type="text" id="petNameInput" placeholder="输入名字" maxlength="10">
            </div>
            <button class="btn btn-primary" id="startBtn">开始养成</button>
        </div>
        
        <!-- Game Screen -->
        <div class="screen" id="gameScreen">
            <h1>🏠 宠物之家</h1>
            <div class="pet-display">
                <div class="pet-emoji" id="petEmoji">🐱</div>
                <div class="pet-name-display" id="petNameDisplay">小明</div>
            </div>
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-label">
                        <span>🍖 饱食度</span>
                        <span id="fullnessValue">100</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill fullness" id="fullnessBar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>😊 快乐度</span>
                        <span id="happinessValue">100</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill happiness" id="happinessBar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>✨ 清洁度</span>
                        <span id="cleanlinessValue">100</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill cleanliness" id="cleanlinessBar" style="width: 100%"></div>
                    </div>
                </div>
            </div>
            <div class="actions" id="actionButtons">
                <button class="action-btn feed" onclick="feedPet()">
                    <span class="icon">🍖</span>
                    <span>喂食</span>
                </button>
                <button class="action-btn play" onclick="playPet()">
                    <span class="icon">🎾</span>
                    <span>玩耍</span>
                </button>
                <button class="action-btn clean" onclick="cleanPet()">
                    <span class="icon">🛁</span>
                    <span>清洁</span>
                </button>
            </div>
            <div class="status-message" id="statusMessage"></div>
            <button class="btn btn-danger restart-btn" id="restartBtn" onclick="restartGame()">🔄 重新开始</button>
            <div class="timer-info">数值每5秒自动减少</div>
        </div>
    </div>
    
    <script>
        // Game State
        let gameState = {
            petType: null,
            petName: '',
            fullness: 100,
            happiness: 100,
            cleanliness: 100,
            isDead: false,
            lastUpdate: Date.now()
        };
        
        let gameInterval = null;
        
        // DOM Elements
        const selectionScreen = document.getElementById('selectionScreen');
        const gameScreen = document.getElementById('gameScreen');
        const petGrid = document.getElementById('petGrid');
        const petNameInput = document.getElementById('petNameInput');
        const startBtn = document.getElementById('startBtn');
        const petEmoji = document.getElementById('petEmoji');
        const petNameDisplay = document.getElementById('petNameDisplay');
        const actionButtons = document.getElementById('actionButtons');
        const restartBtn = document.getElementById('restartBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        // Initialize
        function init() {
            loadGame();
            setupEventListeners();
        }
        
        // Setup Event Listeners
        function setupEventListeners() {
            // Pet selection
            petGrid.addEventListener('click', (e) => {
                const option = e.target.closest('.pet-option');
                if (option) {
                    document.querySelectorAll('.pet-option').forEach(p => p.classList.remove('selected'));
                    option.classList.add('selected');
                    gameState.petType = option.dataset.pet;
                }
            });
            
            // Start button
            startBtn.addEventListener('click', startGame);
            
            // Enter key for name input
            petNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    startGame();
                }
            });
        }
        
        // Start Game
        function startGame() {
            const name = petNameInput.value.trim() || '小可爱';
            
            if (!gameState.petType) {
                alert('请先选择一个宠物！');
                return;
            }
            
            gameState.petName = name;
            gameState.fullness = 100;
            gameState.happiness = 100;
            gameState.cleanliness = 100;
            gameState.isDead = false;
            gameState.lastUpdate = Date.now();
            
            saveGame();
            showGameScreen();
            startGameLoop();
        }
        
        // Show Game Screen
        function showGameScreen() {
            selectionScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            petEmoji.textContent = gameState.petType;
            petEmoji.classList.remove('dead', 'sad');
            petNameDisplay.textContent = gameState.petName;
            
            updateUI();
        }
        
        // Game Loop
        function startGameLoop() {
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            gameInterval = setInterval(() => {
                if (gameState.isDead) return;
                
                // Decrease stats
                gameState.fullness = Math.max(0, gameState.fullness - 2);
                gameState.happiness = Math.max(0, gameState.happiness - 2);
                gameState.cleanliness = Math.max(0, gameState.cleanliness - 2);
                
                saveGame();
                updateUI();
                checkStatus();
            }, 5000);
        }
        
        // Update UI
        function updateUI() {
            // Update values
            document.getElementById('fullnessValue').textContent = gameState.fullness;
            document.getElementById('happinessValue').textContent = gameState.happiness;
            document.getElementById('cleanlinessValue').textContent = gameState.cleanliness;
            
            // Update bars
            const fullnessBar = document.getElementById('fullnessBar');
            const happinessBar = document.getElementById('happinessBar');
            const cleanlinessBar = document.getElementById('cleanlinessBar');
            
            fullnessBar.style.width = gameState.fullness + '%';
            happinessBar.style.width = gameState.happiness + '%';
            cleanlinessBar.style.width = gameState.cleanliness + '%';
            
            // Danger state
            fullnessBar.classList.toggle('danger', gameState.fullness < 20);
            happinessBar.classList.toggle('danger', gameState.happiness < 20);
            cleanlinessBar.classList.toggle('danger', gameState.cleanliness < 20);
        }
        
        // Check Pet Status
        function checkStatus() {
            statusMessage.className = 'status-message';
            
            // Check death
            if (gameState.fullness === 0 || gameState.happiness === 0 || gameState.cleanliness === 0) {
                gameState.isDead = true;
                petEmoji.textContent = '💀';
                petEmoji.classList.add('dead');
                actionButtons.style.pointerEvents = 'none';
                actionButtons.style.opacity = '0.5';
                restartBtn.classList.add('show');
                
                statusMessage.textContent = '😢 宠物生病了...请重新开始！';
                statusMessage.classList.add('show', 'dead');
                
                if (gameInterval) {
                    clearInterval(gameInterval);
                }
                saveGame();
                return;
            }
            
            // Check sad
            if (gameState.fullness < 20 || gameState.happiness < 20 || gameState.cleanliness < 20) {
                petEmoji.textContent = getSadEmoji(gameState.petType);
                petEmoji.classList.add('sad');
                statusMessage.textContent = '😢 宠物很难过，快照顾它！';
                statusMessage.classList.add('show', 'warning');
                return;
            }
            
            // Check happy
            if (gameState.fullness >= 70 && gameState.happiness >= 70 && gameState.cleanliness >= 70) {
                petEmoji.textContent = getHappyEmoji(gameState.petType);
                petEmoji.classList.remove('sad');
                statusMessage.textContent = '😊 宠物非常开心！';
                statusMessage.classList.add('show', 'happy');
                return;
            }
            
            // Normal
            petEmoji.textContent = gameState.petType;
            petEmoji.classList.remove('sad');
            statusMessage.classList.remove('show');
        }
        
        // Get Happy Emoji
        function getHappyEmoji(pet) {
            const happyMap = {
                '🐱': '😺',
                '🐶': '🐕',
                '🐰': '🐰',
                '🐼': '🐼',
                '🐸': '🐸',
                '🦊': '🦊'
            };
            return happyMap[pet] || pet;
        }
        
        // Get Sad Emoji
        function getSadEmoji(pet) {
            const sadMap = {
                '🐱': '😿',
                '🐶': '🐶',
                '🐰': '🐰',
                '🐼': '🐼',
                '🐸': '🐸',
                '🦊': '🦊'
            };
            return sadMap[pet] || '😢';
        }
        
        // Feed Pet
        function feedPet() {
            if (gameState.isDead) return;
            gameState.fullness = Math.min(100, gameState.fullness + 20);
            saveGame();
            updateUI();
            checkStatus();
        }
        
        // Play with Pet
        function playPet() {
            if (gameState.isDead) return;
            gameState.happiness = Math.min(100, gameState.happiness + 20);
            // Playing makes pet a bit dirty
            gameState.cleanliness = Math.max(0, gameState.cleanliness - 5);
            saveGame();
            updateUI();
            checkStatus();
        }
        
        // Clean Pet
        function cleanPet() {
            if (gameState.isDead) return;
            gameState.cleanliness = Math.min(100, gameState.cleanliness + 20);
            saveGame();
            updateUI();
            checkStatus();
        }
        
        // Restart Game
        function restartGame() {
            gameState = {
                petType: gameState.petType,
                petName: gameState.petName,
                fullness: 100,
                happiness: 100,
                cleanliness: 100,
                isDead: false,
                lastUpdate: Date.now()
            };
            
            petEmoji.classList.remove('dead', 'sad');
            actionButtons.style.pointerEvents = 'auto';
            actionButtons.style.opacity = '1';
            restartBtn.classList.remove('show');
            
            saveGame();
            updateUI();
            checkStatus();
            startGameLoop();
        }
        
        // Save Game to LocalStorage
        function saveGame() {
            gameState.lastUpdate = Date.now();
            localStorage.setItem('petGame', JSON.stringify(gameState));
        }
        
        // Load Game from LocalStorage
        function loadGame() {
            const saved = localStorage.getItem('petGame');
            if (saved) {
                const data = JSON.parse(saved);
                
                // Calculate offline time and decrease stats
                const now = Date.now();
                const elapsed = now - data.lastUpdate;
                const decreaseCount = Math.floor(elapsed / 5000);
                
                if (decreaseCount > 0 && !data.isDead) {
                    data.fullness = Math.max(0, data.fullness - decreaseCount * 2);
                    data.happiness = Math.max(0, data.happiness - decreaseCount * 2);
                    data.cleanliness = Math.max(0, data.cleanliness - decreaseCount * 2);
                }
                
                gameState = data;
                
                if (gameState.petType) {
                    showGameScreen();
                    checkStatus();
                    
                    if (!gameState.isDead) {
                        startGameLoop();
                    }
                }
            }
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
