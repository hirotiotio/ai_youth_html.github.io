<!DOCTYPE html> <html lang="zh-CN"> <head>   <meta charset="UTF-8" />   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />   <title>帽子小勇士大冒险</title>   <style>     :root {       --bg1: #7fd3ff;       --bg2: #bdefff;       --panel: rgba(255, 255, 255, 0.9);       --accent: #ffb703;       --accent2: #ff6b6b;       --green: #4caf50;       --deep: #1f2d3d;       --white: #ffffff;       --shadow: rgba(0, 0, 0, 0.2);     }      * {       box-sizing: border-box;       -webkit-tap-highlight-color: transparent;     }      html, body {       margin: 0;       width: 100%;       height: 100%;       overflow: hidden;       font-family: "Arial", "Microsoft YaHei", sans-serif;       background: linear-gradient(180deg, var(--bg1), var(--bg2));       color: #123;     }      body {       display: flex;       align-items: stretch;       justify-content: center;     }      .app {       width: 100%;       height: 100%;       display: flex;       flex-direction: column;       position: relative;       overflow: hidden;     }      .top-ui {       position: absolute;       top: 0;       left: 0;       width: 100%;       z-index: 5;       display: flex;       justify-content: space-between;       align-items: flex-start;       gap: 8px;       padding: clamp(8px, 2vw, 16px);       pointer-events: none;     }      .hud-group {       display: flex;       flex-wrap: wrap;       gap: 8px;       max-width: 60%;     }      .hud-box {       background: rgba(255, 255, 255, 0.88);       border: 2px solid rgba(255, 255, 255, 0.95);       box-shadow: 0 6px 18px var(--shadow);       border-radius: 14px;       padding: 8px 12px;       min-height: 44px;       display: flex;       align-items: center;       gap: 8px;       font-size: clamp(12px, 2vw, 18px);       font-weight: 700;       backdrop-filter: blur(6px);     }      .hearts {       letter-spacing: 2px;       color: #ff4d6d;       font-size: clamp(16px, 2.4vw, 24px);     }      .canvas-wrap {       width: 100%;       height: 100%;       flex: 1;       position: relative;       overflow: hidden;     }      canvas {       width: 100%;       height: 100%;       display: block;       background: linear-gradient(180deg, #7fd3ff 0%, #bdefff 60%, #ddf7ff 100%);     }      .overlay {       position: absolute;       inset: 0;       z-index: 10;       display: flex;       align-items: center;       justify-content: center;       padding: 16px;       background: rgba(15, 35, 55, 0.22);     }      .panel {       width: min(92vw, 560px);       background: rgba(255, 255, 255, 0.94);       border-radius: 24px;       box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);       padding: clamp(16px, 3vw, 28px);       display: flex;       flex-direction: column;       gap: 12px;       text-align: center;     }      .title {       margin: 0;       font-size: clamp(24px, 5vw, 42px);       color: #0f3d5e;     }      .subtitle {       margin: 0;       font-size: clamp(14px, 2.4vw, 18px);       color: #35566f;       line-height: 1.6;     }      .info {       display: flex;       flex-wrap: wrap;       justify-content: center;       gap: 10px;     }      .tag {       background: #e8f7ff;       color: #145374;       border-radius: 999px;       padding: 8px 12px;       font-size: clamp(12px, 2vw, 15px);       font-weight: 700;     }      button {       border: none;       border-radius: 16px;       background: linear-gradient(180deg, #ffd166, #ffb703);       color: #4b3200;       font-weight: 800;       font-size: clamp(16px, 2.6vw, 22px);       padding: 14px 18px;       min-height: 52px;       cursor: pointer;       box-shadow: 0 8px 18px rgba(255, 183, 3, 0.35);       transition: transform 0.12s ease, box-shadow 0.12s ease;     }      button:active {       transform: scale(0.98);     }      .secondary {       background: linear-gradient(180deg, #90f1a8, #52c268);       color: #114d1e;       box-shadow: 0 8px 18px rgba(82, 194, 104, 0.28);     }      .danger {       background: linear-gradient(180deg, #ff9aa2, #ff6b6b);       color: #5e1212;       box-shadow: 0 8px 18px rgba(255, 107, 107, 0.28);     }      .countdown {       position: absolute;       inset: 0;       z-index: 9;       display: none;       align-items: center;       justify-content: center;       pointer-events: none;       font-size: clamp(64px, 20vw, 160px);       font-weight: 900;       color: #ffffff;       text-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);     }      .controls {       position: absolute;       left: 0;       right: 0;       bottom: 0;       z-index: 6;       display: none;       justify-content: space-between;       gap: 12px;       padding: 10px;       pointer-events: none;     }      .mobile-side {       display: flex;       gap: 10px;       pointer-events: auto;     }      .ctrl-btn {       width: min(18vw, 76px);       height: min(18vw, 76px);       min-width: 58px;       min-height: 58px;       border-radius: 18px;       background: rgba(255, 255, 255, 0.88);       border: 2px solid rgba(255, 255, 255, 0.95);       box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);       font-size: clamp(24px, 7vw, 34px);       font-weight: 900;       color: #234;       display: flex;       align-items: center;       justify-content: center;       user-select: none;       pointer-events: auto;     }      .ctrl-btn.jump {       background: rgba(255, 243, 205, 0.94);       color: #6a4700;     }      .hint {       position: absolute;       right: 10px;       bottom: calc(min(18vw, 76px) + 26px);       z-index: 6;       background: rgba(255, 255, 255, 0.86);       border-radius: 14px;       padding: 8px 10px;       font-size: clamp(11px, 2vw, 14px);       color: #35566f;       box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);     }      @media (hover: none), (pointer: coarse) {       .controls {         display: flex;       }     }   </style> </head> <body>   <div class="app">     <div class="top-ui">       <div class="hud-group">         <div class="hud-box"><span>分数</span><span id="scoreText">0</span></div>         <div class="hud-box"><span>生命</span><span class="hearts" id="livesText">❤❤❤</span></div>         <div class="hud-box"><span>用时</span><span id="timeText">0.0秒</span></div>       </div>       <div class="hud-group">         <div class="hud-box"><span>最高分</span><span id="bestScoreText">0</span></div>       </div>     </div>      <div class="canvas-wrap">       <canvas id="gameCanvas"></canvas>        <div class="countdown" id="countdown">3</div>        <div class="overlay" id="startOverlay">         <div class="panel">           <h1 class="title">帽子小勇士大冒险</h1>           <p class="subtitle">收集金币和星星, 踩扁蘑菇怪, 躲开陷阱, 冲向终点旗帜。</p>           <div class="info">             <div class="tag">方向键左右移动</div>             <div class="tag">空格键跳跃</div>             <div class="tag">手机可用屏幕按钮</div>           </div>           <button id="startBtn">开始游戏</button>         </div>       </div>        <div class="overlay" id="gameOverOverlay" style="display:none;">         <div class="panel">           <h2 class="title">游戏结束</h2>           <p class="subtitle" id="gameOverText">最终分数: 0</p>           <button class="danger" id="restartBtn">重新开始</button>         </div>       </div>        <div class="overlay" id="winOverlay" style="display:none;">         <div class="panel">           <h2 class="title">恭喜通关</h2>           <p class="subtitle" id="winText">总分: 0, 用时: 0秒</p>           <button class="secondary" id="playAgainBtn">再玩一次</button>         </div>       </div>        <div class="hint">电脑: 方向键和空格键</div>        <div class="controls">         <div class="mobile-side">           <div class="ctrl-btn" id="leftBtn">◀</div>           <div class="ctrl-btn" id="rightBtn">▶</div>         </div>         <div class="mobile-side">           <div class="ctrl-btn jump" id="jumpBtn">跳</div>         </div>       </div>     </div>   </div>    <script>     const canvas = document.getElementById("gameCanvas");     const ctx = canvas.getContext("2d");      const scoreText = document.getElementById("scoreText");     const livesText = document.getElementById("livesText");     const timeText = document.getElementById("timeText");     const bestScoreText = document.getElementById("bestScoreText");      const startOverlay = document.getElementById("startOverlay");     const gameOverOverlay = document.getElementById("gameOverOverlay");     const winOverlay = document.getElementById("winOverlay");     const gameOverText = document.getElementById("gameOverText");     const winText = document.getElementById("winText");     const countdownEl = document.getElementById("countdown");      const startBtn = document.getElementById("startBtn");     const restartBtn = document.getElementById("restartBtn");     const playAgainBtn = document.getElementById("playAgainBtn");      const leftBtn = document.getElementById("leftBtn");     const rightBtn = document.getElementById("rightBtn");     const jumpBtn = document.getElementById("jumpBtn");      let cw = 0;     let ch = 0;     let groundBase = 0;     let worldWidth = 0;     let cameraX = 0;     let frame = 0;     let lastTime = 0;     let elapsed = 0;      const gravity = 0.7;     const friction = 0.82;      const keys = {       left: false,       right: false,       jump: false     };      const STORAGE_KEY = "hatHeroSaveV1";      const game = {       state: "start",       canControl: false,       score: 0,       lives: 3,       bestScore: 0,       startTime: 0,       finishTime: 0,       countdown: 3     };      let player;     let platforms = [];     let pipes = [];     let gaps = [];     let collectibles = [];     let enemies = [];     let particles = [];     let effects = [];     let safeSpawns = [];     let flag = null;      function saveGame() {       const data = {         game,         player: {           x: player.x,           y: player.y,           vx: player.vx,           vy: player.vy,           lives: game.lives,           score: game.score         },         collectibles: collectibles.map(c => ({           x: c.x, y: c.y, type: c.type, collected: c.collected, anim: c.anim         })),         enemies: enemies.map(e => ({           x: e.x, y: e.y, dir: e.dir, dead: e.dead, squash: e.squash         })),         elapsed       };       localStorage.setItem(STORAGE_KEY, JSON.stringify(data));     }      function loadGame() {       const raw = localStorage.getItem(STORAGE_KEY);       if (!raw) return false;       try {         const data = JSON.parse(raw);         if (!data || !data.game) return false;         return data;       } catch {         return false;       }     }      function clearSave() {       localStorage.removeItem(STORAGE_KEY);     }      function resizeCanvas() {       const ratio = Math.min(window.devicePixelRatio || 1, 2);       cw = canvas.clientWidth = canvas.parentElement.clientWidth;       ch = canvas.clientHeight = canvas.parentElement.clientHeight;       canvas.width = Math.floor(cw * ratio);       canvas.height = Math.floor(ch * ratio);       ctx.setTransform(ratio, 0, 0, ratio, 0, 0);       groundBase = ch * 0.82;       worldWidth = cw * 5;       if (player) {         player.h = Math.max(42, ch * 0.09);         player.w = player.h * 0.6;       }     }      function createLevel() {       platforms = [];       pipes = [];       gaps = [];       collectibles = [];       enemies = [];       particles = [];       effects = [];       safeSpawns = [];        const groundH = Math.max(48, ch * 0.12);        const mainSegments = [         { x: 0, w: cw * 0.85 },         { x: cw * 1.05, w: cw * 0.8 },         { x: cw * 2.1, w: cw * 0.95 },         { x: cw * 3.35, w: cw * 0.75 },         { x: cw * 4.25, w: cw * 0.7 }       ];        for (const seg of mainSegments) {         platforms.push({           x: seg.x,           y: groundBase,           w: seg.w,           h: groundH,           type: "ground",           safe: true         });         safeSpawns.push({ x: seg.x + 40, y: groundBase - 80 });       }        gaps = [         { x: cw * 0.85, w: cw * 0.2 },         { x: cw * 1.85, w: cw * 0.25 },         { x: cw * 3.05, w: cw * 0.3 },         { x: cw * 4.1, w: cw * 0.15 }       ];        const plats = [         [cw * 0.35, groundBase - 90, 120, 20],         [cw * 0.65, groundBase - 160, 130, 20],         [cw * 1.2, groundBase - 110, 150, 20],         [cw * 1.55, groundBase - 190, 120, 20],         [cw * 2.35, groundBase - 120, 160, 20],         [cw * 2.75, groundBase - 220, 120, 20],         [cw * 3.55, groundBase - 100, 140, 20],         [cw * 3.85, groundBase - 180, 110, 20],         [cw * 4.45, groundBase - 130, 150, 20]       ];        plats.forEach(p => {         platforms.push({           x: p[0], y: p[1], w: p[2], h: p[3], type: "platform", safe: true         });         safeSpawns.push({ x: p[0] + 16, y: p[1] - 80 });       });        const bricks = [         [cw * 0.95, groundBase - 200],         [cw * 1.05, groundBase - 200],         [cw * 2.0, groundBase - 170],         [cw * 2.1, groundBase - 170],         [cw * 3.2, groundBase - 210],         [cw * 3.3, groundBase - 210],         [cw * 4.0, groundBase - 190]       ];        bricks.forEach(b => {         platforms.push({           x: b[0], y: b[1], w: 46, h: 46, type: "brick", safe: true         });       });        pipes = [         { x: cw * 1.42, y: groundBase - 70, w: 62, h: 70 },         { x: cw * 2.58, y: groundBase - 92, w: 68, h: 92 },         { x: cw * 3.72, y: groundBase - 82, w: 64, h: 82 }       ];        const coinPoints = [         [cw * 0.42, groundBase - 130],         [cw * 0.56, groundBase - 200],         [cw * 0.74, groundBase - 200],         [cw * 1.26, groundBase - 150],         [cw * 1.6, groundBase - 230],         [cw * 2.05, groundBase - 240],         [cw * 2.42, groundBase - 160],         [cw * 2.82, groundBase - 260],         [cw * 3.24, groundBase - 250],         [cw * 3.64, groundBase - 140],         [cw * 3.94, groundBase - 220],         [cw * 4.52, groundBase - 170]       ];        coinPoints.forEach(p => {         collectibles.push({           x: p[0], y: p[1], type: "coin", r: 14, collected: false, anim: 0         });       });        const starPoints = [         [cw * 1.72, groundBase - 250],         [cw * 3.0, groundBase - 260],         [cw * 4.62, groundBase - 190]       ];        starPoints.forEach(p => {         collectibles.push({           x: p[0], y: p[1], type: "star", r: 16, collected: false, anim: 0         });       });        enemies = [         createEnemy(cw * 0.7, groundBase - 34, 90),         createEnemy(cw * 1.3, groundBase - 34, 120),         createEnemy(cw * 2.42, groundBase - 154, 110),         createEnemy(cw * 3.58, groundBase - 34, 100),         createEnemy(cw * 4.48, groundBase - 164, 100)       ];        flag = {         x: worldWidth - 120,         y: groundBase - 180,         w: 16,         h: 180       };     }      function createEnemy(x, y, patrolWidth) {       return {         x,         y,         w: 38,         h: 34,         vx: 1.2,         dir: 1,         dead: false,         squash: 0,         patrolLeft: x - patrolWidth / 2,         patrolRight: x + patrolWidth / 2       };     }      function resetPlayer() {       player = {         x: 50,         y: groundBase - 80,         w: Math.max(28, ch * 0.054),         h: Math.max(46, ch * 0.09),         vx: 0,         vy: 0,         speed: Math.max(3.6, cw * 0.0038),         jumpPower: Math.max(12.5, ch * 0.022),         onGround: false,         canJump: true,         facing: 1,         walkTime: 0,         invincible: 0,         hurtFlash: 0,         alive: true,         squash: 1,         stretch: 1       };     }      function initNewGame() {       resizeCanvas();       createLevel();       resetPlayer();       cameraX = 0;       frame = 0;       elapsed = 0;       game.score = 0;       game.lives = 3;       game.canControl = false;       game.finishTime = 0;       game.state = "start";       updateHUD();       game.bestScore = Number(localStorage.getItem("hatHeroBestScore") || 0);       bestScoreText.textContent = game.bestScore;       clearSave();     }      function restoreGame(saved) {       resizeCanvas();       createLevel();       resetPlayer();        game.state = saved.game.state || "start";       game.canControl = saved.game.canControl || false;       game.score = saved.game.score || 0;       game.lives = saved.game.lives || 3;       game.bestScore = Number(localStorage.getItem("hatHeroBestScore") || 0);       elapsed = saved.elapsed || 0;        if (saved.player) {         player.x = saved.player.x;         player.y = saved.player.y;         player.vx = saved.player.vx;         player.vy = saved.player.vy;       }        if (Array.isArray(saved.collectibles)) {         saved.collectibles.forEach((s, i) => {           if (collectibles[i]) {             collectibles[i].collected = s.collected;             collectibles[i].anim = s.anim || 0;           }         });       }        if (Array.isArray(saved.enemies)) {         saved.enemies.forEach((s, i) => {           if (enemies[i]) {             enemies[i].x = s.x;             enemies[i].y = s.y;             enemies[i].dir = s.dir;             enemies[i].dead = s.dead;             enemies[i].squash = s.squash || 0;           }         });       }        cameraX = Math.max(0, Math.min(player.x - cw * 0.35, worldWidth - cw));       updateHUD();       bestScoreText.textContent = game.bestScore;     }      function updateHUD() {       scoreText.textContent = game.score;       livesText.textContent = "❤".repeat(Math.max(0, game.lives)) || "无";       timeText.textContent = `${elapsed.toFixed(1)}秒`;     }      function startCountdown(callback) {       let count = 3;       countdownEl.style.display = "flex";       countdownEl.textContent = count;       game.canControl = false;        const timer = setInterval(() => {         count--;         if (count > 0) {           countdownEl.textContent = count;         } else if (count === 0) {           countdownEl.textContent = "开始";         } else {           clearInterval(timer);           countdownEl.style.display = "none";           game.canControl = true;           callback && callback();         }       }, 1000);     }      function playTone(freq = 440, duration = 0.08, type = "sine", volume = 0.03) {       try {         const audioCtx = playTone.ctx || (playTone.ctx = new (window.AudioContext || window.webkitAudioContext)());         const osc = audioCtx.createOscillator();         const gain = audioCtx.createGain();         osc.type = type;         osc.frequency.value = freq;         gain.gain.value = volume;         osc.connect(gain);         gain.connect(audioCtx.destination);         osc.start();         gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);         osc.stop(audioCtx.currentTime + duration);       } catch {}     }      function coinSound() {       playTone(920, 0.05, "triangle", 0.05);       setTimeout(() => playTone(1240, 0.06, "triangle", 0.04), 40);     }      function hurtSound() {       playTone(220, 0.1, "sawtooth", 0.05);       setTimeout(() => playTone(160, 0.14, "sawtooth", 0.04), 50);     }      function winSound() {       [660, 880, 1100, 1320].forEach((f, i) => {         setTimeout(() => playTone(f, 0.12, "triangle", 0.05), i * 120);       });     }      function stompSound() {       playTone(180, 0.07, "square", 0.04);     }      function rectsOverlap(a, b) {       return a.x < b.x + b.w &&              a.x + a.w > b.x &&              a.y < b.y + b.h &&              a.y + a.h > b.y;     }      function circleRectOverlap(c, r) {       const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));       const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));       const dx = c.x - cx;       const dy = c.y - cy;       return dx * dx + dy * dy <= c.r * c.r;     }      function addDust(x, y, count = 3) {       for (let i = 0; i < count; i++) {         particles.push({           x, y,           vx: (Math.random() - 0.5) * 2,           vy: -Math.random() * 1.8,           life: 22 + Math.random() * 12,           size: 4 + Math.random() * 5,           color: "rgba(180,180,180,0.6)"         });       }     }      function addSpark(x, y, color, count = 10) {       for (let i = 0; i < count; i++) {         const angle = Math.random() * Math.PI * 2;         const speed = 1 + Math.random() * 3;         particles.push({           x, y,           vx: Math.cos(angle) * speed,           vy: Math.sin(angle) * speed,           life: 26 + Math.random() * 18,           size: 3 + Math.random() * 4,           color         });       }     }      function addFloatingText(text, x, y, color) {       effects.push({         type: "text",         text,         x,         y,         vy: -0.6,         life: 48,         color       });     }      function nearestSafeSpawn() {       let best = safeSpawns[0];       let bestDist = Infinity;       for (const s of safeSpawns) {         const d = Math.abs(s.x - player.x);         if (d < bestDist && s.x <= player.x + 120) {           bestDist = d;           best = s;         }       }       return best || { x: 50, y: groundBase - 80 };     }      function hurtPlayer() {       if (player.invincible > 0 || game.state !== "playing") return;       game.lives--;       player.invincible = 120;       hurtSound();       updateHUD();       saveGame();        if (game.lives <= 0) {         endGame();         return;       }        const spawn = nearestSafeSpawn();       player.x = spawn.x;       player.y = spawn.y;       player.vx = 0;       player.vy = 0;       cameraX = Math.max(0, Math.min(player.x - cw * 0.35, worldWidth - cw));     }      function endGame() {       game.state = "gameover";       game.canControl = false;       gameOverText.textContent = `最终分数: ${game.score}`;       gameOverOverlay.style.display = "flex";       if (game.score > game.bestScore) {         game.bestScore = game.score;         localStorage.setItem("hatHeroBestScore", String(game.bestScore));         bestScoreText.textContent = game.bestScore;       }       clearSave();     }      function winGame() {       if (game.state !== "playing") return;       game.state = "win";       game.canControl = false;       winSound();       if (game.score > game.bestScore) {         game.bestScore = game.score;         localStorage.setItem("hatHeroBestScore", String(game.bestScore));         bestScoreText.textContent = game.bestScore;       }       winText.textContent = `总分: ${game.score}, 用时: ${elapsed.toFixed(1)}秒`;       winOverlay.style.display = "flex";       clearSave();     }      function startGameFlow(isRestart = false) {       if (isRestart) {         initNewGame();       } else {         resizeCanvas();         createLevel();         resetPlayer();         game.score = 0;         game.lives = 3;         elapsed = 0;         updateHUD();       }        startOverlay.style.display = "none";       gameOverOverlay.style.display = "none";       winOverlay.style.display = "none";       game.state = "countdown";       startCountdown(() => {         game.state = "playing";         game.startTime = performance.now();         saveGame();       });     }      function handleControls() {       if (!game.canControl || game.state !== "playing") return;        if (keys.left) {         player.vx -= 0.6;         player.facing = -1;       }       if (keys.right) {         player.vx += 0.6;         player.facing = 1;       }        player.vx = Math.max(-player.speed, Math.min(player.speed, player.vx));        if (!keys.left && !keys.right) {         player.vx *= friction;         if (Math.abs(player.vx) < 0.08) player.vx = 0;       }        if (keys.jump && player.canJump && player.onGround) {         player.vy = -player.jumpPower;         player.onGround = false;         player.canJump = false;         player.stretch = 1.25;       }     }      function updatePlayer() {       handleControls();        player.vy += gravity;       const prevX = player.x;       const prevY = player.y;        player.x += player.vx;       player.y += player.vy;       player.onGround = false;        const solids = [...platforms, ...pipes];        for (const s of solids) {         if (!rectsOverlap(player, s)) continue;          const fromTop = prevY + player.h <= s.y + 10 && player.vy >= 0;         const fromBottom = prevY >= s.y + s.h - 4 && player.vy < 0;         const fromLeft = prevX + player.w <= s.x + 8 && player.vx > 0;         const fromRight = prevX >= s.x + s.w - 8 && player.vx < 0;          if (fromTop) {           player.y = s.y - player.h;           player.vy = 0;           player.onGround = true;           player.canJump = true;           if (Math.abs(player.vx) > 0.4 && frame % 6 === 0) addDust(player.x + player.w / 2, player.y + player.h, 2);         } else if (fromBottom) {           player.y = s.y + s.h;           player.vy = 0.3;         } else if (fromLeft) {           player.x = s.x - player.w;           player.vx = 0;         } else if (fromRight) {           player.x = s.x + s.w;           player.vx = 0;         }       }        if (player.y > ch + 120) {         hurtPlayer();       }        player.walkTime += Math.abs(player.vx) * 0.2;       player.stretch += (1 - player.stretch) * 0.15;       player.squash += (1 - player.squash) * 0.15;        if (player.invincible > 0) player.invincible--;       cameraX = Math.max(0, Math.min(player.x - cw * 0.35, worldWidth - cw));     }      function updateCollectibles() {       collectibles.forEach(c => {         if (c.collected) {           c.anim++;           return;         }          const hit = circleRectOverlap(c, player);         if (hit) {           c.collected = true;           c.anim = 1;           if (c.type === "coin") {             game.score += 10;             coinSound();             addSpark(c.x, c.y, "rgba(255,215,0,0.9)", 10);             addFloatingText("+10", c.x, c.y, "#cc8a00");           } else {             game.score += 50;             playTone(980, 0.08, "triangle", 0.05);             addSpark(c.x, c.y, "rgba(255,255,160,0.95)", 18);             addFloatingText("+50", c.x, c.y, "#ff7b00");           }           updateHUD();           saveGame();         }       });     }      function updateEnemies() {       enemies.forEach(e => {         if (e.dead) {           e.squash++;           return;         }          e.x += e.vx * e.dir;          if (e.x < e.patrolLeft || e.x + e.w > e.patrolRight) {           e.dir *= -1;         }          const feetY = e.y + e.h + 2;         let supported = false;         for (const p of [...platforms, ...pipes]) {           if (feetY >= p.y && feetY <= p.y + p.h + 4 && e.x + e.w > p.x && e.x < p.x + p.w) {             supported = true;             break;           }         }         if (!supported) e.dir *= -1;          if (rectsOverlap(player, e) && player.invincible <= 0) {           const stomp = player.vy > 0 && player.y + player.h - 8 < e.y + 12;           if (stomp) {             e.dead = true;             player.vy = -10;             player.squash = 1.2;             player.stretch = 0.85;             game.score += 100;             stompSound();             addSpark(e.x + e.w / 2, e.y + e.h / 2, "rgba(150,90,40,0.8)", 12);             addFloatingText("+100", e.x + e.w / 2, e.y, "#8b4513");             updateHUD();             saveGame();           } else {             hurtPlayer();           }         }       });     }      function updateEffects() {       particles = particles.filter(p => {         p.x += p.vx;         p.y += p.vy;         p.vy += 0.03;         p.life--;         return p.life > 0;       });        effects = effects.filter(e => {         if (e.type === "text") {           e.y += e.vy;           e.life--;         }         return e.life > 0;       });     }      function updateFlag() {       const hit = rectsOverlap(player, {         x: flag.x - 10,         y: flag.y,         w: 40,         h: flag.h       });       if (hit) {         winGame();       }     }      function update(delta) {       if (game.state === "playing") {         elapsed += delta / 1000;         updatePlayer();         updateCollectibles();         updateEnemies();         updateEffects();         updateFlag();         updateHUD();         if (frame % 90 === 0) saveGame();       } else {         updateEffects();       }     }      function drawSky() {       const grad = ctx.createLinearGradient(0, 0, 0, ch);       grad.addColorStop(0, "#7fd3ff");       grad.addColorStop(0.7, "#d7f3ff");       grad.addColorStop(1, "#eefcff");       ctx.fillStyle = grad;       ctx.fillRect(0, 0, cw, ch);        drawCloud(120 - cameraX * 0.15, 80, 1.1);       drawCloud(320 - cameraX * 0.12, 130, 0.8);       drawCloud(620 - cameraX * 0.18, 90, 1.2);       drawCloud(920 - cameraX * 0.15, 150, 0.9);       drawCloud(1260 - cameraX * 0.13, 75, 1.15);     }      function drawCloud(x, y, scale) {       ctx.save();       ctx.translate((x % (cw + 250)) - 120, y);       ctx.scale(scale, scale);       ctx.fillStyle = "rgba(255,255,255,0.92)";       [[0,0,28],[25,-10,24],[50,0,22],[18,10,26],[42,12,20]].forEach(c => {         ctx.beginPath();         ctx.arc(c[0], c[1], c[2], 0, Math.PI * 2);         ctx.fill();       });       ctx.restore();     }      function drawHills() {       ctx.save();       ctx.translate(-cameraX * 0.25, 0);       ctx.fillStyle = "#8ed081";       for (let i = -1; i < 8; i++) {         const x = i * 240;         ctx.beginPath();         ctx.moveTo(x, groundBase + 20);         ctx.quadraticCurveTo(x + 120, groundBase - 120, x + 240, groundBase + 20);         ctx.closePath();         ctx.fill();       }       ctx.restore();        ctx.save();       ctx.translate(-cameraX * 0.5, 0);       ctx.fillStyle = "#62bd5b";       for (let i = -1; i < 10; i++) {         const x = i * 180;         ctx.beginPath();         ctx.moveTo(x, groundBase + 28);         ctx.quadraticCurveTo(x + 90, groundBase - 70, x + 180, groundBase + 28);         ctx.closePath();         ctx.fill();       }       ctx.restore();     }      function drawPlatforms() {       platforms.forEach(p => {         if (p.x + p.w < cameraX - 100 || p.x > cameraX + cw + 100) return;         const x = p.x - cameraX;         if (p.type === "ground") {           ctx.fillStyle = "#7a4f2a";           ctx.fillRect(x, p.y, p.w, p.h);           ctx.fillStyle = "#4caf50";           ctx.fillRect(x, p.y - 10, p.w, 14);           for (let i = 0; i < p.w; i += 28) {             ctx.fillStyle = i % 56 === 0 ? "#926238" : "#85552d";             ctx.fillRect(x + i, p.y + 12, 24, p.h - 12);           }         } else if (p.type === "platform") {           ctx.fillStyle = "#a06a3b";           roundRect(x, p.y, p.w, p.h, 8, true);           ctx.fillStyle = "#d79a55";           ctx.fillRect(x + 6, p.y + 4, p.w - 12, 6);         } else if (p.type === "brick") {           ctx.fillStyle = "#c96f42";           roundRect(x, p.y, p.w, p.h, 6, true);           ctx.strokeStyle = "#8a4b2d";           ctx.lineWidth = 2;           ctx.strokeRect(x + 1, p.y + 1, p.w - 2, p.h - 2);           ctx.beginPath();           ctx.moveTo(x, p.y + p.h / 2);           ctx.lineTo(x + p.w, p.y + p.h / 2);           ctx.moveTo(x + p.w / 2, p.y);           ctx.lineTo(x + p.w / 2, p.y + p.h);           ctx.stroke();         }       });        pipes.forEach(p => {         const x = p.x - cameraX;         ctx.fillStyle = "#2fb34f";         roundRect(x + 8, p.y, p.w - 16, p.h, 8, true);         ctx.fillStyle = "#49cc67";         roundRect(x, p.y - 12, p.w, 18, 8, true);         ctx.fillStyle = "rgba(255,255,255,0.18)";         ctx.fillRect(x + 10, p.y + 6, 8, p.h - 8);       });     }      function drawCollectibles() {       collectibles.forEach(c => {         if (c.x < cameraX - 50 || c.x > cameraX + cw + 50) return;         const x = c.x - cameraX;         const bob = Math.sin(frame * 0.08 + c.x * 0.01) * 4;          if (c.collected) {           const scale = Math.max(0, 1 - c.anim / 14);           if (scale <= 0) return;           ctx.save();           ctx.translate(x, c.y - c.anim * 2);           ctx.scale(scale, scale);           ctx.globalAlpha = scale;           if (c.type === "coin") drawCoin(0, 0, c.r, true);           else drawStar(0, 0, c.r, true);           ctx.restore();           return;         }          if (c.type === "coin") drawCoin(x, c.y + bob, c.r, false);         else drawStar(x, c.y + bob, c.r, false);       });     }      function drawCoin(x, y, r, noFlash) {       ctx.save();       ctx.translate(x, y);       const squish = 0.65 + Math.abs(Math.sin(frame * 0.15)) * 0.35;       ctx.scale(squish, 1);       ctx.fillStyle = "#ffd54a";       ctx.beginPath();       ctx.arc(0, 0, r, 0, Math.PI * 2);       ctx.fill();       ctx.fillStyle = "#ffef9f";       ctx.beginPath();       ctx.arc(-4, -4, r * 0.35, 0, Math.PI * 2);       ctx.fill();       ctx.strokeStyle = "#d99800";       ctx.lineWidth = 3;       ctx.stroke();       if (!noFlash) {         ctx.globalAlpha = 0.35 + 0.25 * Math.sin(frame * 0.22);         ctx.fillStyle = "#ffffff";         ctx.fillRect(-2, -r - 8, 4, 16);         ctx.fillRect(-8, -2, 16, 4);       }       ctx.restore();     }      function drawStar(x, y, r, noFlash) {       ctx.save();       ctx.translate(x, y);       ctx.rotate(frame * 0.03);       ctx.fillStyle = "#ffe35a";       ctx.beginPath();       for (let i = 0; i < 10; i++) {         const angle = Math.PI / 5 * i - Math.PI / 2;         const rad = i % 2 === 0 ? r : r * 0.45;         const px = Math.cos(angle) * rad;         const py = Math.sin(angle) * rad;         if (i === 0) ctx.moveTo(px, py);         else ctx.lineTo(px, py);       }       ctx.closePath();       ctx.fill();       ctx.strokeStyle = "#f3a400";       ctx.lineWidth = 2;       ctx.stroke();       if (!noFlash) {         ctx.globalAlpha = 0.4 + Math.sin(frame * 0.24) * 0.2;         ctx.strokeStyle = "#ffffff";         ctx.lineWidth = 2;         ctx.beginPath();         ctx.moveTo(-r - 8, 0);         ctx.lineTo(r + 8, 0);         ctx.moveTo(0, -r - 8);         ctx.lineTo(0, r + 8);         ctx.stroke();       }       ctx.restore();     }      function drawEnemy(e) {       const x = e.x - cameraX;       const squash = e.dead ? Math.max(0.25, 1 - e.squash / 16) : 1;       ctx.save();       ctx.translate(x + e.w / 2, e.y + e.h);       ctx.scale(1, squash);       ctx.translate(-(x + e.w / 2), -(e.y + e.h));        ctx.fillStyle = "#9b5d30";       ctx.beginPath();       ctx.ellipse(x + e.w / 2, e.y + e.h * 0.48, e.w / 2, e.h * 0.42, 0, Math.PI, 0);       ctx.fill();        ctx.fillStyle = "#d7b08a";       ctx.beginPath();       ctx.ellipse(x + e.w / 2, e.y + e.h * 0.72, e.w * 0.38, e.h * 0.24, 0, 0, Math.PI * 2);       ctx.fill();        ctx.fillStyle = "#ffffff";       ctx.fillRect(x + 10, e.y + 14, 5, 8);       ctx.fillRect(x + e.w - 15, e.y + 14, 5, 8);       ctx.fillStyle = "#222";       ctx.fillRect(x + 12, e.y + 17, 2, 4);       ctx.fillRect(x + e.w - 13, e.y + 17, 2, 4);        ctx.fillStyle = "#7b3f1f";       ctx.fillRect(x + 7, e.y + e.h - 6, 8, 6);       ctx.fillRect(x + e.w - 15, e.y + e.h - 6, 8, 6);        ctx.restore();     }      function drawPlayer() {       if (player.invincible > 0 && Math.floor(player.invincible / 6) % 2 === 0) return;        const x = player.x - cameraX;       const moving = Math.abs(player.vx) > 0.3;       const jumping = !player.onGround;       const legSwing = moving ? Math.sin(player.walkTime * 0.8) * 0.8 : 0;       const armSwing = moving ? Math.sin(player.walkTime * 0.8 + Math.PI) * 0.7 : 0;        ctx.save();       ctx.translate(x + player.w / 2, player.y + player.h / 2);       ctx.scale(player.facing, 1);       ctx.scale(player.squash, player.stretch);       ctx.translate(-(x + player.w / 2), -(player.y + player.h / 2));        ctx.fillStyle = "#2f80ed";       roundRect(x + 8, player.y + 18, player.w - 16, player.h - 24, 10, true);        ctx.fillStyle = "#ffd6a5";       ctx.beginPath();       ctx.arc(x + player.w / 2, player.y + 16, 12, 0, Math.PI * 2);       ctx.fill();        ctx.fillStyle = "#e63946";       ctx.beginPath();       ctx.ellipse(x + player.w / 2, player.y + 10, 16, 8, 0, Math.PI, 0, true);       ctx.fill();       ctx.fillRect(x + player.w / 2 + 8, player.y + 4, 10, 4);       ctx.fillStyle = "#c1121f";       ctx.fillRect(x + player.w / 2 + 13, player.y + 2, 4, 10);        ctx.strokeStyle = "#1d3557";       ctx.lineWidth = 4;       ctx.lineCap = "round";        ctx.beginPath();       ctx.moveTo(x + 10, player.y + 30);       ctx.lineTo(x + 4, player.y + 42 + armSwing * (jumping ? 0.4 : 1));       ctx.stroke();        ctx.beginPath();       ctx.moveTo(x + player.w - 10, player.y + 30);       ctx.lineTo(x + player.w + 2, player.y + 42 - armSwing * (jumping ? 0.4 : 1));       ctx.stroke();        ctx.beginPath();       ctx.moveTo(x + 14, player.y + player.h - 18);       ctx.lineTo(x + 10, player.y + player.h - 2 + legSwing * (jumping ? 0.2 : 1));       ctx.stroke();        ctx.beginPath();       ctx.moveTo(x + player.w - 14, player.y + player.h - 18);       ctx.lineTo(x + player.w - 8, player.y + player.h - 2 - legSwing * (jumping ? 0.2 : 1));       ctx.stroke();        ctx.fillStyle = "#222";       ctx.fillRect(x + player.w / 2 - 5, player.y + 15, 3, 3);       ctx.fillRect(x + player.w / 2 + 2, player.y + 15, 3, 3);       ctx.fillStyle = "#e76f51";       ctx.fillRect(x + player.w / 2 - 2, player.y + 20, 4, 2);        ctx.restore();     }      function drawFlag() {       const x = flag.x - cameraX;       ctx.fillStyle = "#8d99ae";       ctx.fillRect(x, flag.y, flag.w, flag.h);       ctx.fillStyle = "#ff4d6d";       ctx.beginPath();       ctx.moveTo(x + flag.w, flag.y + 10);       ctx.lineTo(x + flag.w + 56, flag.y + 26);       ctx.lineTo(x + flag.w, flag.y + 42);       ctx.closePath();       ctx.fill();     }      function drawParticles() {       particles.forEach(p => {         ctx.globalAlpha = Math.max(0, p.life / 40);         ctx.fillStyle = p.color;         ctx.beginPath();         ctx.arc(p.x - cameraX, p.y, p.size * (p.life / 40), 0, Math.PI * 2);         ctx.fill();       });       ctx.globalAlpha = 1;     }      function drawEffects() {       effects.forEach(e => {         if (e.type === "text") {           ctx.globalAlpha = Math.max(0, e.life / 48);           ctx.fillStyle = e.color;           ctx.font = "bold 20px Arial";           ctx.fillText(e.text, e.x - cameraX, e.y);         }       });       ctx.globalAlpha = 1;     }      function drawGapsHint() {       gaps.forEach(g => {         const x = g.x - cameraX;         if (x > cw || x + g.w < 0) return;         ctx.fillStyle = "rgba(0, 90, 120, 0.35)";         ctx.fillRect(x, groundBase, g.w, ch - groundBase);       });     }      function roundRect(x, y, w, h, r, fill) {       ctx.beginPath();       ctx.moveTo(x + r, y);       ctx.arcTo(x + w, y, x + w, y + h, r);       ctx.arcTo(x + w, y + h, x, y + h, r);       ctx.arcTo(x, y + h, x, y, r);       ctx.arcTo(x, y, x + w, y, r);       ctx.closePath();       if (fill) ctx.fill();     }      function render() {       drawSky();       drawHills();       drawGapsHint();       drawPlatforms();       drawCollectibles();       enemies.forEach(e => {         if (e.x + e.w > cameraX - 100 && e.x < cameraX + cw + 100) drawEnemy(e);       });       drawFlag();       drawParticles();       drawPlayer();       drawEffects();     }      function loop(ts) {       if (!lastTime) lastTime = ts;       const delta = Math.min(33, ts - lastTime);       lastTime = ts;       frame++;        update(delta);       render();       requestAnimationFrame(loop);     }      function pressKey(name, pressed) {       if (name === "left") keys.left = pressed;       if (name === "right") keys.right = pressed;       if (name === "jump") keys.jump = pressed;     }      window.addEventListener("keydown", e => {       if (e.code === "ArrowLeft") {         keys.left = true;         e.preventDefault();       }       if (e.code === "ArrowRight") {         keys.right = true;         e.preventDefault();       }       if (e.code === "Space") {         keys.jump = true;         e.preventDefault();       }     }, { passive: false });      window.addEventListener("keyup", e => {       if (e.code === "ArrowLeft") keys.left = false;       if (e.code === "ArrowRight") keys.right = false;       if (e.code === "Space") keys.jump = false;     });      function bindTouchButton(el, keyName) {       const on = e => {         e.preventDefault();         pressKey(keyName, true);       };       const off = e => {         e.preventDefault();         pressKey(keyName, false);       };       el.addEventListener("touchstart", on, { passive: false });       el.addEventListener("touchend", off, { passive: false });       el.addEventListener("touchcancel", off, { passive: false });       el.addEventListener("mousedown", on);       el.addEventListener("mouseup", off);       el.addEventListener("mouseleave", off);     }      bindTouchButton(leftBtn, "left");     bindTouchButton(rightBtn, "right");     bindTouchButton(jumpBtn, "jump");      startBtn.addEventListener("click", () => {       startGameFlow(true);     });      restartBtn.addEventListener("click", () => {       startGameFlow(true);     });      playAgainBtn.addEventListener("click", () => {       startGameFlow(true);     });      window.addEventListener("resize", () => {       const saved = loadGame();       if (saved && (game.state === "playing" || game.state === "countdown")) {         restoreGame(saved);       } else {         resizeCanvas();       }     });      function boot() {       resizeCanvas();       const saved = loadGame();       game.bestScore = Number(localStorage.getItem("hatHeroBestScore") || 0);       bestScoreText.textContent = game.bestScore;        if (saved && (saved.game.state === "playing" || saved.game.state === "countdown")) {         restoreGame(saved);         startOverlay.style.display = "none";         game.state = "playing";         game.canControl = true;       } else {         initNewGame();         startOverlay.style.display = "flex";       }       requestAnimationFrame(loop);     }      boot();   </script> </body> </html>
