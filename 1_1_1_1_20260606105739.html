<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虾米的口算题练习 - 本次练习的总题数为50题</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .step {
            width: 100%;
            max-width: 600px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        label, p {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .option-btn {
            padding: 15px 30px;
            margin: 5px;
            font-size: 1.1em;
            background-color: #2196F3;
        }
        .option-btn.selected {
            background-color: #FF9800;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        #progress {
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 20px;
        }
        #question {
            font-size: 2em;
            text-align: center;
            margin: 20px 0;
        }
        #leaderboardBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #FF5722;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 15px;
            }
            h1 {
                font-size: 1.5em;
            }
            .option-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
            button {
                padding: 10px 20px;
            }
            #question {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <!-- 步骤1：命名 -->
    <div id="step1" class="step">
        <h1>欢迎来到口算题出题机器人</h1>
        <div class="card">
            <label for="name">请输入挑战者名称：</label>
            <input type="text" id="name" placeholder="你的名字" required>
            <button onclick="goToStep2()">下一步</button>
        </div>
    </div>

    <!-- 步骤2：选择运算 -->
    <div id="step2" class="step" style="display:none;">
        <h1>选择运算</h1>
        <div class="card">
            <p>请选择要练习的运算（可多选）：</p>
            <div class="options">
                <button class="option-btn" data-op="addition" onclick="toggleOption(this)">加法</button>
                <button class="option-btn" data-op="subtraction" onclick="toggleOption(this)">减法</button>
                <button class="option-btn" data-op="multiplication" onclick="toggleOption(this)">乘法</button>
                <button class="option-btn" data-op="division" onclick="toggleOption(this)">除法</button>
            </div>
            <button onclick="goToStep3()">下一步</button>
        </div>
    </div>

    <!-- 步骤3：选择难度 -->
    <div id="step3" class="step" style="display:none;">
        <h1>选择难度</h1>
        <div class="card">
            <p>请选择难度：</p>
            <div class="options">
                <button class="option-btn" data-diff="easy" onclick="selectDifficulty(this)">简单</button>
                <button class="option-btn" data-diff="medium" onclick="selectDifficulty(this)">中等</button>
                <button class="option-btn" data-diff="hard" onclick="selectDifficulty(this)">困难</button>
            </div>
        </div>
    </div>

    <!-- 答题界面 -->
    <div id="quiz" class="step" style="display:none;">
        <h1>口算题练习</h1>
        <div class="card">
            <div id="progress">第 1 / 50 题</div>
            <div id="question"></div>
            <input type="number" id="answer" placeholder="输入答案" autofocus>
            <button id="nextQuestion" onclick="submitAnswer()">下一题</button>
        </div>
    </div>

    <!-- 成绩结算界面 -->
    <div id="result" class="step" style="display:none;">
        <h1>练习结束</h1>
        <div class="card">
            <div id="resultText"></div>
            <button onclick="restart()">再来一局</button>
            <button onclick="viewLeaderboard()">查看排行榜</button>
        </div>
    </div>

    <!-- 排行榜界面 -->
    <div id="leaderboard" class="step" style="display:none;">
        <h1>排行榜</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>挑战者</th>
                        <th>算法</th>
                        <th>难度</th>
                        <th>耗时(秒)</th>
                        <th>正确率</th>
                        <th>挑战时间</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <button onclick="goHome()">返回主页</button>
        </div>
    </div>

    <!-- 右上角排行榜按钮 -->
    <button id="leaderboardBtn" onclick="viewLeaderboard()">排行榜</button>

    <script>
        let playerName = '';
        let selectedOperations = [];
        let difficulty = '';
        let currentQuestion = 0;
        let correctAnswers = 0;
        let startTime, endTime;
        let totalTime = 0;
        const totalQuestions = 50;
        let questions = [];

        function hideAllSteps() {
            document.querySelectorAll('.step').forEach(step => step.style.display = 'none');
        }

        function goToStep2() {
            playerName = document.getElementById('name').value.trim();
            if (!playerName) {
                alert('请输入挑战者名称！');
                return;
            }
            hideAllSteps();
            document.getElementById('step2').style.display = 'block';
        }

        function toggleOption(btn) {
            btn.classList.toggle('selected');
            const op = btn.dataset.op;
            if (selectedOperations.includes(op)) {
                selectedOperations = selectedOperations.filter(item => item !== op);
            } else {
                selectedOperations.push(op);
            }
        }

        function goToStep3() {
            if (selectedOperations.length === 0) {
                alert('请至少选择一种运算！');
                return;
            }
            hideAllSteps();
            document.getElementById('step3').style.display = 'block';
        }

        function selectDifficulty(btn) {
            difficulty = btn.dataset.diff;
            startQuiz();
        }

        function generateQuestion(operations, difficulty) {
            const op = operations[Math.floor(Math.random() * operations.length)];
            let a, b, question, answer;
            switch(op) {
                case 'addition':
                    if (difficulty === 'easy') {
                        a = Math.floor(Math.random() * 10) + 1;
                        b = Math.floor(Math.random() * 10) + 1;
                    } else if (difficulty === 'medium') {
                        a = Math.floor(Math.random() * 100) + 1;
                        b = Math.floor(Math.random() * 100) + 1;
                    } else {
                        a = Math.floor(Math.random() * 1000) + 1;
                        b = Math.floor(Math.random() * 1000) + 1;
                    }
                    question = `${a} + ${b} = ?`;
                    answer = a + b;
                    break;
                case 'subtraction':
                    if (difficulty === 'easy') {
                        a = Math.floor(Math.random() * 10) + 1;
                        b = Math.floor(Math.random() * a) + 1;
                    } else if (difficulty === 'medium') {
                        a = Math.floor(Math.random() * 100) + 1;
                        b = Math.floor(Math.random() * 100) + 1;
                        if (a < b) [a, b] = [b, a];
                    } else {
                        a = Math.floor(Math.random() * 1000) + 1;
                        b = Math.floor(Math.random() * 1000) + 1;
                        if (a < b) [a, b] = [b, a];
                    }
                    question = `${a} - ${b} = ?`;
                    answer = a - b;
                    break;
                case 'multiplication':
                    if (difficulty === 'easy') {
                        a = Math.floor(Math.random() * 9) + 1;
                        b = Math.floor(Math.random() * 9) + 1;
                    } else if (difficulty === 'medium') {
                        a = Math.floor(Math.random() * 90) + 10;
                        b = Math.floor(Math.random() * 9) + 1;
                    } else {
                        a = Math.floor(Math.random() * 90) + 10;
                        b = Math.floor(Math.random() * 90) + 10;
                    }
                    question = `${a} × ${b} = ?`;
                    answer = a * b;
                    break;
                case 'division':
                    if (difficulty === 'easy') {
                        b = Math.floor(Math.random() * 9) + 1;
                        const q1 = Math.floor(Math.random() * 9) + 1;
                        a = b * q1;
                    } else if (difficulty === 'medium') {
                        b = Math.floor(Math.random() * 9) + 1;
                        const minQ = Math.ceil(10 / b);
                        const maxQ = Math.floor(99 / b);
                        const q2 = Math.floor(Math.random() * (maxQ - minQ + 1)) + minQ;
                        a = b * q2;
                    } else {
                        b = Math.floor(Math.random() * 90) + 10;
                        const q3 = Math.floor(Math.random() * 10) + 1;
                        a = b * q3;
                    }
                    question = `${a} ÷ ${b} = ?`;
                    answer = a / b;
                    break;
            }
            return { question, answer };
        }

        function startQuiz() {
            hideAllSteps();
            document.getElementById('quiz').style.display = 'block';
            currentQuestion = 0;
            correctAnswers = 0;
            questions = [];
            for (let i = 0; i < totalQuestions; i++) {
                questions.push(generateQuestion(selectedOperations, difficulty));
            }
            startTime = new Date();
            showQuestion();
            document.getElementById('answer').focus();
        }

        function showQuestion() {
            if (currentQuestion < totalQuestions) {
                document.getElementById('progress').textContent = `第 ${currentQuestion + 1} / ${totalQuestions} 题`;
                document.getElementById('question').textContent = questions[currentQuestion].question;
                document.getElementById('answer').value = '';
                document.getElementById('answer').focus();
            }
        }

        function submitAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            if (isNaN(userAnswer)) {
                alert('请输入一个数字答案！');
                return;
            }
            const correctAnswer = questions[currentQuestion].answer;
            if (userAnswer === correctAnswer) {
                correctAnswers++;
            }
            currentQuestion++;
            if (currentQuestion < totalQuestions) {
                showQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            endTime = new Date();
            totalTime = Math.floor((endTime - startTime) / 1000);
            const correctRate = Math.floor((correctAnswers / totalQuestions) * 100);
            hideAllSteps();
            document.getElementById('result').style.display = 'block';
            document.getElementById('resultText').innerHTML = `
                <p>挑战者：${playerName}</p>
                <p>正确率：${correctRate}%</p>
                <p>答题耗时：${totalTime}秒</p>
            `;
            saveToLeaderboard(correctRate);
        }

        function saveToLeaderboard(correctRate) {
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            const entry = {
                name: playerName,
                operations: selectedOperations.join(', '),
                difficulty: difficulty,
                time: totalTime,
                correctRate: correctRate,
                timestamp: new Date().toLocaleString()
            };
            leaderboard.push(entry);
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
        }

        function viewLeaderboard() {
            hideAllSteps();
            document.getElementById('leaderboard').style.display = 'block';
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            leaderboard.sort((a, b) => {
                if (b.correctRate !== a.correctRate) {
                    return b.correctRate - a.correctRate;
                }
                return a.time - b.time;
            });
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            leaderboard.forEach((entry, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${entry.name}</td>
                    <td>${entry.operations}</td>
                    <td>${entry.difficulty}</td>
                    <td>${entry.time}</td>
                    <td>${entry.correctRate}%</td>
                    <td>${entry.timestamp}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function goHome() {
            hideAllSteps();
            document.getElementById('step1').style.display = 'block';
        }

        function restart() {
            hideAllSteps();
            document.getElementById('step1').style.display = 'block';
            playerName = '';
            selectedOperations = [];
            difficulty = '';
        }

        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
    </script>
</body>
</html>
