    <script>
        // 单词数据（根据用户提供的列表去重整理，共18个核心学术词汇）
        const vocabulary = [
            { en: "analyze", zh: "分析" },
            { en: "benefit", zh: "利益，好处" },
            { en: "consequence", zh: "结果，后果" },
            { en: "demonstrate", zh: "证明，展示" },
            { en: "evaluate", zh: "评估" },
            { en: "factor", zh: "因素" },
            { en: "generate", zh: "产生，生成" },
            { en: "hypothesis", zh: "假设" },
            { en: "implement", zh: "实施" },
            { en: "justify", zh: "证明...合理" },
            { en: "knowledge", zh: "知识" },
            { en: "legitimate", zh: "合法的，合理的" },
            { en: "methodology", zh: "方法论" },
            { en: "neutral", zh: "中立的" },
            { en: "objective", zh: "客观的；目标" },
            { en: "phenomenon", zh: "现象" },
            { en: "qualitative", zh: "定性的" },
            { en: "coherent", zh: "连贯的" }
        ]
        
        let currentWord = null
        let recognition = null
        let isRecording = false
        let masteredWords = JSON.parse(localStorage.getItem('masteredWords')) || []
        
        // 初始化 SpeechRecognition
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
            if (SpeechRecognition) {
                recognition = new SpeechRecognition()
                recognition.lang = 'en-US'
                recognition.interimResults = false
                recognition.maxAlternatives = 1
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript.trim()
                    handleRecognitionResult(transcript)
                }
                
                recognition.onerror = function(event) {
                    showToast('⚠️', '语音识别失败，请检查麦克风权限', 3000)
                    stopRecording()
                }
                
                recognition.onend = function() {
                    stopRecording()
                }
                return true
            }
            return false
        }
        
        // 渲染单词卡片

            const grid = document.getElementById('word-grid')
            grid.innerHTML = ''
            
            vocabulary.forEach((word, index) => {
                const isMastered = masteredWords.includes(word.en)
                
                const cardHTML = `
                <div class="word-card" data-en="${word.en}" onclick="handleCardClick('${word.en}', '${word.zh}')">
                    <div class="en">${word.en}</div>
                    <div class="zh">${word.zh}</div>
                    <div class="footer">

                        ${isMastered ?

                            `<div class="play-icon">🔊</div>`
                        }
                    </div>

                grid.innerHTML += cardHTML
            })
            
            // 更新已掌握统计
            document.getElementById('mastered-count').textContent = masteredWords.length
        }
        
        // 处理卡片点击：立即播放3次发音 + 打开模态
        function handleCardClick(en, zh) {
            const wordObj = vocabulary.find(w => w.en === en)
            if (!wordObj) return
            
            currentWord = wordObj
            
            // 打开模态
            const modal = document.getElementById('modal')
            document.getElementById('modal-en').textContent = currentWord.en
            document.getElementById('modal-zh').textContent = currentWord.zh
            modal.style.display = 'flex'
            
            // 立即播放3次
            setTimeout(() => {
                playThreeTimes()
            }, 420)
            
            // 清空上一次录音结果
            resetRecordUI()
        }
        
        // 播放3次发音
        function playThreeTimes() {
            if (!currentWord) return
            
            const speakBtn = document.getElementById('speak-btn')
            const animation = document.getElementById('speak-animation')
            
            speakBtn.style.opacity = '0.6'
            speakBtn.style.pointerEvents = 'none'
            animation.style.display = 'flex'
            
            let count = 0
            const utteranceQueue = []
            
            function speakNext() {
                if (count >= 3) {
                    speakBtn.style.opacity = '1'
                    speakBtn.style.pointerEvents = 'auto'
                    animation.style.display = 'none'
                    return
                }
                
                const utterance = new SpeechSynthesisUtterance(currentWord.en)
                utterance.lang = 'en-US'
                utterance.rate = 0.92
                utterance.pitch = 1.05
                
                utterance.onend = () => {
                    count++
                    // 间隔800ms再读下一次
                    setTimeout(speakNext, 800)
                }
                
                speechSynthesis.speak(utterance)
            }
            
            speakNext()
            
            // 给卡片添加播放动画
            const cards = document.querySelectorAll('.word-card')
            cards.forEach(card => {
                if (card.dataset.en === currentWord.en) {
                    card.classList.add('playing')
                    setTimeout(() => {
                        card.classList.remove('playing')
                    }, 4800)
                }
            })
        }
        
        // 开始/停止录音
        function toggleRecording() {
            if (!recognition) {
                const supported = initSpeechRecognition()
                if (!supported) {
                    showToast('❌', '您的浏览器不支持语音识别', 3000)
                    return
                }
            }
            
            const btn = document.getElementById('record-btn-main')
            const status = document.getElementById('record-status')
            const listeningText = document.getElementById('listening-text')
            
            if (!isRecording) {
                // 开始录音
                recognition.start()
                isRecording = true
                btn.classList.add('recording')
                btn.innerHTML = '⏹️'
                status.style.display = 'none'
                listeningText.style.display = 'block'
            } else {
                // 停止录音
                recognition.stop()
                stopRecording()
            }
        }
        
        function stopRecording() {
            isRecording = false
            const btn = document.getElementById('record-btn-main')
            btn.classList.remove('recording')
            btn.innerHTML = '🎤'
            document.getElementById('listening-text').style.display = 'none'
            document.getElementById('record-status').style.display = 'block'
        }
        
        // 处理识别结果
        function handleRecognitionResult(transcript) {
            if (!currentWord) return
            
            const resultBox = document.getElementById('result-box')
            const recognizedTextEl = document.getElementById('recognized-text')
            const accuracyEl = document.getElementById('accuracy-score')
            const feedbackEl = document.getElementById('feedback-text')
            
            recognizedTextEl.textContent = transcript
            
            // 计算相似度（简单Levenshtein距离 + 长度匹配）
            const similarityScore = calculateSimilarity(transcript.toLowerCase(), currentWord.en.toLowerCase())
            
            accuracyEl.textContent = `${Math.round(similarityScore)}%`
            accuracyEl.style.color = similarityScore > 75 ? '#10b981' : '#f59e0b'
            
            // 反馈文字
            if (similarityScore >= 85) {
                feedbackEl.innerHTML = `🎉 发音非常标准！<br>继续保持！`
                feedbackEl.style.color = '#10b981'
            } else if (similarityScore >= 65) {
                feedbackEl.innerHTML = `👍 基本准确<br>建议多练习重音部分`
                feedbackEl.style.color = '#f59e0b'
            } else {
                feedbackEl.innerHTML = `⚠️ 需要加强练习<br>可再听3次标准发音`
                feedbackEl.style.color = '#ef4444'
            }
            
            resultBox.style.display = 'block'
            
            // 如果准确度高，自动标记
            if (similarityScore >= 85 && !masteredWords.includes(currentWord.en)) {
                setTimeout(() => {
                    showToast('🎯', '恭喜！此单词已自动标记为掌握', 2500)
                }, 800)
            }
        }
        
        // 相似度计算
        function calculateSimilarity(str1, str2) {
            if (str1 === str2) return 100
            
            // Levenshtein距离
            const len1 = str1.length
            const len2 = str2.length
            const matrix = Array(len2 + 1).fill().map(() => Array(len1 + 1).fill(0))
            
            for (let i = 0; i <= len1; i++) matrix[0][i] = i
            for (let j = 0; j <= len2; j++) matrix[j][0] = j
            
            for (let j = 1; j <= len2; j++) {
                for (let i = 1; i <= len1; i++) {
                    const cost = str1[i - 1] === str2[j - 1] ? 0 : 1
                    matrix[j][i] = Math.min(
                        matrix[j - 1][i] + 1,
                        matrix[j][i - 1] + 1,
                        matrix[j - 1][i - 1] + cost
                    )
                }
            }
            
            const distance = matrix[len2][len1]
            const maxLen = Math.max(len1, len2)
            return Math.max(0, Math.floor(100 * (1 - distance / maxLen)))
        }
        
        // 重置录音界面
        function resetRecordUI() {
            const resultBox = document.getElementById('result-box')
            resultBox.style.display = 'none'
        }
        
        function resetRecord() {
            resetRecordUI()
            // 自动重新开始录音
            setTimeout(() => {
                toggleRecording()
            }, 100)
        }
        
        // 标记为已掌握
        function markAsMastered() {
            if (!currentWord || masteredWords.includes(currentWord.en)) return
            
            masteredWords.push(currentWord.en)
            localStorage.setItem('masteredWords', JSON.stringify(masteredWords))
            
            closeModal()
            renderWordGrid()
            
            showToast('🎉', `已成功掌握单词 “${currentWord.en}”`, 2800)
        }
        
        // 关闭模态
        function closeModal() {
            const modal = document.getElementById('modal')
            modal.style.display = 'none'
            currentWord = null
            if (isRecording) {
                recognition.stop()
                stopRecording()
            }
        }
        
        // 显示提示
        function showToast(icon, text, duration = 2500) {
            const toast = document.getElementById('toast')
            document.getElementById('toast-icon').innerHTML = icon
            document.getElementById('toast-text').innerHTML = text
            toast.style.display = 'flex'
            
            setTimeout(() => {
                toast.style.display = 'none'
            }, duration)
        }
        
        // 初始化整个程序
        function initializeApp() {
            // 渲染单词网格
            renderWordGrid()
            
            // 初始化语音识别
            initSpeechRecognition()
            
            console.log('%c✅ 英语学术词汇互动动画学习器已启动', 'color:#3b82f6;font-size:13px;font-weight:600')
            console.log('支持功能：点击卡片→自动朗读3次 + 录音校验 + 掌握标记')
            
            // 键盘快捷键：ESC关闭模态
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('modal')
                    if (modal.style.display === 'flex') closeModal()
                }
            })
            
            // 欢迎提示
            setTimeout(() => {
                showToast('👋', '欢迎使用！点击任意单词卡片即可开始学习', 3200)
            }, 1200)
        }
        
        // 启动程序
        window.onload = initializeApp
    </script>
</body>
</html>
