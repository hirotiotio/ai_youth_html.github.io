<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">     <title>口算速算挑战赛</title>     <style>         :root {             --primary: #4CAF50;             --primary-dark: #388E3C;             --secondary: #2196F3;             --error: #f44336;             --bg: #f0f8ff;             --card-bg: #ffffff;             --text: #333;         }          * {             box-sizing: border-box;             margin: 0;             padding: 0;             -webkit-tap-highlight-color: transparent;         }          body {             font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;             background-color: var(--bg);             color: var(--text);             min-height: 100vh;             display: flex;             justify-content: center;             align-items: center;             padding: 20px;         }          .container {             background: var(--card-bg);             width: 100%;             max-width: 500px;             border-radius: 20px;             box-shadow: 0 10px 25px rgba(0,0,0,0.1);             overflow: hidden;             position: relative;             min-height: 400px;             display: flex;             flex-direction: column;         }          /* 通用样式 */         h1, h2 {             text-align: center;             color: var(--primary-dark);             margin-bottom: 20px;         }          .btn {             display: block;             width: 100%;             padding: 15px;             margin: 10px 0;             border: none;             border-radius: 12px;             font-size: 1.2rem;             font-weight: bold;             cursor: pointer;             transition: transform 0.1s, opacity 0.2s;             color: white;         }          .btn:active {             transform: scale(0.98);         }          .btn-primary { background-color: var(--primary); }         .btn-primary:hover { background-color: var(--primary-dark); }                  .btn-secondary { background-color: var(--secondary); }                  .form-group {             margin-bottom: 15px;         }          label {             display: block;             margin-bottom: 8px;             font-weight: 600;         }          select, input[type="text"], input[type="number"] {             width: 100%;             padding: 12px;             border: 2px solid #ddd;             border-radius: 8px;             font-size: 1rem;             outline: none;         }          select:focus, input:focus {             border-color: var(--secondary);         }          /* 屏幕切换逻辑 */         .screen {             display: none;             flex-direction: column;             padding: 30px;             flex: 1;             animation: fadeIn 0.3s ease;         }          .screen.active {             display: flex;         }          @keyframes fadeIn {             from { opacity: 0; transform: translateY(10px); }             to { opacity: 1; transform: translateY(0); }         }          /* 设置面板 */         .checkbox-group {             display: flex;             gap: 10px;             flex-wrap: wrap;             margin-bottom: 10px;         }                  .checkbox-item {             flex: 1;             min-width: 80px;             text-align: center;         }          .checkbox-item input {             display: none;         }          .checkbox-item span {             display: block;             padding: 10px;             background: #eee;             border-radius: 8px;             cursor: pointer;             font-size: 0.9rem;         }          .checkbox-item input:checked + span {             background: var(--primary);             color: white;         }          /* 游戏界面 */         .game-header {             display: flex;             justify-content: space-between;             margin-bottom: 20px;             font-size: 1.1rem;             font-weight: bold;             color: #666;         }          .progress-container {             width: 100%;             height: 10px;             background: #eee;             border-radius: 5px;             margin-bottom: 30px;             overflow: hidden;         }          .progress-bar {             height: 100%;             background: var(--primary);             width: 0%;             transition: width 0.3s ease;         }          .question-area {             flex: 1;             display: flex;             flex-direction: column;             justify-content: center;             align-items: center;             font-size: 3rem;             font-weight: bold;             color: #333;             min-height: 150px;         }          .feedback-icon {             position: absolute;             top: 50%;             left: 50%;             transform: translate(-50%, -50%);             font-size: 8rem;             opacity: 0;             pointer-events: none;             z-index: 10;         }          .feedback-icon.show {             animation: popIn 0.5s forwards;         }          @keyframes popIn {             0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }             50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }             100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }         }          .shake {             animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;         }          @keyframes shake {             10%, 90% { transform: translate3d(-2px, 0, 0); }             20%, 80% { transform: translate3d(4px, 0, 0); }             30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }             40%, 60% { transform: translate3d(6px, 0, 0); }         }          .answer-input {             text-align: center;             font-size: 2rem;             padding: 15px;             margin-top: 20px;         }          /* 结果界面 */         .stats-grid {             display: grid;             grid-template-columns: 1fr 1fr;             gap: 15px;             margin-bottom: 20px;         }          .stat-card {             background: #f9f9f9;             padding: 15px;             border-radius: 10px;             text-align: center;         }          .stat-value {             font-size: 1.5rem;             font-weight: bold;             color: var(--secondary);         }          .stat-label {             font-size: 0.9rem;             color: #666;         }          .leaderboard {             margin-top: 20px;             border-top: 1px solid #eee;             padding-top: 15px;         }          .leaderboard h3 {             text-align: center;             margin-bottom: 10px;             color: #555;         }          .rank-item {             display: flex;             justify-content: space-between;             padding: 8px 0;             border-bottom: 1px solid #f0f0f0;             font-size: 0.95rem;         }          .rank-item:first-child {             color: #d4af37; /* Gold */             font-weight: bold;         }          /* 响应式调整 */         @media (max-width: 480px) {             .question-area { font-size: 2.5rem; }             .container { border-radius: 0; height: 100vh; max-width: 100%; }             body { padding: 0; align-items: flex-start; }         }     </style> </head> <body>  <div class="container">     <!-- 设置面板 -->     <div id="setup-screen" class="screen active">         <h1>口算挑战赛</h1>                  <div class="form-group">             <label>选择运算类型：</label>             <div class="checkbox-group">                 <label class="checkbox-item">                     <input type="checkbox" value="+" checked>                     <span>加法 +</span>                 </label>                 <label class="checkbox-item">                     <input type="checkbox" value="-">                     <span>减法 -</span>                 </label>                 <label class="checkbox-item">                     <input type="checkbox" value="*">                     <span>乘法 ×</span>                 </label>                 <label class="checkbox-item">                     <input type="checkbox" value="/">                     <span>除法 ÷</span>                 </label>             </div>         </div>          <div class="form-group">             <label>难度范围：</label>             <select id="difficulty">                 <option value="20">简单 (0-20)</option>                 <option value="50">中等 (0-50)</option>                 <option value="100">困难 (0-100)</option>             </select>         </div>          <div class="form-group">             <label>题目数量：</label>             <select id="question-count">                 <option value="10">10 题</option>                 <option value="20" selected>20 题</option>                 <option value="30">30 题</option>             </select>         </div>          <button class="btn btn-primary" onclick="game.start()">开始挑战</button>     </div>      <!-- 答题界面 -->     <div id="game-screen" class="screen">         <div class="game-header">             <span id="timer">00:00</span>             <span id="progress-text">1/20</span>         </div>         <div class="progress-container">             <div id="progress-bar" class="progress-bar"></div>         </div>          <div class="question-area" id="question-text">             15 + 25 = ?         </div>                  <!-- 反馈图标 -->         <div id="feedback" class="feedback-icon"></div>          <input type="number" id="answer-input" class="answer-input" placeholder="?" autocomplete="off">         <div style="text-align: center; color: #999; font-size: 0.8rem; margin-top: 10px;">输入答案后按 Enter 提交</div>     </div>      <!-- 结果界面 -->     <div id="result-screen" class="screen">         <h2>挑战结束！</h2>                  <div class="stats-grid">             <div class="stat-card">                 <div class="stat-value" id="final-time">00:00</div>                 <div class="stat-label">总用时</div>             </div>             <div class="stat-card">                 <div class="stat-value" id="final-accuracy">0%</div>                 <div class="stat-label">正确率</div>             </div>         </div>          <div class="form-group">             <label>请输入你的昵称：</label>             <input type="text" id="nickname" placeholder="小朋友的名字" maxlength="10">         </div>                  <button class="btn btn-secondary" onclick="game.saveScore()">保存成绩</button>                  <div class="leaderboard">             <h3>🏆 排行榜 (Top 5)</h3>             <div id="leaderboard-list">                 <!-- 排行榜内容由JS填充 -->             </div>         </div>          <button class="btn btn-primary" onclick="game.toSetup()">再来一局</button>     </div> </div>  <script>     const game = {         // 游戏状态         config: {             operations: [],             range: 20,             count: 20         },         state: {             currentIndex: 0,             score: 0,             startTime: 0,             timerInterval: null,             currentQuestion: null,             questions: []         },          // 初始化与导航         init: function() {             this.loadLeaderboard();             // 绑定Enter键事件             document.getElementById('answer-input').addEventListener('keypress', (e) => {                 if (e.key === 'Enter') {                     this.submitAnswer();                 }             });         },          switchScreen: function(screenId) {             document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));             document.getElementById(screenId).classList.add('active');         },          // 游戏逻辑         start: function() {             // 获取设置             const checkboxes = document.querySelectorAll('.checkbox-group input:checked');             if (checkboxes.length === 0) {                 alert('请至少选择一种运算类型！');                 return;             }             this.config.operations = Array.from(checkboxes).map(cb => cb.value);             this.config.range = parseInt(document.getElementById('difficulty').value);             this.config.count = parseInt(document.getElementById('question-count').value);              // 重置状态             this.state.currentIndex = 0;             this.state.score = 0;             this.state.questions = [];                          // 生成题目             for (let i = 0; i < this.config.count; i++) {                 this.state.questions.push(this.generateQuestion());             }              // 开始计时             this.state.startTime = Date.now();             this.state.timerInterval = setInterval(() => this.updateTimer(), 1000);              // 渲染第一题             this.renderQuestion();             this.switchScreen('game-screen');             document.getElementById('answer-input').focus();         },          generateQuestion: function() {             const ops = this.config.operations;             const op = ops[Math.floor(Math.random() * ops.length)];             const range = this.config.range;             let n1, n2, answer;              switch(op) {                 case '+':                     n1 = this.randomInt(1, range);                     n2 = this.randomInt(1, range);                     answer = n1 + n2;                     break;                 case '-':                     // 确保结果非负                     n1 = this.randomInt(1, range);                     n2 = this.randomInt(1, n1); // n2 <= n1                     answer = n1 - n2;                     break;                 case '*':                     // 乘法范围小一点，避免太大                     const mulRange = Math.min(range, 12);                      n1 = this.randomInt(2, mulRange);                     n2 = this.randomInt(2, mulRange);                     answer = n1 * n2;                     break;                 case '/':                     // 确保整除                     n2 = this.randomInt(1, Math.min(range, 12)); // 除数                     answer = this.randomInt(1, Math.min(range, 12)); // 商                     n1 = n2 * answer; // 被除数                     break;             }              return { n1, n2, op, answer };         },          randomInt: function(min, max) {             return Math.floor(Math.random() * (max - min + 1)) + min;         },          renderQuestion: function() {             const q = this.state.questions[this.state.currentIndex];             this.state.currentQuestion = q;                          const opSymbol = q.op === '*' ? '×' : (q.op === '/' ? '÷' : q.op);             document.getElementById('question-text').textContent = `${q.n1} ${opSymbol} ${q.n2} = ?`;                          // 更新进度             const progress = ((this.state.currentIndex) / this.config.count) * 100;             document.getElementById('progress-bar').style.width = `${progress}%`;             document.getElementById('progress-text').textContent = `${this.state.currentIndex + 1}/${this.config.count}`;                          // 清空输入             const input = document.getElementById('answer-input');             input.value = '';             input.focus();         },          submitAnswer: function() {             const input = document.getElementById('answer-input');             const userAns = parseInt(input.value);                          if (isNaN(userAns)) return; // 空输入不处理              const isCorrect = userAns === this.state.currentQuestion.answer;             const feedbackEl = document.getElementById('feedback');              if (isCorrect) {                 this.state.score++;                 feedbackEl.textContent = '✔';                 feedbackEl.style.color = 'var(--primary)';                 feedbackEl.classList.remove('show');                 void feedbackEl.offsetWidth; // trigger reflow                 feedbackEl.classList.add('show');             } else {                 feedbackEl.textContent = '✘';                 feedbackEl.style.color = 'var(--error)';                 feedbackEl.classList.remove('show');                 void feedbackEl.offsetWidth;                 feedbackEl.classList.add('show');                                  // 震动效果                 document.querySelector('.container').classList.add('shake');                 setTimeout(() => document.querySelector('.container').classList.remove('shake'), 400);             }              // 下一题或结束             setTimeout(() => {                 this.state.currentIndex++;                 if (this.state.currentIndex < this.config.count) {                     this.renderQuestion();                 } else {                     this.endGame();                 }             }, 800); // 短暂停留让用户看到反馈         },          updateTimer: function() {             const now = Date.now();             const diff = Math.floor((now - this.state.startTime) / 1000);             const m = Math.floor(diff / 60).toString().padStart(2, '0');             const s = (diff % 60).toString().padStart(2, '0');             document.getElementById('timer').textContent = `${m}:${s}`;         },          endGame: function() {             clearInterval(this.state.timerInterval);             const totalTime = Math.floor((Date.now() - this.state.startTime) / 1000);             const accuracy = Math.round((this.state.score / this.config.count) * 100);                          // 显示结果             const m = Math.floor(totalTime / 60).toString().padStart(2, '0');             const s = (totalTime % 60).toString().padStart(2, '0');             document.getElementById('final-time').textContent = `${m}:${s}`;             document.getElementById('final-accuracy').textContent = `${accuracy}%`;                          // 保存临时数据用于提交             this.state.lastTime = totalTime;             this.state.lastAccuracy = accuracy;              this.loadLeaderboard(); // 刷新排行榜             this.switchScreen('result-screen');         },          // 排行榜逻辑         saveScore: function() {             const nickname = document.getElementById('nickname').value.trim() || '匿名小神童';             const record = {                 name: nickname,                 time: this.state.lastTime,                 accuracy: this.state.lastAccuracy,                 date: new Date().toLocaleDateString()             };              let leaderboard = JSON.parse(localStorage.getItem('math_leaderboard')) || [];             leaderboard.push(record);                          // 按时间升序排序（时间短的在前面）             leaderboard.sort((a, b) => a.time - b.time);                          // 只保留前5名             leaderboard = leaderboard.slice(0, 5);                          localStorage.setItem('math_leaderboard', JSON.stringify(leaderboard));                          this.loadLeaderboard();             alert('成绩保存成功！');         },          loadLeaderboard: function() {             const list = document.getElementById('leaderboard-list');             const data = JSON.parse(localStorage.getItem('math_leaderboard')) || [];                          if (data.length === 0) {                 list.innerHTML = '<div style="text-align:center; color:#999;">暂无记录</div>';                 return;             }              let html = '';             data.forEach((item, index) => {                 const m = Math.floor(item.time / 60).toString().padStart(2, '0');                 const s = (item.time % 60).toString().padStart(2, '0');                 html += `                     <div class="rank-item">                         <span>${index + 1}. ${item.name}</span>                         <span>${m}:${s} | ${item.accuracy}%</span>                     </div>                 `;             });             list.innerHTML = html;         },          toSetup: function() {             this.switchScreen('setup-screen');         }     };      // 启动     game.init(); </script>  </body> </html>
