<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">     <title>横版闯关大冒险</title>     <style>         body {             margin: 0;             padding: 0;             overflow: hidden;             background-color: #333;             font-family: "Microsoft YaHei", sans-serif;             touch-action: none; /* 禁止手机端默认触摸行为 */         }         #gameContainer {             position: relative;             width: 100vw;             height: 100vh;             display: flex;             justify-content: center;             align-items: center;             background: #000;         }         canvas {             background-color: #87CEEB; /* 蓝天背景 */             box-shadow: 0 0 20px rgba(0,0,0,0.5);             max-width: 100%;             max-height: 100%;         }         /* UI 覆盖层 */         .ui-layer {             position: absolute;             top: 0;             left: 0;             width: 100%;             height: 100%;             pointer-events: none;             display: flex;             flex-direction: column;             justify-content: center;             align-items: center;             text-align: center;             color: white;             text-shadow: 2px 2px 0 #000;         }         #hud {             position: absolute;             top: 10px;             left: 10px;             right: 10px;             display: flex;             justify-content: space-between;             font-size: 20px;             font-weight: bold;             pointer-events: none;             z-index: 10;         }         .heart { color: #ff4d4d; }         .score-board { color: #ffd700; }                  #startScreen, #gameOverScreen, #winScreen {             background: rgba(0, 0, 0, 0.7);             pointer-events: auto;             z-index: 20;         }                  h1 { font-size: 40px; margin-bottom: 10px; color: #ffcc00; }         p { font-size: 18px; margin-bottom: 20px; }                  button {             padding: 15px 40px;             font-size: 20px;             background: #4CAF50;             color: white;             border: none;             border-radius: 50px;             cursor: pointer;             box-shadow: 0 5px #2E7D32;             transition: transform 0.1s;             font-family: inherit;         }         button:active {             transform: translateY(4px);             box-shadow: 0 1px #2E7D32;         }                  /* 倒计时动画 */         #countdown {             font-size: 100px;             color: #fff;             position: absolute;             top: 50%;             left: 50%;             transform: translate(-50%, -50%);             display: none;             z-index: 15;             text-shadow: 0 0 20px gold;             animation: pop 0.5s ease-out;         }                  @keyframes pop {             0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }             50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }             100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }         }          .hidden { display: none !important; }     </style> </head> <body>  <div id="gameContainer">     <canvas id="gameCanvas"></canvas>          <!-- HUD -->     <div id="hud" class="hidden">         <div class="heart">❤️ <span id="livesDisplay">3</span></div>         <div class="score-board">⭐ <span id="scoreDisplay">0</span></div>     </div>      <!-- 倒计时 -->     <div id="countdown">3</div>      <!-- 开始界面 -->     <div id="startScreen" class="ui-layer">         <h1>🏆 超级跳跃者</h1>         <p>方向键移动，空格跳跃</p>         <p>收集金币 ⭐，踩扁敌人 🐙</p>         <button onclick="startGame()">开始游戏</button>     </div>      <!-- 游戏结束 -->     <div id="gameOverScreen" class="ui-layer hidden">         <h1>💀 游戏结束</h1>         <p>最终得分: <span id="finalScore">0</span></p>         <button onclick="restartGame()">重新开始</button>     </div>      <!-- 通关界面 -->     <div id="winScreen" class="ui-layer hidden">         <h1>🎉 通关成功!</h1>         <p>得分: <span id="winScore">0</span></p>         <p>用时: <span id="winTime">0</span>秒</p>         <button onclick="restartGame()">再玩一次</button>     </div> </div>  <script> /**  * 游戏核心逻辑  */ const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');  // 响应式画布大小 let SCREEN_W = window.innerWidth; let SCREEN_H = window.innerHeight; const GAME_HEIGHT = 600; // 逻辑高度 let GAME_WIDTH = SCREEN_W * 5; // 关卡宽度为屏幕宽度的5倍 let scaleRatio = 1;  function resize() {     SCREEN_W = window.innerWidth;     SCREEN_H = window.innerHeight;          // 保持纵横比适配     canvas.width = SCREEN_W;     canvas.height = SCREEN_H;          // 计算缩放比例以保持游戏元素在视觉上一致     scaleRatio = SCREEN_H / GAME_HEIGHT; } window.addEventListener('resize', resize); resize();  // 游戏状态 const STATE = { MENU: 0, COUNTDOWN: 1, PLAYING: 2, GAMEOVER: 3, WIN: 4 }; let currentState = STATE.MENU; let score = 0; let lives = 3; let startTime = 0; let gameTime = 0; let cameraX = 0;  // 输入控制 const keys = { ArrowLeft: false, ArrowRight: false, Space: false };  // 音频上下文 (用于合成音效) let audioCtx = null; function initAudio() {     if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } function playSound(type) {     if (!audioCtx) return;     const osc = audioCtx.createOscillator();     const gain = audioCtx.createGain();     osc.connect(gain);     gain.connect(audioCtx.destination);      const now = audioCtx.currentTime;          if (type === 'jump') {         osc.type = 'sine';         osc.frequency.setValueAtTime(300, now);         osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);         gain.gain.setValueAtTime(0.3, now);         gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);         osc.start(now);         osc.stop(now + 0.1);     } else if (type === 'coin') {         osc.type = 'sine';         osc.frequency.setValueAtTime(1200, now);         osc.frequency.setValueAtTime(1600, now + 0.1);         gain.gain.setValueAtTime(0.2, now);         gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);         osc.start(now);         osc.stop(now + 0.2);     } else if (type === 'hurt') {         osc.type = 'sawtooth';         osc.frequency.setValueAtTime(200, now);         osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);         gain.gain.setValueAtTime(0.3, now);         gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);         osc.start(now);         osc.stop(now + 0.3);     } else if (type === 'stomp') {         osc.type = 'square';         osc.frequency.setValueAtTime(150, now);         osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);         gain.gain.setValueAtTime(0.2, now);         gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);         osc.start(now);         osc.stop(now + 0.1);     } else if (type === 'win') {         osc.type = 'triangle';         osc.frequency.setValueAtTime(400, now);         osc.frequency.setValueAtTime(600, now + 0.2);         osc.frequency.setValueAtTime(1000, now + 0.4);         gain.gain.setValueAtTime(0.3, now);         gain.gain.linearRampToValueAtTime(0, now + 1.0);         osc.start(now);         osc.stop(now + 1.0);     } }  // 持久化存储 function loadData() {     const savedScore = localStorage.getItem('platformer_score');     const savedLives = localStorage.getItem('platformer_lives');     if (savedScore) score = parseInt(savedScore);     if (savedLives) lives = parseInt(savedLives); } function saveData() {     localStorage.setItem('platformer_score', score);     localStorage.setItem('platformer_lives', lives); }  // 实体类 class Entity {     constructor(x, y, w, h, color) {         this.x = x;         this.y = y;         this.w = w;         this.h = h;         this.color = color;         this.vx = 0;         this.vy = 0;         this.markedForDeletion = false;     }     draw(ctx, camX) {         ctx.fillStyle = this.color;         ctx.fillRect(this.x - camX, this.y, this.w, this.h);     } }  class Player extends Entity {     constructor(x, y) {         super(x, y, 40, 60, '#ff5722');         this.speed = 6;         this.jumpPower = -16;         this.gravity = 0.8;         this.onGround = false;         this.facingRight = true;         this.invincibleTimer = 0;         this.animTimer = 0;     }      update(platforms) {         // 水平移动         if (keys.ArrowLeft) { this.vx = -this.speed; this.facingRight = false; }         else if (keys.ArrowRight) { this.vx = this.speed; this.facingRight = true; }         else { this.vx = 0; }          // 跳跃         if (keys.Space && this.onGround) {             this.vy = this.jumpPower;             this.onGround = false;             playSound('jump');             // 跳跃灰尘             for(let i=0; i<5; i++) particles.push(new Particle(this.x + this.w/2, this.y + this.h, 'dust'));         }          // 物理应用         this.vy += this.gravity;         this.x += this.vx;         this.y += this.vy;                  // 边界限制         if (this.x < 0) this.x = 0;                  // 碰撞检测         this.onGround = false;                  // 平台碰撞         for (let p of platforms) {             if (this.x < p.x + p.w && this.x + this.w > p.x &&                 this.y < p.y + p.h && this.y + this.h > p.y) {                                  // 简单的碰撞方向判断                 let overlapX = (this.w + p.w) / 2 - Math.abs((this.x + this.w/2) - (p.x + p.w/2));                 let overlapY = (this.h + p.h) / 2 - Math.abs((this.y + this.h/2) - (p.y + p.h/2));                  if (overlapX >= overlapY) {                     // 垂直碰撞                     if (this.vy > 0 && this.y + this.h/2 < p.y + p.h/2) { // 下落                         this.y = p.y - this.h;                         this.vy = 0;                         this.onGround = true;                     } else if (this.vy < 0) { // 顶头                         this.y = p.y + p.h;                         this.vy = 0;                     }                 } else {                     // 水平碰撞                     if (this.vx > 0) this.x = p.x - this.w;                     else this.x = p.x + p.w;                 }             }         }          // 无敌时间         if (this.invincibleTimer > 0) this.invincibleTimer--;                  // 动画计时         if (Math.abs(this.vx) > 0) this.animTimer += 0.2;                  // 跑步灰尘         if (this.onGround && Math.abs(this.vx) > 0 && Math.random() > 0.8) {              particles.push(new Particle(this.x + this.w/2, this.y + this.h, 'dust'));         }     }      draw(ctx, camX) {         if (this.invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return; // 闪烁          const drawX = this.x - camX;         const drawY = this.y;                  ctx.save();                  // 身体         ctx.fillStyle = this.color;         ctx.beginPath();         ctx.arc(drawX + 20, drawY + 20, 15, 0, Math.PI*2); // 头         ctx.fill();         ctx.fillRect(drawX + 5, drawY + 30, 30, 30); // 身                  // 帽子         ctx.fillStyle = '#d32f2f';         ctx.fillRect(drawX, drawY - 5, 40, 10); // 帽檐         ctx.fillRect(drawX + 5, drawY - 20, 30, 20); // 帽顶                  // 眼睛         ctx.fillStyle = 'white';         let eyeOffset = this.facingRight ? 5 : -5;         ctx.beginPath();         ctx.arc(drawX + 20 + eyeOffset, drawY + 15, 4, 0, Math.PI*2);         ctx.fill();         ctx.fillStyle = 'black';         ctx.beginPath();         ctx.arc(drawX + 20 + eyeOffset + (this.facingRight?1:-1), drawY + 15, 2, 0, Math.PI*2);         ctx.fill();          // 腿 (简单的动画)         ctx.fillStyle = '#3e2723';         if (this.onGround && Math.abs(this.vx) > 0) {             let legOffset = Math.sin(this.animTimer) * 10;             ctx.fillRect(drawX + 10 + legOffset, drawY + 60, 8, 10);             ctx.fillRect(drawX + 22 - legOffset, drawY + 60, 8, 10);         } else {             ctx.fillRect(drawX + 10, drawY + 60, 8, 10);             ctx.fillRect(drawX + 22, drawY + 60, 8, 10);         }          ctx.restore();     } }  class Enemy extends Entity {     constructor(x, y, type) {         super(x, y, 40, 40, type === 'octopus' ? '#9c27b0' : '#ff9800');         this.type = type; // 'octopus' or 'mushroom'         this.speed = 2;         this.dir = 1;         this.dead = false;     }      update(platforms) {         if (this.dead) return;                  this.x += this.speed * this.dir;                  // 简单的巡逻AI：如果前方没有平台或撞墙则回头         // 这里简化为碰到屏幕边缘或者特定范围回头         // 实际应检测脚底是否有平台         let onGround = false;         for(let p of platforms) {             if (this.x + this.w/2 > p.x && this.x + this.w/2 < p.x + p.w &&                 Math.abs((this.y + this.h) - p.y) < 5) {                 onGround = true;             }         }                  // 碰到边界或悬空则回头         if (!onGround || this.x <= cameraX - 100 || this.x + this.w >= cameraX + canvas.width + 100) {              // 简单处理：只在碰到特定标记物或地图边界回头，这里简化为随机或计时              // 更好的做法是检测碰撞盒         }                  // 距离检测回头 (为了简单，章鱼怪在一定范围内来回)         if (!this.patrolStart) this.patrolStart = this.x;         if (this.x > this.patrolStart + 150) this.dir = -1;         if (this.x < this.patrolStart - 150) this.dir = 1;     }      draw(ctx, camX) {         if (this.dead) return;         const drawX = this.x - camX;                  if (this.type === 'octopus') {             // 章鱼             ctx.fillStyle = '#8e24aa';             ctx.beginPath();             ctx.arc(drawX + 20, this.y + 20, 18, Math.PI, 0);             ctx.lineTo(drawX + 38, this.y + 40);             ctx.lineTo(drawX + 30, this.y + 30);             ctx.lineTo(drawX + 22, this.y + 40);             ctx.lineTo(drawX + 14, this.y + 30);             ctx.lineTo(drawX + 2, this.y + 40);             ctx.fill();             // 眼睛             ctx.fillStyle = 'white';             ctx.fillRect(drawX + 10, this.y + 10, 8, 8);             ctx.fillRect(drawX + 22, this.y + 10, 8, 8);         } else {             // 蘑菇             ctx.fillStyle = '#d84315';             ctx.beginPath();             ctx.arc(drawX + 20, this.y + 20, 20, Math.PI, 0);             ctx.fillRect(drawX + 5, this.y + 20, 30, 20);             ctx.fill();             // 斑点             ctx.fillStyle = '#fff';             ctx.beginPath(); ctx.arc(drawX+15, this.y+15, 3, 0, Math.PI*2); ctx.fill();             ctx.beginPath(); ctx.arc(drawX+25, this.y+12, 4, 0, Math.PI*2); ctx.fill();         }     } }  class Particle {     constructor(x, y, type) {         this.x = x;         this.y = y;         this.type = type;         this.life = 1.0;         this.vx = (Math.random() - 0.5) * 4;         this.vy = (Math.random() - 0.5) * 4;         if (type === 'coin') { this.vy = -5; this.color = '#ffd700'; }         else if (type === 'sparkle') { this.color = '#fff'; this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-0.5)*10; }         else { this.color = '#ccc'; this.vx *= 0.5; }     }     update() {         this.x += this.vx;         this.y += this.vy;         this.life -= 0.05;     }     draw(ctx, camX) {         ctx.globalAlpha = this.life;         ctx.fillStyle = this.color;         ctx.beginPath();         ctx.arc(this.x - camX, this.y, 3 + Math.random()*3, 0, Math.PI*2);         ctx.fill();         ctx.globalAlpha = 1.0;     } }  // 游戏数据 let player; let platforms = []; let coins = []; let enemies = []; let stars = []; let particles = []; let flag = {x: 0, y: 0, w: 20, h: 200};  // 初始化关卡 function initLevel() {     platforms = [];     coins = [];     enemies = [];     stars = [];     particles = [];          // 地面生成     const groundY = GAME_HEIGHT - 50;     const totalPlatforms = 30; // 5倍宽度内的平台数量     const segmentWidth = GAME_WIDTH / totalPlatforms;          // 基础地面     platforms.push({x: -100, y: groundY, w: GAME_WIDTH + 200, h: 100, type: 'ground'});          // 悬崖缺口     // 移除中间几段造成坑     for(let i=5; i<8; i++) {         platforms[0].w -= segmentWidth; // 简单处理：只留一段很长的，或者在数组中push独立块     }     // 重写地面逻辑：使用独立块     platforms = [];     let currentX = 0;     platforms.push({x: 0, y: groundY, w: 800, h: 100}); // 起点          currentX = 800;     // 生成各种地形     for(let i=0; i<40; i++) {         let w = 200 + Math.random() * 300;         let gap = 100 + Math.random() * 150;         let y = groundY - (Math.random() * 150); // 高度变化                  // 管道 (障碍物)         if (Math.random() > 0.7) {             platforms.push({x: currentX + 50, y: groundY - 80, w: 60, h: 80, type: 'pipe'});         }                  // 浮动平台         platforms.push({x: currentX, y: y, w: w, h: 30});                  // 放置金币         if (Math.random() > 0.3) {             coins.push({x: currentX + w/2 - 10, y: y - 60, w: 20, h: 20, collected: false});         }                  // 放置星星         if (i % 10 === 0) {             stars.push({x: currentX + w/2 - 15, y: y - 120, w: 30, h: 30, collected: false});         }          // 放置敌人         if (Math.random() > 0.5) {             enemies.push(new Enemy(currentX + w/2, y - 40, Math.random()>0.5?'octopus':'mushroom'));         }                  currentX += w + gap;     }          // 最后的平台和旗帜     platforms.push({x: currentX, y: groundY, w: 1000, h: 100});     flag.x = currentX + 800;     flag.y = groundY - 200;          GAME_WIDTH = currentX + 1000; // 更新总长度          player = new Player(100, groundY - 100); }  // 绘制背景 (视差) function drawBackground() {     // 天空     ctx.fillStyle = '#87CEEB';     ctx.fillRect(0, 0, canvas.width, canvas.height);          // 远景云 (慢速)     ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';     for(let i=0; i<10; i++) {         let cloudX = (i * 300 - cameraX * 0.2) % (canvas.width + 300);         if (cloudX < -100) cloudX += canvas.width + 300;         ctx.beginPath();         ctx.arc(cloudX, 100, 40, 0, Math.PI*2);         ctx.arc(cloudX + 50, 120, 50, 0, Math.PI*2);         ctx.fill();     }          // 海洋 (近景)     ctx.fillStyle = '#0277bd';     ctx.fillRect(0, GAME_HEIGHT - 50 + 50, canvas.width, canvas.height); // +50 offset for visual          // 波浪     ctx.fillStyle = '#039be5';     for(let i=0; i<canvas.width; i+=50) {         let waveY = (GAME_HEIGHT - 40) + Math.sin((i + cameraX*0.5) * 0.05) * 10;         ctx.beginPath();         ctx.arc(i, waveY + 50, 20, 0, Math.PI, true);         ctx.fill();     } }  // 游戏主循环 function loop() {     if (currentState !== STATE.PLAYING && currentState !== STATE.COUNTDOWN) {         // 即使暂停也要绘制背景保持美观         if(currentState === STATE.MENU) {             drawBackground();         }         requestAnimationFrame(loop);         return;     }      // 清除     ctx.clearRect(0, 0, canvas.width, canvas.height);          // 绘制背景     drawBackground();      if (currentState === STATE.PLAYING) {         gameTime = (Date.now() - startTime) / 1000;                  // 相机跟随         let targetCamX = player.x - canvas.width / 3;         if (targetCamX < 0) targetCamX = 0;         if (targetCamX > GAME_WIDTH - canvas.width) targetCamX = GAME_WIDTH - canvas.width;         cameraX += (targetCamX - cameraX) * 0.1; // 平滑                  // 更新玩家         player.update(platforms);                  // 掉落检测         if (player.y > GAME_HEIGHT + 100) {             handleDeath();         }                  // 实体更新         enemies.forEach(e => e.update(platforms));         particles.forEach((p, i) => {             p.update();             if (p.life <= 0) particles.splice(i, 1);         });                  // 碰撞检测 - 收集品         // Coins         coins.forEach(c => {             if (!c.collected && rectIntersect(player, c)) {                 c.collected = true;                 score += 10;                 playSound('coin');                 updateHUD();                 for(let i=0; i<10; i++) particles.push(new Particle(c.x + c.w/2, c.y + c.h/2, 'coin'));             }         });         // Stars         stars.forEach(s => {             if (!s.collected && rectIntersect(player, s)) {                 s.collected = true;                 score += 50;                 playSound('coin'); // Reuse sound                 updateHUD();                 for(let i=0; i<20; i++) particles.push(new Particle(s.x + s.w/2, s.y + s.h/2, 'sparkle'));             }         });                  // 敌人碰撞         enemies.forEach(e => {             if (!e.dead && rectIntersect(player, e)) {                 // 踩踏检测                 if (player.vy > 0 && player.y + player.h < e.y + e.h * 0.5) {                     // Kill                     e.dead = true;                     player.vy = -10; // 弹跳                     score += 100;                     playSound('stomp');                     updateHUD();                 } else {                     // Hurt                     if (player.invincibleTimer <= 0) {                         handleHurt();                     }                 }             }         });                  // 通关检测         if (rectIntersect(player, flag)) {             winGame();         }     }      // 绘制游戏世界     // 平台     platforms.forEach(p => {         if (p.type === 'pipe') {             ctx.fillStyle = '#4caf50'; // 绿色管道             ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);             ctx.fillStyle = '#2e7d32'; // 管道条纹             ctx.fillRect(p.x - cameraX + 5, p.y + 10, p.w - 10, 10);             ctx.fillRect(p.x - cameraX + 5, p.y + 30, p.w - 10, 10);             // 管口             ctx.fillStyle = '#388e3c';             ctx.fillRect(p.x - cameraX - 5, p.y, p.w + 10, 15);         } else {             // 普通平台 (草地风格)             ctx.fillStyle = '#795548';             ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);             ctx.fillStyle = '#4caf50'; // 草皮             ctx.fillRect(p.x - cameraX, p.y, p.w, 15);         }     });          // 收集品绘制     coins.forEach(c => {         if (!c.collected) {             let floatY = Math.sin(Date.now() / 200) * 5;             ctx.fillStyle = '#ffd700';             ctx.beginPath();             ctx.arc(c.x - cameraX + 10, c.y + 10 + floatY, 10, 0, Math.PI*2);             ctx.fill();             ctx.fillStyle = '#ffeb3b';             ctx.font = '12px Arial';             ctx.fillText('$', c.x - cameraX + 6, c.y + 14 + floatY);         }     });          stars.forEach(s => {         if (!s.collected) {             ctx.save();             ctx.translate(s.x - cameraX + 15, s.y + 15);             ctx.rotate(Date.now() / 500);             ctx.fillStyle = '#ffeb3b';             drawStar(ctx, 0, 0, 5, 15, 7);             ctx.restore();         }     });          // 敌人     enemies.forEach(e => e.draw(ctx, cameraX));          // 玩家     player.draw(ctx, cameraX);          // 粒子     particles.forEach(p => p.draw(ctx, cameraX));          // 旗帜     ctx.fillStyle = '#8d6e63'; // 杆     ctx.fillRect(flag.x - cameraX, flag.y, 10, 200);     ctx.fillStyle = '#f44336'; // 旗     ctx.beginPath();     ctx.moveTo(flag.x - cameraX + 10, flag.y);     ctx.lineTo(flag.x - cameraX + 80, flag.y + 30);     ctx.lineTo(flag.x - cameraX + 10, flag.y + 60);     ctx.fill();      requestAnimationFrame(loop); }  // 辅助函数 function rectIntersect(r1, r2) {     return !(r2.x > r1.x + r1.w ||               r2.x + r2.w < r1.x ||               r2.y > r1.y + r1.h ||               r2.y + r2.h < r1.y); }  function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {     let rot = Math.PI / 2 * 3;     let x = cx;     let y = cy;     let step = Math.PI / spikes;      ctx.beginPath();     ctx.moveTo(cx, cy - outerRadius);     for (let i = 0; i < spikes; i++) {         x = cx + Math.cos(rot) * outerRadius;         y = cy + Math.sin(rot) * outerRadius;         ctx.lineTo(x, y);         rot += step;          x = cx + Math.cos(rot) * innerRadius;         y = cy + Math.sin(rot) * innerRadius;         ctx.lineTo(x, y);         rot += step;     }     ctx.lineTo(cx, cy - outerRadius);     ctx.closePath();     ctx.fill(); }  function handleHurt() {     lives--;     playSound('hurt');     updateHUD();     saveData();          if (lives <= 0) {         gameOver();     } else {         // 复活逻辑：找到最近的安全点或者重置到起始点附近         // 简单处理：回到相机视野内的地面，如果掉下去再死         player.vy = 0;         player.x = Math.max(100, player.x - 200);          player.y = 0;          player.invincibleTimer = 120; // 2秒 (60fps)     } }  function handleDeath() {     lives--;     playSound('hurt');     updateHUD();     saveData();     if (lives <= 0) {         gameOver();     } else {         player.x = 100;         player.y = 100;         player.vy = 0;         player.invincibleTimer = 120;         cameraX = 0;     } }  function updateHUD() {     document.getElementById('scoreDisplay').innerText = score;     document.getElementById('livesDisplay').innerText = lives; }  // 游戏流程控制 function startGame() {     initAudio();     loadData(); // 加载之前的进度（如果愿意保留的话，或者重置）     // 这里我们选择每次开始新游戏重置分数，保留最高分或者本地存储逻辑可选     // 为了游戏性，每次点击开始是新一轮     score = 0;     lives = 3;     saveData();          initLevel();          document.getElementById('startScreen').classList.add('hidden');     document.getElementById('hud').classList.remove('hidden');     document.getElementById('gameOverScreen').classList.add('hidden');     document.getElementById('winScreen').classList.add('hidden');          updateHUD();          // 倒计时     currentState = STATE.COUNTDOWN;     let count = 3;     const countEl = document.getElementById('countdown');     countEl.style.display = 'block';     countEl.innerText = count;          let timer = setInterval(() => {         count--;         if (count > 0) {             countEl.innerText = count;             countEl.style.animation = 'none';             countEl.offsetHeight; /* trigger reflow */             countEl.style.animation = 'pop 0.5s ease-out';         } else if (count === 0) {             countEl.innerText = "GO!";         } else {             clearInterval(timer);             countEl.style.display = 'none';             currentState = STATE.PLAYING;             startTime = Date.now();         }     }, 1000);          loop(); }  function gameOver() {     currentState = STATE.GAMEOVER;     document.getElementById('finalScore').innerText = score;     document.getElementById('gameOverScreen').classList.remove('hidden');     document.getElementById('hud').classList.add('hidden');     localStorage.removeItem('platformer_score'); // 清除数据     localStorage.removeItem('platformer_lives'); }  function winGame() {     currentState = STATE.WIN;     playSound('win');     document.getElementById('winScore').innerText = score;     document.getElementById('winTime').innerText = gameTime.toFixed(1);     document.getElementById('winScreen').classList.remove('hidden');     document.getElementById('hud').classList.add('hidden'); }  function restartGame() {     document.getElementById('gameOverScreen').classList.add('hidden');     document.getElementById('winScreen').classList.add('hidden');     startGame(); }  // 键盘事件 window.addEventListener('keydown', e => {     if (e.code === 'ArrowLeft') keys.ArrowLeft = true;     if (e.code === 'ArrowRight') keys.ArrowRight = true;     if (e.code === 'Space') {         keys.Space = true;         // 防止滚动页面         e.preventDefault();     } });  window.addEventListener('keyup', e => {     if (e.code === 'ArrowLeft') keys.ArrowLeft = false;     if (e.code === 'ArrowRight') keys.ArrowRight = false;     if (e.code === 'Space') keys.Space = false; });  // 初始绘制背景 drawBackground();  </script> </body> </html>
