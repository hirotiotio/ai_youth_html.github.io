<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>绘本阅读</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8EF;
      --bg-warm: #FFF2E0;
      --page-bg: #FFFDF9;
      --text-dark: #3D2C1E;
      --text-mid: #7A5C44;
      --text-light: #B89880;
      --accent: #FF8C42;
      --accent2: #FFB347;
      --accent-soft: #FFF0E0;
      --green: #72B886;
      --blue: #6AADE4;
      --pink: #F4A0B0;
      --border: rgba(210,170,130,0.25);
      --shadow: 0 6px 32px rgba(180,120,60,0.10), 0 1px 4px rgba(180,120,60,0.08);
      --radius: 20px;
      --flip-ms: 0.7s;
    }

    body.dark {
      --bg: #1E1510;
      --bg-warm: #261A10;
      --page-bg: #2C2018;
      --text-dark: #F5E8D5;
      --text-mid: #C9A880;
      --text-light: #7A6050;
      --accent: #FF9A55;
      --accent-soft: #3A2A18;
      --border: rgba(150,100,60,0.22);
      --shadow: 0 6px 32px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.4s, color 0.4s;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 28px 16px;
      position: relative;
    }
    .header-center { text-align: center; line-height: 1.3; }
    .book-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 4px;
      position: relative;
      display: inline-block;
    }
    .book-title::before, .book-title::after {
      content: '✦'; font-size: 14px; color: var(--accent);
      position: absolute; top: 50%; transform: translateY(-50%);
    }
    .book-title::before { left: -26px; }
    .book-title::after  { right: -26px; }
    .book-meta {
      margin-top: 4px;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; flex-wrap: wrap;
    }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent-soft);
      border: 1px solid rgba(255,140,66,0.2);
      border-radius: 40px; padding: 3px 12px;
      font-size: 16px; font-weight: 400;
      color: var(--text-mid); letter-spacing: 0.5px;
    }
    .meta-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    .dark-switch {
      position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    }
    .dark-switch span { font-size: 12px; color: var(--text-light); }
    .switch-track {
      width: 42px; height: 22px; background: var(--text-light);
      border-radius: 11px; position: relative; transition: background 0.3s;
    }
    body.dark .switch-track { background: var(--accent); }
    .switch-knob {
      width: 18px; height: 18px; background: #fff; border-radius: 50%;
      position: absolute; top: 2px; left: 2px;
      transition: transform 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    body.dark .switch-knob { transform: translateX(20px); }

    .stage {
      flex: 1; display: flex; justify-content: center; align-items: center;
      padding: 8px 16px; width: 100%; overflow: hidden;
    }
    .book-frame {
      perspective: 2400px;
      width: 960px; aspect-ratio: 16 / 9; flex-shrink: 0;
    }

    /* ── 平板 ── */
    @media (max-width: 1000px) {
      .book-frame { width: 94vw; }
      .header { padding: 12px 16px 6px; }
      .book-title { font-size: 26px; }
      .meta-pill { font-size: 13px; padding: 2px 10px; }
      .dark-switch { right: 12px; }
    }

    /* ═══ 手机横屏 ═══ */
    @media (max-width: 600px) and (orientation: landscape) {
      .rotate-hint { display: none !important; }
      html, body { height: 100dvh; overflow: hidden; }
      .header { padding: 2px 10px; flex-shrink: 0; }
      .book-title { font-size: 17px; letter-spacing: 1px; }
      .book-title::before, .book-title::after { display: none; }
      .meta-pill { font-size: 10px; padding: 1px 6px; }
      .meta-dot { width: 3px; height: 3px; }
      .book-meta { margin-top: 0; gap: 3px; }
      .dark-switch { right: 6px; gap: 4px; }
      .dark-switch span { font-size: 9px; }
      .switch-track { width: 30px; height: 16px; }
      .switch-knob { width: 12px; height: 12px; }
      body.dark .switch-knob { transform: translateX(14px); }
      .stage { flex: 1; min-height: 0; padding: 2px 6px; position: relative; }
      .book-frame {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: auto; height: 100%; aspect-ratio: unset;
      }
      .book { height: 100%; aspect-ratio: 16/9; max-width: calc(100vw - 12px); }
      .top-band { height: 26px; min-height: 26px; padding: 0 10px; gap: 5px; }
      .top-icon { font-size: 13px; }
      .top-text { font-size: 14px; letter-spacing: 1px; }
      .page-badge { font-size: 8px; right: 8px; }
      .bottom-band { min-height: 32px; max-height: 44px; padding: 2px 10px; }
      .bottom-label { display: none; }
      .bottom-text { font-size: 11px; line-height: 1.35; }
      .audio-bar { height: 24px; min-height: 24px; padding: 0 8px; gap: 5px; }
      .play-btn { width: 20px; height: 20px; font-size: 8px; }
      .waveform { height: 10px; }
      .wave-bar { width: 1.5px; }
      .wave-bar:nth-child(1) { height: 3px; }
      .wave-bar:nth-child(2) { height: 6px; }
      .wave-bar:nth-child(3) { height: 8px; }
      .wave-bar:nth-child(4) { height: 5px; }
      .wave-bar:nth-child(5) { height: 7px; }
      .wave-bar:nth-child(6) { height: 4px; }
      .progress-track { height: 2px; }
      .time-label { font-size: 7px; min-width: 40px; }
      .img-area::after { height: 14px; }
      .nav { gap: 12px; padding: 3px 0 6px; flex-shrink: 0; }
      .nav-btn { width: 32px; height: 32px; font-size: 12px; }
      .dot { width: 5px; height: 5px; }
      .deco-cloud { display: none; }
      .spine-shadow { top: 2px; bottom: 2px; width: 4px; }
    }

    /* ═══ 手机竖屏 ═══ */
    @media (max-width: 600px) and (orientation: portrait) {
      .rotate-hint { display: none !important; }
      .header { padding: 14px 16px 10px; }
      .book-title { font-size: 24px; letter-spacing: 2px; }
      .book-title::before { left: -20px; font-size: 10px; }
      .book-title::after  { right: -20px; font-size: 10px; }
      .meta-pill { font-size: 13px; padding: 2px 9px; }
      .dark-switch { right: 12px; gap: 6px; }
      .dark-switch span { font-size: 11px; }
      .switch-track { width: 36px; height: 19px; }
      .switch-knob { width: 15px; height: 15px; }
      body.dark .switch-knob { transform: translateX(17px); }
      .stage {
        flex: 1; min-height: 0; padding: 0;
        align-items: stretch;
        overflow-y: auto; overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .book-frame { perspective: none; width: 100%; aspect-ratio: unset; }
      .book { width: 100%; height: auto; transform-style: flat; }
      .page {
        position: relative !important;
        transform: none !important;
        transform-origin: unset !important;
        transition: none !important;
        display: none; width: 100%;
      }
      .page.active-mobile { display: block; }
      .page-face {
        position: relative !important;
        transform: none !important;
        backface-visibility: visible !important;
        -webkit-backface-visibility: visible !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }
      .page-back { display: none !important; }
      .face-inner {
        transform: none !important;
        opacity: 1 !important;
        filter: none !important;
        pointer-events: auto !important;
      }
      .top-band { height: auto; min-height: 40px; padding: 10px 16px; gap: 8px; }
      .top-icon { font-size: 18px; }
      .top-text { font-size: 20px; letter-spacing: 2px; }
      .page-badge { font-size: 11px; right: 12px; }
      .img-area { flex: none; width: 100%; height: 0; padding-bottom: 66%; }
      .img-area::after { height: 24px; }
      .bottom-band { min-height: unset; max-height: unset; padding: 10px 16px 12px; gap: 4px; }
      .bottom-label { font-size: 11px; }
      .bottom-text {
        font-size: 15px; line-height: 1.8;
        overflow-y: visible; flex: none; color: var(--text-mid);
      }
      .bottom-text::-webkit-scrollbar { display: none; }
      .audio-bar { height: 44px; min-height: 44px; padding: 0 16px; gap: 10px; }
      .play-btn { width: 32px; height: 32px; font-size: 12px; }
      .waveform { height: 18px; }
      .wave-bar { width: 2.5px; }
      .wave-bar:nth-child(1) { height: 7px; }
      .wave-bar:nth-child(2) { height: 13px; }
      .wave-bar:nth-child(3) { height: 17px; }
      .wave-bar:nth-child(4) { height: 11px; }
      .wave-bar:nth-child(5) { height: 15px; }
      .wave-bar:nth-child(6) { height: 9px; }
      .progress-track { height: 5px; }
      .time-label { font-size: 10px; min-width: 68px; }
      .spine-shadow { display: none; }
      .nav {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        gap: 20px; padding: 10px 0;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        background: var(--bg); border-top: 1px solid var(--border);
        transition: background 0.4s;
      }
      .nav-btn { width: 44px; height: 44px; font-size: 16px; }
      .dot { width: 7px; height: 7px; }
      .dot.active { transform: scale(1.35); }
      .deco-cloud { display: none; }
      body { padding-bottom: 70px; }
    }

    /* ── 旋转提示 ── */
    .rotate-hint {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; transition: background 0.4s;
    }
    .rotate-icon { width: 80px; height: 80px; animation: rotatePhone 2s ease-in-out infinite; }
    .rotate-text { font-size: 18px; font-weight: 500; color: var(--text-mid); letter-spacing: 1px; }
    .rotate-sub { font-size: 13px; color: var(--text-light); }
    @keyframes rotatePhone {
      0%, 20% { transform: rotate(0deg); }
      40%, 60% { transform: rotate(90deg); }
      80%, 100% { transform: rotate(0deg); }
    }

    /* ── 书（桌面3D） ── */
    .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
    .page {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform var(--flip-ms) ease-in-out;
    }
    .page-face {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--radius); overflow: hidden;
      background: var(--page-bg); box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .page-back { transform: rotateY(180deg); }
    .page-back .face-inner { transform: scaleX(-1); opacity: 0.4; filter: brightness(0.9); pointer-events: none; }
    .page-back .face-inner .audio-bar { opacity: 0; }
    .face-inner { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* ── 顶部主题条 ── */
    .top-band {
      height: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 0 28px;
      background: linear-gradient(90deg, var(--bg-warm), var(--accent-soft), var(--bg-warm));
      border-bottom: 1.5px solid var(--border); position: relative;
    }
    .top-icon { font-size: 20px; line-height: 1; flex-shrink: 0; }
    .top-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 24px; font-weight: 700;
      color: var(--text-dark); letter-spacing: 3px;
    }
    .page-badge {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--text-light); letter-spacing: 0.5px;
    }

    /* ── 图片区 ── */
    .img-area { flex: 1; overflow: hidden; position: relative; background: var(--bg-warm); }
    .img-area img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.6s ease;
    }
    .img-area img:hover { transform: scale(1.015); }
    .img-area::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
      background: linear-gradient(to bottom, transparent, var(--page-bg));
      pointer-events: none;
    }

    /* ── 底部文本 ──
       ★ 关键修复：去掉 max-height，文字自然撑开，不再截断 */
    .bottom-band {
      min-height: 60px;
      /* max-height 删除，不再限制 */
      display: flex; flex-direction: column;
      padding: 6px 28px 8px;
      border-top: 1.5px dashed var(--border); position: relative;
    }
    .bottom-label { font-size: 12px; color: var(--text-light); letter-spacing: 1px; }
    .bottom-text {
      font-size: 16px; line-height: 1.7; font-weight: 400;
      color: var(--text-mid); overflow-y: auto; flex: 1; letter-spacing: 0.3px;
    }
    .bottom-text::-webkit-scrollbar { width: 3px; }
    .bottom-text::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 2px; }

    /* ── 音频条 ── */
    .audio-bar {
      height: 38px; min-height: 38px;
      display: flex; align-items: center; gap: 12px; padding: 0 24px;
      border-top: 1px solid var(--border); background: var(--bg-warm);
    }
    .play-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(255,140,66,0.35);
    }
    .play-btn:hover { transform: scale(1.08); background: #e87730; }
    .play-btn:active { transform: scale(0.96); }
    .progress-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; cursor: pointer; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px; transition: width 0.12s linear;
    }
    .time-label { font-size: 11px; color: var(--text-light); min-width: 72px; text-align: right; font-variant-numeric: tabular-nums; }
    .waveform { display: flex; align-items: center; gap: 2px; height: 16px; flex-shrink: 0; }
    .wave-bar { width: 2px; border-radius: 2px; background: var(--accent2); opacity: 0.5; animation: wavePulse 1.4s ease-in-out infinite; }
    .wave-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { height: 16px; animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { height: 10px; animation-delay: 0.45s; }
    .wave-bar:nth-child(5) { height: 14px; animation-delay: 0.6s; }
    .wave-bar:nth-child(6) { height: 8px; animation-delay: 0.75s; }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.4); opacity: 0.8; }
    }
    .waveform.paused .wave-bar { animation-play-state: paused; }

    /* ── 书脊 ── */
    .spine-shadow {
      position: absolute; left: 0; top: 8px; bottom: 8px; width: 6px;
      background: linear-gradient(90deg, rgba(180,110,40,0.08), transparent);
      pointer-events: none; z-index: 1;
    }
    body.dark .spine-shadow { background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent); }

    /* ── 导航 ── */
    .nav { display: flex; justify-content: center; align-items: center; gap: 32px; padding: 16px 0 32px; }
    .nav-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: var(--accent-soft); color: var(--accent); font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 2px 10px rgba(255,140,66,0.15);
    }
    .nav-btn:hover:not(:disabled) { background: var(--accent); color: #fff; transform: scale(1.08); box-shadow: 0 4px 16px rgba(255,140,66,0.35); }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .dot-nav { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); border: 1.5px solid var(--text-light);
      transition: all 0.3s; cursor: pointer;
    }
    .dot.active { background: var(--accent); border-color: var(--accent); transform: scale(1.3); }
    .page.no-transition { transition: none !important; }

    .deco-cloud { position: fixed; pointer-events: none; opacity: 0.04; font-size: 140px; z-index: 0; }
    body.dark .deco-cloud { opacity: 0.02; }
    .deco-cloud.c1 { top: 5%; left: -30px; }
    .deco-cloud.c2 { bottom: 10%; right: -20px; font-size: 100px; }

    .swipe-hint {
      display: none; text-align: center; padding: 8px 0 4px;
      font-size: 12px; color: var(--text-light); letter-spacing: 1px;
      animation: fadeHint 2s ease-in-out infinite;
    }
    @media (max-width: 600px) and (orientation: portrait) { .swipe-hint { display: block; } }
    @keyframes fadeHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  </style>
</head>
<body>

  <div class="rotate-hint" id="rotateHint">
    <svg class="rotate-icon" viewBox="0 0 80 80" fill="none">
      <rect x="18" y="8" width="44" height="64" rx="8" stroke="var(--text-mid)" stroke-width="3" fill="none"/>
      <circle cx="40" cy="62" r="3" fill="var(--text-mid)"/>
      <path d="M72 36 L78 40 L72 44" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M78 40 L52 40" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="rotate-text">请横屏使用</div>
    <div class="rotate-sub">旋转手机以获得最佳阅读体验</div>
  </div>

  <div class="deco-cloud c1">☁</div>
  <div class="deco-cloud c2">☁</div>

  <header class="header">
    <div class="header-center">
      <h1 class="book-title" id="bookTitle"></h1>
      <div class="book-meta" id="bookMeta"></div>
    </div>
    <div class="dark-switch" onclick="toggleDark()">
      <span>夜间</span>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="book-frame">
      <div class="book" id="book"></div>
    </div>
    <div class="swipe-hint" id="swipeHint">左右滑动翻页</div>
  </div>

  <div class="nav" id="navBar">
    <button class="nav-btn" id="prevBtn" onclick="goPrev()">◀</button>
    <div class="dot-nav" id="dotNav"></div>
    <button class="nav-btn" id="nextBtn" onclick="goNext()">▶</button>
  </div>

<script>
const BOOK_TITLE = "愚公移山";
const BOOK_SCHOOL = "ai少年班";
const BOOK_CLASS  = "一星级1班";
const BOOK_NAME   = "贝贝";
const PAGE_ICONS = ['🌍','🌊','🌕','🌅','🔥','🏡','🌈','📖','🌸','⭐'];

const PAGES = [
  {"topText":"老人决心挖山，带领家人开始劳作","bottomText":"他每天带着家人挖石头，挑土筐，一筐一筐运到海边。","image":"https://raw.githubusercontent.com/hirotiotio/AIYOUTH-IMAGE/main/Suosi/image_20260417110538.png","audio":"https://cdn.jsdelivr.net/gh/hirotiotio/AIYOUTH-AUDIO@main/Suosi/audio_20260417110529.mp3"},
  {"topText":"邻居嘲笑老人，老人擦汗回应","bottomText":"邻居笑他傻，说山那么大，人那么老，怎么可能搬得动。愚公擦擦汗说：\u201c我搬不完，还有儿子，儿子搬不完还有孙子，子子孙孙不停挖，山却不会长高，总有一天会移走。\u201d","image":"https://raw.githubusercontent.com/hirotiotio/AIYOUTH-IMAGE/main/Suosi/image_20260417110626.png","audio":"https://cdn.jsdelivr.net/gh/hirotiotio/AIYOUTH-AUDIO@main/Suosi/audio_20260417110617.mp3"},
  {"topText":"神仙托梦，玉帝决定帮助","bottomText":"一天夜里，山神托梦给玉皇大帝，说愚公太执着，怕山真被挖没了。玉帝笑了，说：\u201c这哪是愚，这是勇。\u201d他派下两位大力神，一个扛起北山，一个挑起南山，嗖地飞走。","image":"https://raw.githubusercontent.com/hirotiotio/AIYOUTH-IMAGE/main/Suosi/image_20260417110710.png","audio":"https://cdn.jsdelivr.net/gh/hirotiotio/AIYOUTH-AUDIO@main/Suosi/audio_20260417110702.mp3"},
  {"topText":"清晨山消失，村民惊喜道谢","bottomText":"第二天清晨，村民醒来发现门前平坦开阔，阳光洒满田野。大家惊讶不已，纷纷跑到愚公家道谢。愚公却还在挖第一块石头，锄头敲得叮当响。","image":"https://raw.githubusercontent.com/hirotiotio/AIYOUTH-IMAGE/main/Suosi/image_20260417110753.png","audio":"https://cdn.jsdelivr.net/gh/hirotiotio/AIYOUTH-AUDIO@main/Suosi/audio_20260417110745.mp3"}
];

let cur = 0;
const total = PAGES.length;
let isFlipping = false;
const playing = {};
const audioEls = [];
let isMobilePortrait = false;
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bookTitle').textContent = BOOK_TITLE;
  document.title = BOOK_TITLE;

  const meta = document.getElementById('bookMeta');
  [BOOK_SCHOOL, BOOK_CLASS, BOOK_NAME].forEach((txt, i) => {
    if (i > 0) { const d = document.createElement('span'); d.className = 'meta-dot'; meta.appendChild(d); }
    const p = document.createElement('span'); p.className = 'meta-pill'; p.textContent = txt; meta.appendChild(p);
  });

  checkMobileMode();
  buildPages();
  buildAudioElements();
  buildDots();
  updateNav();

  window.addEventListener('resize', () => {
    const was = isMobilePortrait;
    checkMobileMode();
    if (was !== isMobilePortrait) rebuildForMode();
  });

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (!isMobilePortrait) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2) { dx < 0 ? goNext() : goPrev(); }
  }, { passive: true });
});

function checkMobileMode() {
  isMobilePortrait = (window.innerWidth <= 600 && window.innerHeight > window.innerWidth);
}

function rebuildForMode() {
  for (let i = 0; i < total; i++) stopAudio(i);
  if (isMobilePortrait) {
    showMobilePage(cur);
    document.getElementById('stage').scrollTop = 0;
  } else {
    document.querySelectorAll('.page').forEach((p, i) => {
      p.classList.remove('active-mobile');
      p.style.display = '';
      p.style.opacity = '';
      if (i < cur) { p.style.transform = 'rotateY(-180deg)'; p.style.zIndex = total - i; }
      else { p.style.transform = 'rotateY(0deg)'; p.style.zIndex = i === cur ? total : total - Math.abs(i - cur); }
    });
  }
  updateNav();
}

function showMobilePage(idx) {
  document.querySelectorAll('.page').forEach((p, i) => {
    if (i === idx) { p.classList.add('active-mobile'); p.style.display = 'block'; }
    else { p.classList.remove('active-mobile'); p.style.display = 'none'; }
  });
  const s = document.getElementById('stage');
  if (s) s.scrollTop = 0;
}

function buildDots() {
  const nav = document.getElementById('dotNav');
  nav.innerHTML = '';
  PAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => flipTo(i);
    d.id = 'dot' + i;
    nav.appendChild(d);
  });
}

function updateDots() {
  PAGES.forEach((_, i) => { const d = document.getElementById('dot' + i); if (d) d.className = 'dot' + (i === cur ? ' active' : ''); });
}

function buildPages() {
  const book = document.getElementById('book');
  book.innerHTML = '';
  PAGES.forEach((pg, i) => {
    const page = document.createElement('div');
    page.className = 'page' + (i === 0 ? '' : ' no-transition');
    page.dataset.index = i;
    page.style.zIndex = i > 0 ? total - i : total;
    if (i > 0) page.style.transform = 'rotateY(0deg)';
    if (isMobilePortrait) {
      page.style.display = i === 0 ? 'block' : 'none';
      if (i === 0) page.classList.add('active-mobile');
    }
    page.appendChild(createFace(pg, i, false));
    page.appendChild(createFace(i > 0 ? PAGES[i - 1] : null, i, true));
    book.appendChild(page);
  });
  requestAnimationFrame(() => { document.querySelectorAll('.page.no-transition').forEach(el => el.classList.remove('no-transition')); });
}

function createFace(pg, pageIndex, isBack) {
  const face = document.createElement('div');
  face.className = 'page-face ' + (isBack ? 'page-back' : 'page-front');
  const inner = document.createElement('div');
  inner.className = 'face-inner';
  if (!pg && isBack) { face.appendChild(inner); face.appendChild(createSpine()); return face; }

  const topBand = document.createElement('div');
  topBand.className = 'top-band';
  const icon = document.createElement('span'); icon.className = 'top-icon'; icon.textContent = PAGE_ICONS[pageIndex % PAGE_ICONS.length] || '📖';
  const topTxt = document.createElement('span'); topTxt.className = 'top-text'; topTxt.textContent = pg.topText || '';
  const badge = document.createElement('span'); badge.className = 'page-badge'; badge.textContent = (pageIndex + 1) + ' / ' + total;
  topBand.append(icon, topTxt, badge);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'img-area';
  if (pg.image) { const img = document.createElement('img'); img.src = pg.image; img.alt = pg.topText || ''; img.loading = 'lazy'; imgWrap.appendChild(img); }

  const btmBand = document.createElement('div');
  btmBand.className = 'bottom-band';
  const btmLabel = document.createElement('div'); btmLabel.className = 'bottom-label'; btmLabel.textContent = '故事内容';
  const btmTxt = document.createElement('div'); btmTxt.className = 'bottom-text'; btmTxt.textContent = pg.bottomText || '';
  btmBand.append(btmLabel, btmTxt);

  const audioBar = document.createElement('div');
  audioBar.className = 'audio-bar';
  const btn = document.createElement('button'); btn.className = 'play-btn'; btn.textContent = '▶';
  btn.onclick = e => { e.stopPropagation(); toggleAudio(pageIndex); };
  const wave = document.createElement('div'); wave.className = 'waveform paused'; wave.id = 'wave' + pageIndex;
  for (let j = 0; j < 6; j++) { const b = document.createElement('div'); b.className = 'wave-bar'; wave.appendChild(b); }
  const track = document.createElement('div'); track.className = 'progress-track';
  track.onclick = e => seekAudio(e, pageIndex);
  const fill = document.createElement('div'); fill.className = 'progress-fill'; fill.id = 'fill' + pageIndex;
  track.appendChild(fill);
  const time = document.createElement('span'); time.className = 'time-label'; time.id = 'time' + pageIndex; time.textContent = '0:00 / 0:00';
  audioBar.append(btn, wave, track, time);

  inner.append(topBand, imgWrap, btmBand, audioBar);
  face.appendChild(inner);
  face.appendChild(createSpine());
  return face;
}

function createSpine() { const s = document.createElement('div'); s.className = 'spine-shadow'; return s; }

function buildAudioElements() {
  audioEls.length = 0;
  PAGES.forEach((pg, i) => {
    const a = new Audio(); a.preload = 'auto';
    if (pg.audio) a.src = pg.audio;
    a.addEventListener('timeupdate', () => {
      if (!a.duration) return;
      const f = document.getElementById('fill' + i); if (f) f.style.width = (a.currentTime / a.duration * 100) + '%';
      const t = document.getElementById('time' + i); if (t) t.textContent = fmt(a.currentTime) + ' / ' + fmt(a.duration);
    });
    a.addEventListener('ended', () => { playing[i] = false; updateBtn(i); });
    audioEls.push(a);
  });
}

function playAudio(i) {
  const a = audioEls[i]; if (!a || !a.src) return;
  for (let j = 0; j < total; j++) if (j !== i) stopAudio(j);
  a.play().catch(() => {}); playing[i] = true; updateBtn(i);
}
function stopAudio(i) {
  const a = audioEls[i]; if (!a) return;
  a.pause(); a.currentTime = 0; playing[i] = false; updateBtn(i);
  const f = document.getElementById('fill' + i); if (f) f.style.width = '0%';
}
function pauseAudio(i) { const a = audioEls[i]; if (!a) return; a.pause(); playing[i] = false; updateBtn(i); }
function toggleAudio(i) {
  const a = audioEls[i]; if (!a || !a.src) return;
  if (playing[i]) pauseAudio(i);
  else { for (let j = 0; j < total; j++) if (j !== i) stopAudio(j); a.play().catch(() => {}); playing[i] = true; updateBtn(i); }
}
function seekAudio(e, i) {
  const a = audioEls[i]; if (!a || !a.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  a.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * a.duration;
}
function updateBtn(i) {
  const p = document.querySelector('.page[data-index="' + i + '"]'); if (!p) return;
  const b = p.querySelector('.page-front .play-btn'); if (b) b.textContent = playing[i] ? '⏸' : '▶';
  const w = document.getElementById('wave' + i); if (w) w.className = 'waveform' + (playing[i] ? '' : ' paused');
}
function fmt(s) { if (!s || isNaN(s)) return '0:00'; return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }

function flipTo(target) {
  if (target < 0 || target >= total || target === cur || isFlipping) return;

  if (isMobilePortrait) {
    isFlipping = true; stopAudio(cur);
    const pages = document.querySelectorAll('.page');
    const oldP = pages[cur], newP = pages[target];
    oldP.style.opacity = '0'; oldP.style.transition = 'opacity 0.2s ease';
    setTimeout(() => {
      showMobilePage(target);
      newP.style.opacity = '0'; newP.style.transition = 'none';
      void newP.offsetHeight;
      newP.style.transition = 'opacity 0.3s ease'; newP.style.opacity = '1';
      cur = target; updateNav(); updateDots();
      setTimeout(() => playAudio(cur), 200);
      isFlipping = false;
    }, 200);
    return;
  }

  isFlipping = true;
  const forward = target > cur;
  const pages = document.querySelectorAll('.page');
  stopAudio(cur); playFlipSound();

  if (forward) {
    pages[cur].style.zIndex = total + 10;
    pages[target].style.zIndex = total;
    pages[cur].style.transform = 'rotateY(-180deg)';
    setTimeout(() => { cur = target; updateNav(); updateDots(); setTimeout(() => playAudio(cur), 180); isFlipping = false; }, 700);
  } else {
    pages[target].style.zIndex = total + 10;
    pages[target].style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      pages[cur].style.zIndex = total - cur; cur = target;
      pages.forEach((p, i) => { if (i !== cur) p.style.zIndex = total - Math.abs(i - cur); });
      pages[cur].style.zIndex = total;
      updateNav(); updateDots(); setTimeout(() => playAudio(cur), 180); isFlipping = false;
    }, 700);
  }
}

function goNext() { flipTo(cur + 1); }
function goPrev() { flipTo(cur - 1); }
function updateNav() {
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === total - 1;
}

function playFlipSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = ctx.sampleRate, dur = 0.28, len = Math.floor(sr * dur);
    const buf = ctx.createBuffer(1, len, sr), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) { const t = i / len; d[i] = (Math.random() * 2 - 1) * Math.pow(Math.sin(t * Math.PI), 0.5) * Math.exp(-t * 4) * 0.35; }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 0.7;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 600;
    const g = ctx.createGain(); g.gain.value = 0.5;
    src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function toggleDark() { document.body.classList.toggle('dark'); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goNext();
  else if (e.key === 'ArrowLeft') goPrev();
  else if (e.key === ' ') { e.preventDefault(); toggleAudio(cur); }
});
</script>
</body>
