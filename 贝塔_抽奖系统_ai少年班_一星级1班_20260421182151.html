<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>幸运抽奖</title>     <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>     <style>         * {             margin: 0;             padding: 0;             box-sizing: border-box;         }                  body {             font-family: 'Comic Sans MS', cursive, sans-serif;             min-height: 100vh;             background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);             padding: 20px;         }                  .container {             max-width: 800px;             margin: 0 auto;             background: white;             border-radius: 30px;             padding: 30px;             box-shadow: 0 10px 40px rgba(0,0,0,0.15);         }                  h1 {             text-align: center;             color: #ff6b6b;             font-size: 2.5em;             margin-bottom: 10px;             text-shadow: 2px 2px 4px rgba(0,0,0,0.1);         }                  .subtitle {             text-align: center;             color: #888;             margin-bottom: 30px;             font-size: 1.2em;         }                  .decoration {             text-align: center;             font-size: 3em;             margin-bottom: 20px;         }                  .section {             background: #fff5f5;             border-radius: 20px;             padding: 25px;             margin-bottom: 20px;             border: 3px solid #ffd4d4;         }                  .section-title {             color: #ff6b6b;             font-size: 1.5em;             margin-bottom: 15px;             display: flex;             align-items: center;             gap: 10px;         }                  label {             display: block;             font-size: 1.2em;             color: #555;             margin-bottom: 8px;             font-weight: bold;         }                  input[type="text"],         input[type="number"],         select {             width: 100%;             padding: 15px;             font-size: 1.2em;             border: 3px solid #ffd4d4;             border-radius: 15px;             outline: none;             transition: all 0.3s;             font-family: inherit;         }                  input:focus,         select:focus {             border-color: #ff6b6b;             box-shadow: 0 0 15px rgba(255,107,107,0.3);         }                  textarea {             width: 100%;             padding: 15px;             font-size: 1.1em;             border: 3px solid #ffd4d4;             border-radius: 15px;             outline: none;             resize: vertical;             min-height: 100px;             font-family: inherit;         }                  .file-upload {             display: flex;             gap: 15px;             flex-wrap: wrap;         }                  .file-upload-btn {             flex: 1;             min-width: 200px;         }                  input[type="file"] {             display: none;         }                  .custom-file-upload {             display: inline-block;             padding: 18px 30px;             background: linear-gradient(45deg, #ff6b6b, #ff8e53);             color: white;             border-radius: 15px;             cursor: pointer;             font-size: 1.2em;             font-weight: bold;             text-align: center;             transition: all 0.3s;             box-shadow: 0 5px 15px rgba(255,107,107,0.4);         }                  .custom-file-upload:hover {             transform: translateY(-3px);             box-shadow: 0 8px 20px rgba(255,107,107,0.5);         }                  .file-name {             color: #888;             font-size: 1em;             margin-top: 10px;         }                  .count-display {             text-align: center;             font-size: 1.3em;             color: #666;             margin-top: 10px;         }                  .count-display span {             color: #ff6b6b;             font-weight: bold;             font-size: 1.5em;         }                  .btn-group {             display: flex;             gap: 15px;             flex-wrap: wrap;             margin-top: 10px;         }                  .count-btn {             flex: 1;             min-width: 80px;             padding: 15px;             font-size: 1.3em;             border: none;             border-radius: 15px;             cursor: pointer;             background: #f0f0f0;             color: #666;             transition: all 0.3s;             font-family: inherit;             font-weight: bold;         }                  .count-btn:hover {             background: #e0e0e0;         }                  .count-btn.active {             background: linear-gradient(45deg, #ff6b6b, #ff8e53);             color: white;             box-shadow: 0 5px 15px rgba(255,107,107,0.4);         }                  .draw-btn {             width: 100%;             padding: 25px;             font-size: 2em;             font-weight: bold;             border: none;             border-radius: 20px;             cursor: pointer;             background: linear-gradient(45deg, #ff6b6b, #ff8e53);             color: white;             transition: all 0.3s;             font-family: inherit;             box-shadow: 0 8px 25px rgba(255,107,107,0.5);             margin-top: 20px;         }                  .draw-btn:hover {             transform: scale(1.02);             box-shadow: 0 12px 35px rgba(255,107,107,0.6);         }                  .draw-btn:active {             transform: scale(0.98);         }                  .draw-btn:disabled {             background: #ccc;             cursor: not-allowed;             box-shadow: none;         }                  .result-section {             display: none;             text-align: center;             margin-top: 30px;             animation: fadeIn 0.5s;         }                  @keyframes fadeIn {             from { opacity: 0; transform: translateY(20px); }             to { opacity: 1; transform: translateY(0); }         }                  .prize-title {             font-size: 2em;             color: #ff6b6b;             margin-bottom: 20px;         }                  .winner-list {             display: flex;             flex-wrap: wrap;             justify-content: center;             gap: 20px;         }                  .winner {             background: linear-gradient(135deg, #fff5f5, #ffe5e5);             padding: 30px 40px;             border-radius: 20px;             font-size: 2em;             color: #ff6b6b;             font-weight: bold;             border: 4px solid #ff6b6b;             animation: winnerBounce 0.6s ease infinite alternate;             box-shadow: 0 10px 30px rgba(255,107,107,0.3);         }                  @keyframes winnerBounce {             0% { transform: scale(1) translateY(0); }             50% { transform: scale(1.1) translateY(-10px); }             100% { transform: scale(1) translateY(0); }         }                  .winner:nth-child(2n) {             animation-delay: 0.2s;             background: linear-gradient(135deg, #e5f5ff, #d4f0ff);             border-color: #4facfe;             color: #4facfe;         }                  .winner:nth-child(3n) {             animation-delay: 0.4s;             background: linear-gradient(135deg, #fff5e5, #ffe8d4);             border-color: #ffa726;             color: #ffa726;         }                  .no-names {             text-align: center;             color: #ff6b6b;             font-size: 1.3em;             padding: 20px;         }                  @media (max-width: 600px) {             .container {                 padding: 20px;             }                          h1 {                 font-size: 1.8em;             }                          .section {                 padding: 20px;             }                          .winner {                 font-size: 1.5em;                 padding: 20px 30px;             }                          .draw-btn {                 font-size: 1.5em;                 padding: 20px;             }         }     </style> </head> <body>     <div class="container">         <div class="decoration">🎉🎊🎁</div>         <h1>✨ 幸运抽奖 ✨</h1>         <p class="subtitle">快来看看谁是今天的幸运儿</p>                  <div class="section">             <div class="section-title">📋 参与名单</div>             <div class="file-upload">                 <div class="file-upload-btn">                     <label for="file-upload" class="custom-file-upload">                         📁 上传Excel表格                     </label>                     <input type="file" id="file-upload" accept=".xlsx, .xls">                     <div class="file-name" id="file-name"></div>                 </div>             </div>             <div style="margin-top: 15px;">                 <label>或手动输入名字（每行一个）</label>                 <textarea id="manual-names" placeholder="小明&#10;小红&#10;小花&#10;小华"></textarea>             </div>             <div class="count-display">                 当前名单人数: <span id="total-count">0</span> 人             </div>         </div>                  <div class="section">             <div class="section-title">🏆 奖品设置</div>             <input type="text" id="prize-name" placeholder="例如: 一等奖铅笔盒">         </div>                  <div class="section">             <div class="section-title">🎯 抽奖人数</div>             <div class="btn-group">                 <button class="count-btn active" data-count="1">抽1人</button>                 <button class="count-btn" data-count="3">抽3人</button>                 <button class="count-btn" data-count="5">抽5人</button>                 <button class="count-btn" data-count="10">抽10人</button>             </div>         </div>                  <button class="draw-btn" id="draw-btn">🎰 开始抽奖 🎰</button>                  <div class="result-section" id="result-section">             <div class="prize-title" id="prize-title"></div>             <div class="winner-list" id="winner-list"></div>         </div>     </div>          <script>         let allNames = [];         let selectedCount = 1;                  const fileInput = document.getElementById('file-upload');         const fileNameDisplay = document.getElementById('file-name');         const manualNamesInput = document.getElementById('manual-names');         const totalCountDisplay = document.getElementById('total-count');         const countBtns = document.querySelectorAll('.count-btn');         const drawBtn = document.getElementById('draw-btn');         const resultSection = document.getElementById('result-section');         const prizeTitle = document.getElementById('prize-title');         const winnerList = document.getElementById('winner-list');         const prizeNameInput = document.getElementById('prize-name');                  fileInput.addEventListener('change', function(e) {             const file = e.target.files[0];             if (file) {                 fileNameDisplay.textContent = '已选择: ' + file.name;                 const reader = new FileReader();                 reader.onload = function(e) {                     const data = new Uint8Array(e.target.result);                     const workbook = XLSX.read(data, { type: 'array' });                     const firstSheet = workbook.Sheets[workbook.SheetNames[0]];                     const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });                     const names = jsonData.flat().filter(name => name && String(name).trim());                     allNames = [...new Set(names.map(n => String(n).trim()))];                     updateCount();                 };                 reader.readAsArrayBuffer(file);             }         });                  manualNamesInput.addEventListener('input', function() {             const names = this.value.split('\n').map(n => n.trim()).filter(n => n);             const existingManual = manualNamesInput.getAttribute('data-manual') || '';             if (existingManual !== this.value) {                 manualNamesInput.setAttribute('data-manual', this.value);                 const fileNames = allNames.filter(n => {                     const manualList = existingManual.split('\n').map(x => x.trim()).filter(x => x);                     return !manualList.includes(n);                 });                 allNames = [...fileNames, ...names];                 updateCount();             }         });                  countBtns.forEach(btn => {             btn.addEventListener('click', function() {                 countBtns.forEach(b => b.classList.remove('active'));                 this.classList.add('active');                 selectedCount = parseInt(this.dataset.count);             });         });                  function updateCount() {             totalCountDisplay.textContent = allNames.length;         }                  drawBtn.addEventListener('click', function() {             const manualInput = manualNamesInput.value;             if (manualInput.trim()) {                 const manualNames = manualInput.split('\n').map(n => n.trim()).filter(n => n);                 const existingFileNames = allNames.filter(n => {                     return !manualNames.includes(n);                 });                 allNames = [...new Set([...existingFileNames, ...manualNames])];                 updateCount();             }                          if (allNames.length === 0) {                 alert('请先添加参与名单！');                 return;             }                          if (selectedCount > allNames.length) {                 alert('抽奖人数不能超过名单总人数！');                 return;             }                          drawBtn.disabled = true;             drawBtn.textContent = '🎲 抽奖中...';                          let shuffleCount = 0;             const shuffleInterval = setInterval(() => {                 const randomNames = [];                 const shuffled = [...allNames].sort(() => Math.random() - 0.5);                 for (let i = 0; i < Math.min(selectedCount, allNames.length); i++) {                     randomNames.push(shuffled[i]);                 }                 winnerList.innerHTML = randomNames.map(name =>                      `<div class="winner">${name}</div>`                 ).join('');                 shuffleCount++;                                  if (shuffleCount >= 15) {                     clearInterval(shuffleInterval);                     finalDraw();                 }             }, 100);         });                  function finalDraw() {             const shuffled = [...allNames].sort(() => Math.random() - 0.5);             const winners = shuffled.slice(0, selectedCount);                          const prize = prizeNameInput.value.trim();             prizeTitle.textContent = prize ? `🏆 ${prize} 🏆` : '🎊 中奖名单 🎊';                          winnerList.innerHTML = '';             winners.forEach((name, index) => {                 setTimeout(() => {                     const winnerDiv = document.createElement('div');                     winnerDiv.className = 'winner';                     winnerDiv.textContent = name;                     winnerList.appendChild(winnerDiv);                 }, index * 200);             });                          resultSection.style.display = 'block';             drawBtn.disabled = false;             drawBtn.textContent = '🎰 开始抽奖 🎰';                          resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });         }     </script> </body> </html>
