<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逍遥的口算题出题机器人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .header {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .leaderboard-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .leaderboard-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .content {
            padding: 25px;
        }
        
        .step {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .step.active {
            display: flex;
        }
        
        .step-title {
            font-size: 1.2rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .input-group label {
            font-weight: 500;
            color: #555;
        }
        
        input[type="text"],
        input[type="number"] {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
            width: 100%;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #4776E6;
            outline: none;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .option-btn {
            background: #f5f7ff;
            border: 2px solid #e0e0e0;
            padding: 20px 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .option-btn:hover {
            border-color: #4776E6;
            background: #eef2ff;
        }
        
        .option-btn.selected {
            border-color: #4776E6;
            background: #4776E6;
            color: white;
        }
        
        .difficulty-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .difficulty-btn {
            background: #f5f7ff;
            border: 2px solid #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .difficulty-btn:hover {
            border-color: #4776E6;
            background: #eef2ff;
        }
        
        .difficulty-btn .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .difficulty-btn .description {
            font-size: 0.9rem;
            color: #666;
        }
        
        .btn {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(71, 118, 230, 0.3);
        }
        
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .quiz-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        
        .quiz-container.active {
            display: flex;
        }
        
        .progress {
            font-size: 1rem;
            color: #555;
            font-weight: 500;
        }
        
        .question-card {
            background: #f9f9ff;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .question-text {
            font-size: 2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        
        .answer-input {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
        }
        
        .answer-input:focus {
            border-color: #4776E6;
            outline: none;
        }
        
        .next-btn {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(71, 118, 230, 0.3);
        }
        
        .result-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }
        
        .result-container.active {
            display: flex;
        }
        
        .result-card {
            background: #f9f9ff;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 1.1rem;
        }
        
        .result-value {
            font-weight: 600;
            color: #4776E6;
        }
        
        .leaderboard-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .leaderboard-modal.active {
            display: flex;
        }
        
        .leaderboard-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .leaderboard-header {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 16px 16px 0 0;
            position: sticky;
            top: 0;
        }
        
        .leaderboard-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .close-leaderboard {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .leaderboard-body {
            padding: 20px;
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leaderboard-table th {
            background: #f5f7ff;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        
        .leaderboard-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        
        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }
        
        .leaderboard-table tr:hover td {
            background: #f9f9ff;
        }
        
        .modal-btn {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .content {
                padding: 15px;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.8rem;
            }
            
            .answer-input {
                width: 150px;
                font-size: 1.3rem;
            }
            
            .leaderboard-table th,
            .leaderboard-table td {
                padding: 8px 5px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>逍遥的口算题出题机器人</h1>
            <button class="leaderboard-btn" id="showLeaderboard">排行榜</button>
        </div>
        
        <div class="content">
            <!-- 第一步：玩家命名 -->
            <div class="step active" id="step1">
                <div class="step-title">第一步：输入挑战者名称</div>
                <div class="input-group">
                    <label for="playerName">挑战者名称（必填）</label>
                    <input type="text" id="playerName" placeholder="请输入您的名字">
                </div>
                <button class="btn" id="nextStep1">下一步</button>
            </div>
            
            <!-- 第二步：选择运算 -->
            <div class="step" id="step2">
                <div class="step-title">第二步：选择运算类型（可多选）</div>
                <div class="options-grid">
                    <div class="option-btn" data-operation="add">加法</div>
                    <div class="option-btn" data-operation="subtract">减法</div>
                    <div class="option-btn" data-operation="multiply">乘法</div>
                    <div class="option-btn" data-operation="divide">除法</div>
                </div>
                <button class="btn" id="nextStep2">下一步</button>
            </div>
            
            <!-- 第三步：选择难度 -->
            <div class="step" id="step3">
                <div class="step-title">第三步：选择难度</div>
                <div class="difficulty-options">
                    <div class="difficulty-btn" data-difficulty="easy">
                        <div class="title">简单</div>
                        <div class="description">10以内的加减法，表内乘除法</div>
                    </div>
                    <div class="difficulty-btn" data-difficulty="medium">
                        <div class="title">中等</div>
                        <div class="description">100以内的加减法，两位数乘一位数</div>
                    </div>
                    <div class="difficulty-btn" data-difficulty="hard">
                        <div class="title">困难</div>
                        <div class="description">三位数的加减法，两位数乘两位数（除法要能整除）</div>
                    </div>
                </div>
            </div>
            
            <!-- 答题界面 -->
            <div class="quiz-container" id="quizContainer">
                <div class="progress" id="progress">第 1 / 10 题</div>
                <div class="question-card">
                    <div class="question-text" id="questionText">12 + 34 = ?</div>
                    <input type="number" class="answer-input" id="answerInput" placeholder="答案">
                </div>
                <button class="next-btn" id="nextQuestion">下一题</button>
            </div>
            
            <!-- 成绩结算界面 -->
            <div class="result-container" id="resultContainer">
                <div class="result-card">
                    <div class="result-title">答题完成！</div>
                    <div class="result-item">
                        <span>挑战者：</span>
                        <span class="result-value" id="resultName">-</span>
                    </div>
                    <div class="result-item">
                        <span>正确率：</span>
                        <span class="result-value" id="resultAccuracy">-</span>
                    </div>
                    <div class="result-item">
                        <span>答题耗时：</span>
                        <span class="result-value" id="resultTime">-</span>
                    </div>
                </div>
                <button class="btn" id="playAgain">再来一局</button>
                <button class="btn" id="viewLeaderboard">查看排行榜</button>
            </div>
        </div>
    </div>
    
    <!-- 排行榜弹窗 -->
    <div class="leaderboard-modal" id="leaderboardModal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>排行榜</h2>
                <button class="close-leaderboard" id="closeLeaderboard">×</button>
            </div>
            <div class="leaderboard-body">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>挑战者</th>
                            <th>算法</th>
                            <th>难度</th>
                            <th>耗时(秒)</th>
                            <th>正确率</th>
                            <th>挑战时间</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- 排行榜数据将通过JavaScript动态生成 -->
                    </tbody>
                </table>
                <button class="modal-btn" id="closeLeaderboardBtn">返回</button>
            </div>
        </div>
    </div>
    
    <script>
        // 游戏状态
        const gameState = {
            playerName: '',
            operations: [],
            difficulty: '',
            questions: [],
            currentQuestion: 0,
            correctAnswers: 0,
            totalQuestions: 10,
            startTime: 0,
            endTime: 0
        };
        
        // DOM元素
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const quizContainer = document.getElementById('quizContainer');
        const resultContainer = document.getElementById('resultContainer');
        const leaderboardModal = document.getElementById('leaderboardModal');
        const nextStep1 = document.getElementById('nextStep1');
        const nextStep2 = document.getElementById('nextStep2');
        const optionBtns = document.querySelectorAll('.option-btn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const questionText = document.getElementById('questionText');
        const answerInput = document.getElementById('answerInput');
        const nextQuestion = document.getElementById('nextQuestion');
        const progress = document.getElementById('progress');
        const resultName = document.getElementById('resultName');
        const resultAccuracy = document.getElementById('resultAccuracy');
        const resultTime = document.getElementById('resultTime');
        const playAgain = document.getElementById('playAgain');
        const viewLeaderboard = document.getElementById('viewLeaderboard');
        const showLeaderboard = document.getElementById('showLeaderboard');
        const closeLeaderboard = document.getElementById('closeLeaderboard');
        const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');
        const leaderboardBody = document.getElementById('leaderboardBody');
        
        // 初始化事件监听
        initEventListeners();
        
        function initEventListeners() {
            // 第一步：下一步按钮
            nextStep1.addEventListener('click', function() {
                const name = document.getElementById('playerName').value.trim();
                if (name === '') {
                    alert('请输入挑战者名称');
                    return;
                }
                gameState.playerName = name;
                step1.classList.remove('active');
                step2.classList.add('active');
            });
            
            // 第二步：运算选项
            optionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    this.classList.toggle('selected');
                });
            });
            
            // 第二步：下一步按钮
            nextStep2.addEventListener('click', function() {
                const selectedOperations = [];
                document.querySelectorAll('.option-btn.selected').forEach(btn => {
                    selectedOperations.push(btn.dataset.operation);
                });
                
                if (selectedOperations.length === 0) {
                    alert('请至少选择一种运算类型');
                    return;
                }
                
                gameState.operations = selectedOperations;
                step2.classList.remove('active');
                step3.classList.add('active');
            });
            
            // 第三步：难度选择
            difficultyBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    gameState.difficulty = this.dataset.difficulty;
                    step3.classList.remove('active');
                    startQuiz();
                });
            });
            
            // 答题界面：下一题按钮
            nextQuestion.addEventListener('click', submitAnswer);
            
            // 答题界面：回车提交
            answerInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitAnswer();
                }
            });
            
            // 成绩结算：再来一局
            playAgain.addEventListener('click', resetGame);
            
            // 成绩结算：查看排行榜
            viewLeaderboard.addEventListener('click', showLeaderboardModal);
            
            // 排行榜按钮
            showLeaderboard.addEventListener('click', showLeaderboardModal);
            
            // 关闭排行榜
            closeLeaderboard.addEventListener('click', hideLeaderboardModal);
            closeLeaderboardBtn.addEventListener('click', hideLeaderboardModal);
            
            // 点击排行榜外部关闭
            leaderboardModal.addEventListener('click', function(e) {
                if (e.target === leaderboardModal) {
                    hideLeaderboardModal();
                }
            });
        }
        
        // 开始答题
        function startQuiz() {
            generateQuestions();
            gameState.currentQuestion = 0;
            gameState.correctAnswers = 0;
            gameState.startTime = Date.now();
            
            quizContainer.classList.add('active');
            showQuestion();
            answerInput.focus();
        }
        
        // 生成题目
        function generateQuestions() {
            gameState.questions = [];
            
            for (let i = 0; i < gameState.totalQuestions; i++) {
                const operation = gameState.operations[Math.floor(Math.random() * gameState.operations.length)];
                const question = generateQuestion(operation, gameState.difficulty);
                gameState.questions.push(question);
            }
        }
        
        // 生成单个题目
        function generateQuestion(operation, difficulty) {
            let num1, num2, answer;
            
            switch (operation) {
                case 'add':
                    if (difficulty === 'easy') {
                        num1 = Math.floor(Math.random() * 10) + 1;
                        num2 = Math.floor(Math.random() * 10) + 1;
                    } else if (difficulty === 'medium') {
                        num1 = Math.floor(Math.random() * 100) + 1;
                        num2 = Math.floor(Math.random() * 100) + 1;
                    } else { // hard
                        num1 = Math.floor(Math.random() * 1000) + 100;
                        num2 = Math.floor(Math.random() * 1000) + 100;
                    }
                    answer = num1 + num2;
                    return { text: `${num1} + ${num2}`, answer };
                
                case 'subtract':
                    if (difficulty === 'easy') {
                        num1 = Math.floor(Math.random() * 10) + 1;
                        num2 = Math.floor(Math.random() * 10) + 1;
                        // 确保结果非负
                        if (num2 > num1) [num1, num2] = [num2, num1];
                    } else if (difficulty === 'medium') {
                        num1 = Math.floor(Math.random() * 100) + 1;
                        num2 = Math.floor(Math.random() * 100) + 1;
                        if (num2 > num1) [num1, num2] = [num2, num1];
                    } else { // hard
                        num1 = Math.floor(Math.random() * 1000) + 100;
                        num2 = Math.floor(Math.random() * 1000) + 100;
                        if (num2 > num1) [num1, num2] = [num2, num1];
                    }
                    answer = num1 - num2;
                    return { text: `${num1} - ${num2}`, answer };
                
                case 'multiply':
                    if (difficulty === 'easy') {
                        // 表内乘法
                        num1 = Math.floor(Math.random() * 9) + 1;
                        num2 = Math.floor(Math.random() * 9) + 1;
                    } else if (difficulty === 'medium') {
                        // 两位数乘一位数
                        num1 = Math.floor(Math.random() * 90) + 10;
                        num2 = Math.floor(Math.random() * 9) + 1;
                    } else { // hard
                        // 两位数乘两位数
                        num1 = Math.floor(Math.random() * 90) + 10;
                        num2 = Math.floor(Math.random() * 90) + 10;
                    }
                    answer = num1 * num2;
                    return { text: `${num1} × ${num2}`, answer };
                
                case 'divide':
                    if (difficulty === 'easy') {
                        // 表内除法
                        num2 = Math.floor(Math.random() * 9) + 1;
                        answer = Math.floor(Math.random() * 9) + 1;
                        num1 = num2 * answer;
                    } else if (difficulty === 'medium') {
                        // 除法结果为一位数
                        num2 = Math.floor(Math.random() * 9) + 1;
                        answer = Math.floor(Math.random() * 9) + 1;
                        num1 = num2 * answer;
                    } else { // hard
                        // 能整除的除法
                        num2 = Math.floor(Math.random() * 90) + 10;
                        answer = Math.floor(Math.random() * 90) + 10;
                        num1 = num2 * answer;
                    }
                    return { text: `${num1} ÷ ${num2}`, answer };
                
                default:
                    return null;
            }
        }
        
        // 显示题目
        function showQuestion() {
            const question = gameState.questions[gameState.currentQuestion];
            questionText.textContent = `${question.text} = ?`;
            progress.textContent = `第 ${gameState.currentQuestion + 1} / ${gameState.totalQuestions} 题`;
            answerInput.value = '';
            answerInput.focus();
            
            // 最后一题时更改按钮文字
            if (gameState.currentQuestion === gameState.totalQuestions - 1) {
                nextQuestion.textContent = '提交答案';
            } else {
                nextQuestion.textContent = '下一题';
            }
        }
        
        // 提交答案
        function submitAnswer() {
            const userAnswer = parseInt(answerInput.value);
            
            if (isNaN(userAnswer)) {
                alert('请输入有效的数字答案');
                return;
            }
            
            const correctAnswer = gameState.questions[gameState.currentQuestion].answer;
            
            if (userAnswer === correctAnswer) {
                gameState.correctAnswers++;
            }
            
            gameState.currentQuestion++;
            
            if (gameState.currentQuestion < gameState.totalQuestions) {
                showQuestion();
            } else {
                // 答题结束
                gameState.endTime = Date.now();
                showResult();
            }
        }
        
        // 显示结果
        function showResult() {
            quizContainer.classList.remove('active');
            resultContainer.classList.add('active');
            
            const timeTaken = Math.floor((gameState.endTime - gameState.startTime) / 1000);
            const accuracy = Math.floor((gameState.correctAnswers / gameState.totalQuestions) * 100);
            
            resultName.textContent = gameState.playerName;
            resultAccuracy.textContent = `${accuracy}%`;
            resultTime.textContent = `${timeTaken}秒`;
            
            // 保存到排行榜
            saveToLeaderboard({
                name: gameState.playerName,
                operations: getOperationsText(),
                difficulty: getDifficultyText(),
                time: timeTaken,
                accuracy: accuracy,
                date: new Date().toLocaleString()
            });
        }
        
        // 获取运算类型文本
        function getOperationsText() {
            const operationNames = {
                add: '加法',
                subtract: '减法',
                multiply: '乘法',
                divide: '除法'
            };
            return gameState.operations.map(op => operationNames[op]).join('、');
        }
        
        // 获取难度文本
        function getDifficultyText() {
            const difficultyNames = {
                easy: '简单',
                medium: '中等',
                hard: '困难'
            };
            return difficultyNames[gameState.difficulty] || '';
        }
        
        // 保存到排行榜
        function saveToLeaderboard(record) {
            let leaderboard = JSON.parse(localStorage.getItem('mathQuizLeaderboard')) || [];
            leaderboard.push(record);
            
            // 排序：优先正确率从高到低，然后时间从短到长
            leaderboard.sort((a, b) => {
                if (b.accuracy !== a.accuracy) {
                    return b.accuracy - a.accuracy;
                }
                return a.time - b.time;
            });
            
            // 只保留前20名
            if (leaderboard.length > 20) {
                leaderboard = leaderboard.slice(0, 20);
            }
            
            localStorage.setItem('mathQuizLeaderboard', JSON.stringify(leaderboard));
        }
        
        // 显示排行榜
        function showLeaderboardModal() {
            leaderboardModal.classList.add('active');
            renderLeaderboard();
        }
        
        // 隐藏排行榜
        function hideLeaderboardModal() {
            leaderboardModal.classList.remove('active');
        }
        
        // 渲染排行榜
        function renderLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('mathQuizLeaderboard')) || [];
            leaderboardBody.innerHTML = '';
            
            if (leaderboard.length === 0) {
                leaderboardBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">暂无记录</td></tr>';
                return;
            }
            
            leaderboard.forEach((record, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${record.name}</td>
                    <td>${record.operations}</td>
                    <td>${record.difficulty}</td>
                    <td>${record.time}</td>
                    <td>${record.accuracy}%</td>
                    <td>${record.date}</td>
                `;
                leaderboardBody.appendChild(row);
            });
        }
        
        // 重置游戏
        function resetGame() {
            resultContainer.classList.remove('active');
            step1.classList.add('active');
            document.getElementById('playerName').value = '';
            
            // 重置选项选择
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
        }
    </script>
</body>
</html>
