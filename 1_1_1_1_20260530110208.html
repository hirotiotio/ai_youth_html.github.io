<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>逍遥的贪吃蛇小游戏</title>     <style>         * {             margin: 0;             padding: 0;             box-sizing: border-box;             font-family: Arial, sans-serif;         }         body {             background-color: #f0f0f0;             display: flex;             flex-direction: column;             align-items: center;             padding: 20px;             min-height: 100vh;         }         h1 {             color: #333;             margin-bottom: 20px;             font-size: clamp(1.5rem, 4vw, 2.5rem);         }         .score-board {             display: flex;             justify-content: space-between;             width: 100%;             max-width: 400px;             margin-bottom: 15px;             font-size: clamp(1rem, 3vw, 1.2rem);             font-weight: bold;             color: #555;         }         #gameCanvas {             border: 2px solid #333;             background-color: #fff;             max-width: 100%;             height: auto;             border-radius: 8px;         }         .controls {             margin-top: 15px;             display: flex;             gap: 10px;             flex-wrap: wrap;             justify-content: center;         }         button {             padding: 10px 20px;             font-size: clamp(1rem, 3vw, 1.2rem);             background-color: #4CAF50;             color: white;             border: none;             border-radius: 5px;             cursor: pointer;             transition: background-color 0.3s;             min-width: 100px;         }         button:hover {             background-color: #45a049;         }         button:disabled {             background-color: #ccc;             cursor: not-allowed;         }         .instructions {             margin-top: 15px;             text-align: center;             font-size: clamp(0.9rem, 2.5vw, 1rem);             color: #666;         }     </style> </head> <body>     <h1>逍遥的贪吃蛇小游戏</h1>     <div class="score-board">         <div>当前分数: <span id="currentScore">0</span></div>         <div>最高分: <span id="highScore">0</span></div>     </div>     <canvas id="gameCanvas" width="400" height="400"></canvas>     <div class="controls">         <button id="startBtn">开始游戏</button>         <button id="pauseBtn" disabled>暂停游戏</button>         <button id="resetBtn">重新开始</button>     </div>     <div class="instructions">         提示：使用方向键控制蛇的移动，吃到食物得分，撞墙或撞到自己游戏结束     </div>      <script>         const canvas = document.getElementById('gameCanvas');         const ctx = canvas.getContext('2d');         const currentScoreEl = document.getElementById('currentScore');         const highScoreEl = document.getElementById('highScore');         const startBtn = document.getElementById('startBtn');         const pauseBtn = document.getElementById('pauseBtn');         const resetBtn = document.getElementById('resetBtn');          // 游戏参数         const gridSize = 20;         const tileCount = canvas.width / gridSize;         let snake = [{x: 10, y: 10}];         let food = {};         let dx = 0;         let dy = 0;         let score = 0;         let gameRunning = false;         let gamePaused = false;         let gameLoop;          // 加载最高分         function loadHighScore() {             const savedScore = localStorage.getItem('snakeHighScore');             return savedScore ? parseInt(savedScore) : 0;         }          function saveHighScore() {             localStorage.setItem('snakeHighScore', highScore);         }          let highScore = loadHighScore();         highScoreEl.textContent = highScore;          // 生成食物         function generateFood() {             food = {                 x: Math.floor(Math.random() * tileCount),                 y: Math.floor(Math.random() * tileCount)             };             // 确保食物不在蛇身上             snake.forEach(segment => {                 if (segment.x === food.x && segment.y === food.y) {                     generateFood();                 }             });         }          // 绘制蛇         function drawSnake() {             ctx.fillStyle = '#4CAF50';             snake.forEach(segment => {                 ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);             });         }          // 绘制食物         function drawFood() {             ctx.fillStyle = '#FF5722';             ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);         }          // 更新游戏状态         function updateGame() {             if (!gameRunning || gamePaused) return;              // 移动蛇             const head = {x: snake[0].x + dx, y: snake[0].y + dy};                          // 碰撞检测             if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {                 gameOver();                 return;             }                          snake.forEach(segment => {                 if (head.x === segment.x && head.y === segment.y) {                     gameOver();                     return;                 }             });                          snake.unshift(head);                          // 检查是否吃到食物             if (head.x === food.x && head.y === food.y) {                 score += 10;                 currentScoreEl.textContent = score;                 generateFood();                 // 更新最高分                 if (score > highScore) {                     highScore = score;                     highScoreEl.textContent = highScore;                     saveHighScore();                 }             } else {                 snake.pop();             }                          // 清除画布             ctx.fillStyle = '#fff';             ctx.fillRect(0, 0, canvas.width, canvas.height);                          drawSnake();             drawFood();         }          // 游戏结束         function gameOver() {             gameRunning = false;             startBtn.disabled = false;             pauseBtn.disabled = true;             alert(`游戏结束！你的分数是: ${score}`);         }          // 开始游戏         function startGame() {             if (gameRunning) return;             gameRunning = true;             gamePaused = false;             startBtn.disabled = true;             pauseBtn.disabled = false;             dx = 0;             dy = -1;             score = 0;             currentScoreEl.textContent = score;             snake = [{x: 10, y: 10}];             generateFood();             gameLoop = setInterval(updateGame, 150);         }          // 暂停游戏         function pauseGame() {             gamePaused = !gamePaused;             pauseBtn.textContent = gamePaused ? '继续游戏' : '暂停游戏';         }          // 重置游戏         function resetGame() {             gameRunning = false;             gamePaused = false;             clearInterval(gameLoop);             startBtn.disabled = false;             pauseBtn.disabled = true;             pauseBtn.textContent = '暂停游戏';             score = 0;             currentScoreEl.textContent = score;             snake = [{x: 10, y: 10}];             generateFood();                          // 清除画布             ctx.fillStyle = '#fff';             ctx.fillRect(0, 0, canvas.width, canvas.height);             drawSnake();             drawFood();         }          // 键盘控制         document.addEventListener('keydown', (e) => {             if (!gameRunning || gamePaused) return;                          switch(e.key) {                 case 'ArrowUp':                     if (dy !== 1) {                         dx = 0;                         dy = -1;                     }                     break;                 case 'ArrowDown':                     if (dy !== -1) {                         dx = 0;                         dy = 1;                     }                     break;                 case 'ArrowLeft':                     if (dx !== 1) {                         dx = -1;                         dy = 0;                     }                     break;                 case 'ArrowRight':                     if (dx !== -1) {                         dx = 1;                         dy = 0;                     }                     break;             }         });          // 按钮事件         startBtn.addEventListener('click', startGame);         pauseBtn.addEventListener('click', pauseGame);         resetBtn.addEventListener('click', resetGame);          // 初始化绘制         resetGame();          // 响应式调整canvas大小         window.addEventListener('resize', () => {             const maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 200);             const newSize = Math.floor(maxSize / gridSize) * gridSize;             canvas.width = newSize;             canvas.height = newSize;             resetGame();         });     </script> </body> </html>
