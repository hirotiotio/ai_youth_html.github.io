<!DOCTYPE html> <html lang="zh-CN"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">     <title>卡通宠物养成</title>     <style>         :root {             --primary-color: #FF9A9E;             --bg-color: #FDFBF7;             --text-color: #5D5D5D;             --bar-bg: #eee;             --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;         }          * {             box-sizing: border-box;             user-select: none;             -webkit-tap-highlight-color: transparent;         }          body {             margin: 0;             padding: 0;             font-family: var(--font-main);             background-color: var(--bg-color);             color: var(--text-color);             display: flex;             justify-content: center;             align-items: center;             min-height: 100vh;             overflow: hidden;         }          /* 游戏容器 */         #game-container {             width: 100%;             max-width: 450px;             height: 100vh;             max-height: 800px;             background: #fff;             border-radius: 20px;             box-shadow: 0 10px 30px rgba(0,0,0,0.1);             display: flex;             flex-direction: column;             position: relative;             overflow: hidden;             border: 4px solid var(--primary-color);         }          @media (min-width: 500px) {             #game-container {                 height: 90vh;                 border-radius: 30px;             }         }          /* 通用按钮 */         .btn {             background: var(--primary-color);             color: white;             border: none;             padding: 12px 24px;             border-radius: 25px;             font-size: 1rem;             cursor: pointer;             transition: transform 0.1s, background 0.2s;             box-shadow: 0 4px 0 #ff7e81;             font-weight: bold;         }          .btn:active {             transform: translateY(4px);             box-shadow: none;         }          .btn:disabled {             background: #ccc;             box-shadow: none;             cursor: not-allowed;             transform: translateY(4px);         }          /* 屏幕切换 */         .screen {             display: none;             flex-direction: column;             align-items: center;             justify-content: center;             width: 100%;             height: 100%;             padding: 20px;             animation: fadeIn 0.5s;         }          .screen.active {             display: flex;         }          @keyframes fadeIn {             from { opacity: 0; }             to { opacity: 1; }         }          /* 1. 选择宠物屏幕 */         .pet-grid {             display: grid;             grid-template-columns: repeat(3, 1fr);             gap: 15px;             margin-bottom: 30px;         }          .pet-option {             font-size: 3rem;             background: #f8f8f8;             border-radius: 15px;             padding: 15px;             cursor: pointer;             transition: all 0.2s;             border: 2px solid transparent;         }          .pet-option:hover, .pet-option.selected {             background: #fff0f1;             border-color: var(--primary-color);             transform: scale(1.1);         }          input[type="text"] {             padding: 12px;             border: 2px solid #eee;             border-radius: 15px;             font-size: 1rem;             margin-bottom: 20px;             width: 80%;             text-align: center;             outline: none;         }          input[type="text"]:focus {             border-color: var(--primary-color);         }          /* 2. 游戏主界面 */         .stats-area {             width: 100%;             display: flex;             flex-direction: column;             gap: 10px;             margin-bottom: 20px;         }          .stat-row {             display: flex;             align-items: center;             gap: 10px;         }          .stat-icon {             font-size: 1.2rem;             width: 30px;             text-align: center;         }          .progress-bar {             flex: 1;             height: 16px;             background: var(--bar-bg);             border-radius: 10px;             overflow: hidden;             position: relative;         }          .progress-fill {             height: 100%;             width: 100%;             background: #4CAF50;             transition: width 0.5s ease, background-color 0.5s;             border-radius: 10px;         }          /* 宠物展示区 */         .pet-display {             flex: 1;             display: flex;             flex-direction: column;             align-items: center;             justify-content: center;             position: relative;             width: 100%;         }          .pet-name-display {             font-size: 1.5rem;             font-weight: bold;             margin-bottom: 10px;             color: var(--primary-color);         }          .pet-sprite {             font-size: 8rem;             position: relative;             transition: all 0.5s ease;             cursor: default;             filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));         }          /* 状态特效层 */         .effects-layer {             position: absolute;             top: 0;             left: 0;             width: 100%;             height: 100%;             pointer-events: none;             overflow: hidden;         }          /* 浮动图标 */         .floating-icon {             position: absolute;             font-size: 2rem;             animation: floatUp 1s forwards;             opacity: 0;         }          @keyframes floatUp {             0% { transform: translateY(0) scale(0.5); opacity: 1; }             100% { transform: translateY(-100px) scale(1.2); opacity: 0; }         }          /* 动画状态 - 开心 */         .anim-happy {             animation: bounce 0.6s infinite alternate;         }          @keyframes bounce {             0%, 100% { transform: translateY(0); }             50% { transform: translateY(-20px); }         }          .anim-happy-glow {             filter: drop-shadow(0 0 15px #FFD700) brightness(1.1);         }          /* 动画状态 - 难过/低能量 */         .anim-sad {             animation: shake 3s infinite;         }                  .anim-low-energy {             filter: brightness(0.6) grayscale(0.3);             transform: translateY(10px);         }          .tear {             position: absolute;             top: 60%;             left: 40%;             font-size: 1.5rem;             color: #4fc3f7;             animation: tearDrop 2s infinite;             display: none;         }                  .anim-low-energy .tear {             display: block;         }          @keyframes tearDrop {             0% { transform: translateY(0); opacity: 1; }             100% { transform: translateY(50px); opacity: 0; }         }          @keyframes shake {             0% { transform: rotate(0deg); }             25% { transform: rotate(-5deg); }             75% { transform: rotate(5deg); }             100% { transform: rotate(0deg); }         }          /* 动画状态 - 死亡 */         .anim-dead {             filter: grayscale(1);             transform: rotate(90deg) scale(0.8);             transition: transform 1s;         }          /* 操作按钮区 */         .actions-area {             width: 100%;             display: flex;             justify-content: space-around;             padding: 20px 0;             background: #fff;             border-top: 2px dashed #eee;         }          .action-btn {             display: flex;             flex-direction: column;             align-items: center;             background: none;             border: none;             cursor: pointer;             color: var(--text-color);             transition: transform 0.2s;         }          .action-btn:active {             transform: scale(0.9);         }          .action-icon {             font-size: 2.5rem;             margin-bottom: 5px;             background: #f0f0f0;             width: 60px;             height: 60px;             display: flex;             align-items: center;             justify-content: center;             border-radius: 50%;             box-shadow: 0 4px 0 #ddd;             transition: all 0.2s;         }          .action-btn:active .action-icon {             box-shadow: 0 0 0 #ddd;             transform: translateY(4px);         }          .action-label {             font-size: 0.9rem;             font-weight: bold;         }          /* 庆祝动画 */         .confetti {             position: absolute;             width: 10px;             height: 10px;             background-color: #f00;             animation: fall linear forwards;             z-index: 100;         }          @keyframes fall {             to { transform: translateY(100vh) rotate(720deg); }         }          /* 重新开始覆盖层 */         #game-over-overlay {             position: absolute;             top: 0;             left: 0;             width: 100%;             height: 100%;             background: rgba(0,0,0,0.8);             display: none;             flex-direction: column;             justify-content: center;             align-items: center;             z-index: 200;             color: white;             text-align: center;         }                  .status-text {             margin-top: 10px;             font-size: 1.2rem;             color: #888;         }      </style> </head> <body>  <div id="game-container">          <!-- 1. 初始设置屏幕 -->     <div id="setup-screen" class="screen active">         <h2>🎮 领养宠物</h2>         <p>选择一个你喜欢的宠物吧!</p>         <div class="pet-grid" id="pet-grid">             <!-- JS生成选项 -->         </div>         <p>给你的宠物起个名字吧:</p>         <input type="text" id="pet-name-input" placeholder="例如: 糖糖" maxlength="6">         <button class="btn" id="start-btn">开始养成</button>     </div>      <!-- 2. 游戏主屏幕 -->     <div id="game-screen" class="screen">                  <!-- 状态栏 -->         <div class="stats-area">             <div class="stat-row">                 <span class="stat-icon">🍖</span>                 <div class="progress-bar">                     <div class="progress-fill" id="bar-fullness"></div>                 </div>             </div>             <div class="stat-row">                 <span class="stat-icon">😊</span>                 <div class="progress-bar">                     <div class="progress-fill" id="bar-happiness"></div>                 </div>             </div>             <div class="stat-row">                 <span class="stat-icon">✨</span>                 <div class="progress-bar">                     <div class="progress-fill" id="bar-cleanliness"></div>                 </div>             </div>         </div>          <!-- 宠物展示 -->         <div class="pet-display">             <div class="pet-name-display" id="display-name">名字</div>             <div class="pet-sprite" id="pet-sprite">                 🐶                 <div class="tear">💧</div>             </div>             <div class="status-text" id="status-text">宠物状态正常</div>         </div>          <!-- 操作按钮 -->         <div class="actions-area" id="actions-area">             <button class="action-btn" onclick="interact('feed')">                 <div class="action-icon">🍗</div>                 <span class="action-label">喂食</span>             </button>             <button class="action-btn" onclick="interact('play')">                 <div class="action-icon">🎾</div>                 <span class="action-label">玩耍</span>             </button>             <button class="action-btn" onclick="interact('clean')">                 <div class="action-icon">🚿</div>                 <span class="action-label">清洁</span>             </button>         </div>     </div>      <!-- 游戏结束覆盖层 -->     <div id="game-over-overlay">         <h1>😢 宠物去世了</h1>         <p>请好好珍惜下一个生命...</p>         <button class="btn" onclick="resetGame()">重新开始</button>     </div>  </div>  <script>     // 游戏配置     const PETS = ['🐶', '🐱', '🐰', '🐼', '🦊', '🐻', '🐸', '🐯'];     const MAX_STAT = 100;     const DECAY_RATE = 2;     const DECAY_INTERVAL = 5000; // 5秒          // 游戏状态     let gameState = {         isStarted: false,         petType: '🐶',         petName: '',         fullness: 100,         happiness: 100,         cleanliness: 100,         isDead: false     };      let gameLoop;      // DOM 元素     const setupScreen = document.getElementById('setup-screen');     const gameScreen = document.getElementById('game-screen');     const petGrid = document.getElementById('pet-grid');     const nameInput = document.getElementById('pet-name-input');     const startBtn = document.getElementById('start-btn');     const petSprite = document.getElementById('pet-sprite');     const displayName = document.getElementById('display-name');     const statusText = document.getElementById('status-text');     const actionsArea = document.getElementById('actions-area');     const gameOverOverlay = document.getElementById('game-over-overlay');      // 进度条元素     const barFullness = document.getElementById('bar-fullness');     const barHappiness = document.getElementById('bar-happiness');     const barCleanliness = document.getElementById('bar-cleanliness');      // 初始化     function init() {         loadGame();         renderPetGrid();                  // 检查是否有存档         if (gameState.isStarted && !gameState.isDead) {             startGame();         }          // 事件监听         startBtn.addEventListener('click', () => {             const name = nameInput.value.trim();             if (!name) {                 alert('请给宠物起个名字~');                 return;             }             gameState.petName = name;             gameState.isStarted = true;             saveGame();             startGame();         });     }      // 渲染宠物选择网格     function renderPetGrid() {         petGrid.innerHTML = '';         PETS.forEach(pet => {             const div = document.createElement('div');             div.className = 'pet-option';             div.textContent = pet;             div.onclick = () => {                 document.querySelectorAll('.pet-option').forEach(el => el.classList.remove('selected'));                 div.classList.add('selected');                 gameState.petType = pet;             };             petGrid.appendChild(div);         });         // 默认选第一个         if(PETS.length > 0) petGrid.children[0].click();     }      // 开始游戏     function startGame() {         setupScreen.classList.remove('active');         gameScreen.classList.add('active');                  updateUI();                  // 启动衰减计时器         if (gameLoop) clearInterval(gameLoop);         gameLoop = setInterval(decayStats, DECAY_INTERVAL);     }      // 核心逻辑：数值衰减     function decayStats() {         if (gameState.isDead) return;          gameState.fullness = Math.max(0, gameState.fullness - DECAY_RATE);         gameState.happiness = Math.max(0, gameState.happiness - DECAY_RATE);         gameState.cleanliness = Math.max(0, gameState.cleanliness - DECAY_RATE);          checkStatus();         updateUI();         saveGame();     }      // 交互动作     function interact(action) {         if (gameState.isDead) return;          let icon = '';                  if (action === 'feed') {             gameState.fullness = Math.min(MAX_STAT, gameState.fullness + 20);             icon = '🍗';         } else if (action === 'play') {             gameState.happiness = Math.min(MAX_STAT, gameState.happiness + 20);             gameState.fullness = Math.max(0, gameState.fullness - 5); // 玩耍消耗饱食度             icon = '🎵';         } else if (action === 'clean') {             gameState.cleanliness = Math.min(MAX_STAT, gameState.cleanliness + 20);             icon = '✨';         }          // 触发点击动画         triggerPetAnimation('jump');         spawnFloatingIcon(icon);                  checkStatus();         updateUI();         saveGame();     }      // 检查状态（生死、心情）     function checkStatus() {         // 死亡判定         if (gameState.fullness <= 0 || gameState.happiness <= 0 || gameState.cleanliness <= 0) {             gameOver();             return;         }          const allHigh = gameState.fullness > 70 && gameState.happiness > 70 && gameState.cleanliness > 70;         const anyLow = gameState.fullness < 20 || gameState.happiness < 20 || gameState.cleanliness < 20;          if (anyLow) {             statusText.textContent = "宠物很难过...";         } else if (allHigh) {             statusText.textContent = "宠物非常开心!";         } else {             statusText.textContent = "宠物状态正常";         }     }      // 游戏结束     function gameOver() {         gameState.isDead = true;         clearInterval(gameLoop);         actionsArea.style.display = 'none'; // 隐藏按钮         petSprite.className = 'pet-sprite anim-dead';         gameOverOverlay.style.display = 'flex';         saveGame();     }      // 重置游戏     function resetGame() {         localStorage.removeItem('petGameSave'); // 清除存档         location.reload(); // 简单粗暴刷新     }      // 更新UI显示     function updateUI() {         if (!gameState.isStarted) return;          // 名字和形象         displayName.textContent = gameState.petName;         petSprite.childNodes[0].nodeValue = gameState.petType; // 只改文本，保留眼泪元素          // 数值条         updateBar(barFullness, gameState.fullness);         updateBar(barHappiness, gameState.happiness);         updateBar(barCleanliness, gameState.cleanliness);          // 动画状态更新 (如果没死)         if (!gameState.isDead) {             updateMoodAnimation();         }     }      function updateBar(bar, value) {         bar.style.width = value + '%';         // 颜色变化         if (value > 70) bar.style.backgroundColor = '#4CAF50'; // 绿         else if (value > 30) bar.style.backgroundColor = '#FFC107'; // 黄         else bar.style.backgroundColor = '#F44336'; // 红     }      // 更新宠物心情动画     function updateMoodAnimation() {         // 清除旧状态         petSprite.classList.remove('anim-happy', 'anim-happy-glow', 'anim-sad', 'anim-low-energy');                  const avg = (gameState.fullness + gameState.happiness + gameState.cleanliness) / 3;                  // 全部满时 - 庆祝         if (gameState.fullness >= 100 && gameState.happiness >= 100 && gameState.cleanliness >= 100) {              petSprite.classList.add('anim-happy', 'anim-happy-glow');              triggerConfetti();         }         // 高能量 (>80 平均)         else if (avg > 80) {             petSprite.classList.add('anim-happy');             spawnFloatingIcon('❤️', true);         }         // 低能量 (<50 任意)         else if (gameState.fullness < 50 || gameState.happiness < 50 || gameState.cleanliness < 50) {             petSprite.classList.add('anim-low-energy');         }         // 难过 (<20 任意)         else if (gameState.fullness < 20 || gameState.happiness < 20 || gameState.cleanliness < 20) {             petSprite.classList.add('anim-sad');         }     }      // 触发宠物动画     function triggerPetAnimation(type) {         // 简单的重绘触发         petSprite.style.animation = 'none';         petSprite.offsetHeight; /* trigger reflow */         petSprite.style.animation = null;                   if(type === 'jump') {             petSprite.style.transform = 'scale(1.2)';             setTimeout(() => { petSprite.style.transform = 'scale(1)'; }, 200);         }     }      // 飘出图标     function spawnFloatingIcon(emoji, isHeart = false) {         const el = document.createElement('div');         el.className = 'floating-icon';         el.textContent = emoji;         // 随机位置         el.style.left = (30 + Math.random() * 40) + '%';         el.style.top = '40%';                  document.querySelector('.pet-display').appendChild(el);                  // 如果是爱心且高能量，位置更高         if(isHeart) {             el.style.color = '#ff4081';         }          setTimeout(() => el.remove(), 1000);     }      // 撒花庆祝     function triggerConfetti() {         // 简单防止重复触发太频繁         if (petSprite.getAttribute('data-confetti') === 'true') return;         petSprite.setAttribute('data-confetti', 'true');                  for (let i = 0; i < 30; i++) {             setTimeout(() => {                 const conf = document.createElement('div');                 conf.className = 'confetti';                 conf.style.left = Math.random() * 100 + 'vw';                 conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;                 conf.style.animationDuration = (Math.random() * 2 + 2) + 's';                 document.body.appendChild(conf);                                  setTimeout(() => conf.remove(), 4000);             }, i * 100);         }                  setTimeout(() => {             petSprite.setAttribute('data-confetti', 'false');         }, 5000);     }      // 本地存储     function saveGame() {         localStorage.setItem('petGameSave', JSON.stringify(gameState));     }      function loadGame() {         const saved = localStorage.getItem('petGameSave');         if (saved) {             try {                 gameState = JSON.parse(saved);             } catch (e) {                 console.error("存档读取错误", e);             }         }     }      // 启动     init();  </script> </body> </html>
